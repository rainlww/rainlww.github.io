<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绘境——词条生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #FFF9C4 0%, #FFF59D 50%, #FFEE58 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        .title {
            font-size: 2.2em;
            color: #F57F17;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.95em;
            color: #F9A825;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.6;
            padding: 15px;
            background: rgba(245, 127, 23, 0.08);
            border-radius: 10px;
        }

        .input-section {
            margin-bottom: 25px;
        }

        .input-label {
            font-size: 0.9em;
            color: #F9A825;
            margin-bottom: 8px;
            display: block;
        }

        .input-box {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .input-box:focus {
            outline: none;
            border-color: #F57F17;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(245, 127, 23, 0.15);
        }

        .output-section {
            margin-bottom: 25px;
        }

        .output-box {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            font-size: 0.95em;
            line-height: 1.8;
            background: #fafbfc;
            color: #F57F17;
            resize: none;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .output-box[readonly] {
            cursor: text;
        }

        .btn {
            width: 100%;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #F57F17, #F9A825);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 127, 23, 0.4);
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #F9A825, #FBC02D);
            color: #fff;
            padding: 12px 20px;
            font-size: 0.95em;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 168, 37, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #6abf8a, #8adba8);
            color: #fff;
        }

        .btn-success:hover {
            box-shadow: 0 6px 20px rgba(106, 191, 138, 0.4);
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(245, 127, 23, 0.95);
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 0.95em;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .toast.show {
            opacity: 1;
        }

        .format-tip {
            font-size: 0.85em;
            color: #F9A825;
            margin-top: 10px;
            padding: 10px;
            background: rgba(245, 127, 23, 0.05);
            border-radius: 8px;
            border-left: 3px solid #F57F17;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }
            .title {
                font-size: 1.8em;
            }
            .btn-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">绘境——词条生成器</h1>
            <p class="subtitle">用标签绘制意境，用词语营造画面<br>支持智能语义识别，自动生成 Danbooru 标准格式词条</p>

            <div class="input-section">
                <label class="input-label">请输入想要的词条主题（可选）</label>
                <input type="text" class="input-box" id="themeInput" placeholder="例如：坐在草地上、黄昏时看书的少女、樱花树下的魔法少女...">
            </div>

            <div class="input-section">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="dreamMode" style="width: 20px; height: 20px;">
                    <span style="font-size: 0.95em; color: #F9A825;">🌙 梦中奇幻（开启后自由搭配，不考虑合理性）</span>
                </label>
            </div>

            <div class="output-section">
                <textarea class="output-box" id="outputBox" readonly placeholder="点击"生成"按钮，生成专属词条..."></textarea>
                <div class="format-tip">
                    <strong>📝 格式说明：</strong> 输出为 Danbooru raw tag 格式，空格已自动转换为下划线（如 <code>blue_sky</code>），可直接用于 Neta 创作。
                </div>
            </div>

            <button class="btn btn-primary" id="generateBtn" onclick="generate()">✨ 生成</button>

            <div class="btn-group hidden" id="resultBtns">
                <button class="btn btn-secondary btn-success" onclick="copyResult()">📋 复制</button>
                <button class="btn btn-secondary" onclick="generate()">🔄 再次生成</button>
                <button class="btn btn-secondary" onclick="reset()">🗑️ 重置页面</button>
            </div>

            <div class="back-link" style="text-align: center; margin-top: 25px;">
                <a href="index.html" style="color: #F57F17; text-decoration: none; padding: 10px 20px; background: rgba(245, 127, 23, 0.1); border-radius: 8px; transition: all 0.3s ease; display: inline-block; font-size: 0.95em;">← 返回主页</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">已复制到剪贴板！</div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

        // ==================== 智能拆分函数 ====================
        function parseInput(input) {
            const result = {
                action: [],
                scene: [],
                time: [],
                character: [],
                weather: [],
                style: [],
                unmatched: ""
            };

            // 遍历所有语义类别
            for (const [category, tags] of Object.entries(semanticTags)) {
                // 遍历该类别下的所有关键词
                for (const [keyword, enTags] of Object.entries(tags)) {
                    // 检查输入是否包含该关键词
                    if (input.includes(keyword)) {
                        // 匹配成功，添加英文标签
                        result[category].push(...enTags);

        // ==================== 生成词条 ====================
        function generate() {
            try {
                const themeInput = document.getElementById('themeInput').value.trim();
                const isDreamMode = document.getElementById('dreamMode').checked;
                const outputBox = document.getElementById('outputBox');
                const generateBtn = document.getElementById('generateBtn');
                const resultBtns = document.getElementById('resultBtns');

                let tags = [];
                let matchedCategories = new Set();
                let sceneTags = [];
                let actionTags = [];

                // ========== 正常流程 ==========
                if (themeInput) {
                    const parsed = parseInput(themeInput);

                    // 添加匹配到的标签
                    for (const [category, enTags] of Object.entries(parsed)) {
                        if (enTags.length > 0 && category !== 'unmatched') {
                            const uniqueTags = [...new Set(enTags)];
                            tags.push(...uniqueTags);
                            matchedCategories.add(category);
                            
                            if (category === 'scene') sceneTags.push(...uniqueTags);
                            if (category === 'action') actionTags.push(...uniqueTags);
                        }
                    }

                    // 2. 基础标签补充（确保质量）
                    const qualityPool = baseTags.quality;
                    const qualityCount = Math.floor(Math.random() * 3) + 3;
                    tags.push(...shuffleArray([...qualityPool]).slice(0, qualityCount));

                    // 3. 检查动作是否需要特定场景（防止不合理搭配）
                    const requiredScenes = getRequiredScenesForAction(actionTags);
                    let detectedTypes = [];
                    
                    if (!isDreamMode && (sceneTags.length > 0 || actionTags.length > 0 || themeInput)) {
                        detectedTypes = detectSceneTypes(sceneTags, actionTags, themeInput);
                        
                        // 如果动作需要特定场景，但检测到的场景不匹配，强制添加所需场景
                        if (requiredScenes.length > 0) {
                            requiredScenes.forEach(reqScene => {
                                if (!detectedTypes.includes(reqScene)) {
                                    detectedTypes.push(reqScene);
                                    // 添加对应的场景标签
                                    if (reqScene === 'water' && !sceneTags.some(s => s.includes('water'))) {
                                        sceneTags.push('water');
                                    }
                                }
                            });
                        }
                    }

                    // 4. 根据场景类型选择合理的光影、情绪和细节标签
                    let selectedLighting = [];
                    let selectedEmotions = [];
                    let selectedDetails = [];

                    if (detectedTypes.length > 0) {
                        // 使用合理搭配规则（支持多个场景类型）
                        detectedTypes.forEach(type => {
                            if (compatibleRules[type]) {
                                const rule = compatibleRules[type];
                                
                                // 光影：从兼容列表选
                                const compatibleLighting = rule.lighting.filter(l => baseTags.lighting.includes(l));
                                selectedLighting.push(...shuffleArray(compatibleLighting).slice(0, 2));
                                
                                // 情绪：从兼容列表选
                                const compatibleEmotions = rule.emotions.filter(e => baseTags.emotion.includes(e));
                                selectedEmotions.push(...shuffleArray(compatibleEmotions).slice(0, 2));
                                
                                // 细节标签：添加场景特有描述
                                if (rule.details) {
                                    selectedDetails.push(...shuffleArray(rule.details).slice(0, 3));
                                }
                            }
                        });
                        
                        // 去重
                        selectedLighting = [...new Set(selectedLighting)];
                        selectedEmotions = [...new Set(selectedEmotions)];
                        selectedDetails = [...new Set(selectedDetails)];
                        
                        // 补充到足够数量
                        while (selectedLighting.length < 4) {
                            const remaining = baseTags.lighting.filter(l => !selectedLighting.includes(l));
                            if (remaining.length === 0) break;
                            selectedLighting.push(remaining[Math.floor(Math.random() * remaining.length)]);
                        }
                        while (selectedEmotions.length < 3) {
                            const remaining = baseTags.emotion.filter(e => !selectedEmotions.includes(e));
                            if (remaining.length === 0) break;
                            selectedEmotions.push(remaining[Math.floor(Math.random() * remaining.length)]);
                        }
                    } else {
                        // 没有匹配的场景类型，随机选择
                        selectedLighting.push(...shuffleArray([...baseTags.lighting]).slice(0, 4));
                        selectedEmotions.push(...shuffleArray([...baseTags.emotion]).slice(0, 3));
                    }

                    tags.push(...selectedLighting);

                    // 5. 构图标签
                    const compositionPool = baseTags.composition;
                    const compositionCount = Math.floor(Math.random() * 3) + 2;
                    tags.push(...shuffleArray([...compositionPool]).slice(0, compositionCount));

                    // 6. 情绪标签
                    tags.push(...selectedEmotions);

                    // 7. 场景细节标签（水、雪、花等特有描述）
                    tags.push(...selectedDetails);

                    // 8. 自由发挥：未匹配的类别随机补充（梦中奇幻模式更多）
                    const freeCount = isDreamMode ? 4 : 2;
                    const freeCategories = ['action', 'scene'];
                    freeCategories.forEach(cat => {
                        if (!matchedCategories.has(cat)) {
                            const pool = baseTags[cat];
                            const count = Math.floor(Math.random() * freeCount) + 2;
                            tags.push(...shuffleArray([...pool]).slice(0, count));
                        }
                    });

                    // 9. 梦中奇幻模式：额外添加一些奇幻元素
                    if (isDreamMode) {
                        const fantasyTags = ['dreamy', 'fantasy', 'magical', 'ethereal', 'surreal', 'mysterious', 'vibrant', 'glow', 'light_particles', 'bloom'];
                        tags.push(...shuffleArray(fantasyTags).slice(0, 4));
                    }

                    // 10. 去重并打乱顺序
                    tags = [...new Set(tags)].sort(() => 0.5 - Math.random());

                    // 11. 限制总数量
                    const maxTags = isDreamMode ? 25 : 20;
                    const minTags = isDreamMode ? 18 : 15;
                    const finalCount = Math.floor(Math.random() * (maxTags - minTags + 1)) + minTags;
                    tags = tags.slice(0, finalCount);

                    outputBox.value = tags.join(', ');

                    // 显示结果按钮
                    generateBtn.classList.add('hidden');
                    resultBtns.classList.remove('hidden');
                } else {
                    // 没有输入，生成随机标签
                    const qualityPool = baseTags.quality;
                    tags.push(...shuffleArray([...qualityPool]).slice(0, 3));
                    
                    const lightingPool = baseTags.lighting;
                    tags.push(...shuffleArray([...lightingPool]).slice(0, 4));
                    
                    const compositionPool = baseTags.composition;
                    tags.push(...shuffleArray([...compositionPool]).slice(0, 3));
                    
                    const emotionPool = baseTags.emotion;
                    tags.push(...shuffleArray([...emotionPool]).slice(0, 3));
                    
                    tags = [...new Set(tags)].sort(() => 0.5 - Math.random());
                    outputBox.value = tags.join(', ');
                    generateBtn.classList.add('hidden');
                    resultBtns.classList.remove('hidden');
                }
            } catch (error) {
                console.error('生成失败:', error);
                showToast('生成失败，请重试');
            }
        }

        function copyResult() {
            const outputBox = document.getElementById('outputBox');

            showToast('已复制到剪贴板！');

        function reset() {
            document.getElementById('themeInput').value = '';
            document.getElementById('outputBox').value = '';
            document.getElementById('generateBtn').classList.remove('hidden');
            document.getElementById('resultBtns').classList.add('hidden');
            
            showToast('页面已重制');
        }

        // ==================== 显示提示 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
