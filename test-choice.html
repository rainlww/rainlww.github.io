<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择测试类型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .title {
            font-size: 2em;
            color: #5a7d8a;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.95em;
            color: #8a9a9f;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (min-width: 600px) {
            .test-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .test-card {
            background: linear-gradient(135deg, rgba(90, 125, 138, 0.05), rgba(122, 157, 168, 0.05));
            border: 2px solid rgba(90, 125, 138, 0.2);
            border-radius: 15px;
            padding: 30px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .test-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(90, 125, 138, 0.2);
            background: linear-gradient(135deg, rgba(90, 125, 138, 0.1), rgba(122, 157, 168, 0.1));
            border-color: rgba(90, 125, 138, 0.4);
        }

        .test-number {
            font-size: 2em;
            color: #5a7d8a;
            font-weight: bold;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        .test-name {
            font-size: 1.3em;
            color: #5a7d8a;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .test-desc {
            font-size: 0.85em;
            color: #8a9a9f;
            line-height: 1.6;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #5a7d8a;
            text-decoration: none;
            padding: 10px 25px;
            background: rgba(90, 125, 138, 0.1);
            border-radius: 25px;
            transition: all 0.3s ease;
            display: inline-block;
            font-size: 0.95em;
        }

        .back-link a:hover {
            background: rgba(90, 125, 138, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
            }
            .title {
                font-size: 1.6em;
            }
            .test-icon {
                font-size: 2.5em;
            }
            .test-name {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">请选择测试类型</h1>
            <p class="subtitle">选择你想要进行的测试，探索更深层的自己</p>

            <div class="test-grid">
                <!-- MBTI 测试 -->
                <div class="test-card" onclick="window.location.href='mbti.html'">
                    <div class="test-number">01</div>
                    <h2 class="test-name">MBTI</h2>
                    <p class="test-desc">
                        16 型人格测试<br>
                        基于荣格八维认知功能理论
                    </p>
                </div>

                <!-- 更多测试（敬请期待） -->
                <div class="test-card" style="opacity: 0.6; cursor: not-allowed;">
                    <div class="test-number">02</div>
                    <h2 class="test-name">更多测试</h2>
                    <p class="test-desc">
                        敬请期待<br>
                        更多有趣测试即将上线
                    </p>
                </div>
            </div>

            <div class="back-link">
                <a href="index.html">← 返回主页</a>
            </div>
        </div>
    </div>
</body>
</html>
