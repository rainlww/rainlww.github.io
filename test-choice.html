<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择测试类型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .title {
            font-size: 2em;
            color: #fff;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 0.95em;
            color: #fff;
            text-align: center;
            margin-bottom: 50px;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
        }

        .test-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .test-card {
            background: rgba(90, 125, 138, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 25px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .test-card:hover {
            background: rgba(90, 125, 138, 0.95);
            border-color: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .test-card.new {
            border-color: rgba(255, 215, 0, 0.6);
            position: relative;
        }

        .test-card.new::after {
            content: 'NEW';
            position: absolute;
            top: -10px;
            right: 15px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #fff;
            font-size: 0.75em;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 10px;
        }

        .test-number {
            font-size: 1.5em;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .test-content {
            flex: 1;
        }

        .test-name {
            font-size: 1.3em;
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .test-desc {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .test-arrow {
            font-size: 1.5em;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        .test-card:hover .test-arrow {
            color: #fff;
            transform: translateX(5px);
        }

        .disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            transition: all 0.3s ease;
            display: inline-block;
            font-size: 0.95em;
            backdrop-filter: blur(10px);
        }

        .back-link a:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.6em;
            }
            .test-card {
                padding: 20px 18px;
                gap: 15px;
            }
            .test-number {
                font-size: 1.2em;
                min-width: 40px;
            }
            .test-name {
                font-size: 1.1em;
            }
            .test-desc {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">请选择测试类型</h1>
        <p class="subtitle">选择你想要进行的测试，探索更深层的自己</p>

        <div class="test-list">
            <!-- MBTI 测试 -->
            <div class="test-card" onclick="window.location.href='mbti.html'">
                <div class="test-number">01</div>
                <div class="test-content">
                    <h2 class="test-name">MBTI</h2>
                    <p class="test-desc">16 型人格测试 · 基于荣格八维认知功能理论</p>
                </div>
                <div class="test-arrow">→</div>
            </div>

            <!-- 九型人格测试 -->
            <div class="test-card" onclick="window.location.href='enneagram.html'">
                <div class="test-number">02</div>
                <div class="test-content">
                    <h2 class="test-name">九型人格</h2>
                    <p class="test-desc">9 种性格类型 · 探索核心动机与深层恐惧</p>
                </div>
                <div class="test-arrow">→</div>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>
</body>
</html>
