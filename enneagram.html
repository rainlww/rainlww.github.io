<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #9a7a8a 0%, #aa8a9a 50%, #ba9aaa 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.8);
            color: #5a4a5a;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: rgba(154, 122, 138, 0.2);
            border-color: #9a7a8a;
            font-weight: 600;
        }

        .lang-btn:hover {
            background: rgba(154, 122, 138, 0.15);
        }

        h1 {
            font-size: 2em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 1em;
            color: #7a6a7a;
            margin-bottom: 30px;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            font-size: 1.1em;
            color: #5a4a5a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 15px;
            font-size: 1em;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            line-height: 1.8;
        }

        textarea:focus {
            border-color: rgba(154, 122, 138, 0.8);
            box-shadow: 0 4px 15px rgba(154, 122, 138, 0.2);
        }

        .input-hint {
            font-size: 0.9em;
            color: #9a7a8a;
            margin-top: 10px;
            font-style: italic;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-analyze:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(154, 122, 138, 0.4);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-analyze.hidden {
            display: none;
        }

        /* 加载动画 */
        .loading-section {
            display: none;
            margin-top: 25px;
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, rgba(154, 122, 138, 0.05), rgba(170, 138, 154, 0.05));
            border-radius: 15px;
            border: 2px solid rgba(154, 122, 138, 0.2);
        }

        .loading-section:not(.hidden) {
            display: block;
        }

        .loading-section.hidden {
            display: none;
        }

        .loading-text {
            font-size: 0.95em;
            color: #9a7a8a;
            margin-bottom: 15px;
            font-style: italic;
            font-weight: 500;
        }

        .loading-bar-container {
            width: 280px;
            height: 8px;
            background: rgba(154, 122, 138, 0.2);
            border-radius: 4px;
            margin: 0 auto;
            overflow: hidden;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9a7a8a, #aa8a9a, #ba9aaa);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.5em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #e74c5a 0deg var(--t1-deg, 0deg),
                #f39c12 var(--t1-deg, 0deg) var(--t2-deg, 0deg),
                #3498db var(--t2-deg, 0deg) var(--t3-deg, 0deg),
                #9b59b6 var(--t3-deg, 0deg) var(--t4-deg, 0deg),
                #1abc9c var(--t4-deg, 0deg) var(--t5-deg, 0deg),
                #34495e var(--t5-deg, 0deg) var(--t6-deg, 0deg),
                #e67e22 var(--t6-deg, 0deg) var(--t7-deg, 0deg),
                #c0392b var(--t7-deg, 0deg) var(--t8-deg, 0deg),
                #95a5a6 var(--t8-deg, 0deg) var(--t9-deg, 0deg)
            );
            transition: all 0.5s ease;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .chart-center-type {
            font-size: 2.5em;
            font-weight: 700;
            color: #9a7a8a;
        }

        .chart-center-label {
            font-size: 0.9em;
            color: #7a6a7a;
            margin-top: 5px;
        }

        .legend {
            margin-bottom: 30px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            margin-bottom: 8px;
            background: rgba(154, 122, 138, 0.08);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .legend-item:hover {
            background: rgba(154, 122, 138, 0.15);
            transform: translateX(5px);
        }

        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .legend-text {
            flex: 1;
            font-size: 0.95em;
            color: #5a4a5a;
        }

        .legend-percent {
            font-size: 1em;
            color: #9a7a8a;
            font-weight: 700;
            min-width: 50px;
            text-align: right;
        }

        .result-detail {
            background: rgba(154, 122, 138, 0.08);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #9a7a8a;
        }

        .result-detail h3 {
            font-size: 1.4em;
            color: #5a4a5a;
            margin-bottom: 15px;
        }

        .result-detail h4 {
            font-size: 1.15em;
            color: #5a4a5a;
            margin: 20px 0 12px 0;
            padding-left: 10px;
            border-left: 3px solid #9a7a8a;
        }

        .result-detail h4:first-child {
            margin-top: 0;
        }

        .result-detail p {
            font-size: 1.05em;
            color: #7a6a7a;
            line-height: 2;
            margin-bottom: 10px;
        }

        .result-detail strong {
            color: #5a4a5a;
            font-weight: 600;
        }

        .btn-restart {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7a8a9a, #8a9aaa);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(122, 138, 154, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6em;
            }
            .chart-container {
                width: 250px;
                height: 250px;
            }
            .chart-center {
                width: 120px;
                height: 120px;
            }
            .chart-center-type {
                font-size: 2em;
            }
            .lang-switch {
                position: relative;
                top: 0;
                right: 0;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('zh')" id="langZh">中文</button>
            <button class="lang-btn" onclick="setLang('en')" id="langEn">English</button>
        </div>

        <h1 id="title">✨ 九型人格分析</h1>

        <div class="input-section" id="inputSection">
            <label for="selfDesc" id="descLabel">请用一段话描述你自己：</label>
            <textarea id="selfDesc" placeholder="例如：
我是一个比较内向的人，喜欢独处思考。在工作中我追求完美，常常会因为细节不够好而焦虑。我很在意别人的看法，希望能被认可和喜爱。面对冲突时，我倾向于避免正面冲突，但内心会有自己的想法和坚持。我有很多兴趣爱好，但常常三分钟热度...

（可以从性格特点、行为模式、内心感受、人际关系等方面描述）"></textarea>
            <p class="input-hint" id="inputHint">💡 描述越详细，分析越准确。建议 100 字以上。</p>
            <button class="btn-analyze" onclick="analyzePersonality()" id="analyzeBtn">开始分析</button>
            
            <!-- 加载动画 -->
            <div class="loading-section hidden" id="loadingSection">
                <div class="loading-text" id="loadingText">九型人格分析中，让我读懂你的内心……</div>
                <div class="loading-bar-container">
                    <div class="loading-bar" id="loadingBar"></div>
                </div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title" id="resultTitle">你的九型人格分布</h2>
            
            <div class="chart-container">
                <div class="pie-chart" id="pieChart"></div>
                <div class="chart-center">
                    <div class="chart-center-type" id="mainType">Type 4</div>
                    <div class="chart-center-label" id="mainTypeLabel">主导类型</div>
                </div>
            </div>

            <div class="legend" id="legend"></div>

            <div class="result-detail">
                <h3 id="resultName">Type 4 - 浪漫主义者</h3>
                <p id="resultDesc"></p>
            </div>

            <button class="btn-restart" onclick="restartTest()" id="restartBtn">🔄 重新分析</button>
            <a href="index.html" class="back-link" id="backLink">← 返回主页</a>
        </div>
    </div>

                    { pattern: /公正/g, weight: 1, desc: '追求公正' },
                    { pattern: /规范/g, weight: 1, desc: '遵守规范' },

                    // 重要特质（×3）

                textarea.placeholder = `For example:
I'm a relatively introverted person who enjoys solitary thinking. At work, I pursue perfection and often feel anxious about details not being good enough. I care about others' opinions and hope to be recognized and liked. When facing conflicts, I tend to avoid direct confrontation, but I have my own thoughts and convictions. I have many interests, but often lose interest quickly...

(You can describe personality traits, behavioral patterns, inner feelings, interpersonal relationships, etc.)`;
            }
            
            // 如果已经有结果，更新结果文字
            const resultSection = document.getElementById('resultSection');
            if (resultSection.classList.contains('show')) {
                const mainType = document.getElementById('mainType').textContent.replace('Type ', '');
                updateResultText(parseInt(mainType));
            }
        }

        // 更新结果文字
        function updateResultText(mainType) {
            document.getElementById('resultName').textContent = `Type ${mainType} - ${typeNames[currentLang][mainType]}`;
            document.getElementById('resultDesc').textContent = typeDescs[currentLang][mainType];
        }

        // 有趣的加载文字
        const loadingMessages = {
            zh: [
                '九型人格分析中，让我读懂你的内心……',
                '分析你的核心动机和恐惧……',
                '探索你的人格分布……',
                '计算翼型和动态方向……',
                '生成专业报告……'
            ],
            en: [
                'Analyzing your Enneagram type, let me understand your heart…',
                'Analyzing your core motivations and fears…',
                'Exploring your personality distribution…',
                'Calculating wing type and dynamic directions…',
                'Generating professional report…'
            ]
        };

        // 分析人格（专业版语义分析引擎）
        function analyzePersonality() {
            const text = document.getElementById('selfDesc').value.trim();
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loadingSection = document.getElementById('loadingSection');
            const loadingBar = document.getElementById('loadingBar');
            const loadingText = document.getElementById('loadingText');
            const t = i18n[currentLang];
            
            if (text.length < 50) {
                alert(t.shortDesc);
                return;
            }
            
            // 隐藏按钮，显示加载动画
            analyzeBtn.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            loadingBar.style.width = '0%';
            
            // 加载动画
            let progress = 0;
            let msgIndex = 0;
            const loadingInterval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress > 100) progress = 100;
                loadingBar.style.width = progress + '%';
                
                // 根据进度切换文字
                const newMsgIndex = Math.floor(progress / 25);
                if (newMsgIndex > msgIndex && newMsgIndex < loadingMessages[currentLang].length) {
                    msgIndex = newMsgIndex;
                    loadingText.textContent = loadingMessages[currentLang][msgIndex];
                }
                
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        // 执行分析
                        performAnalysis(text);
                    }, 500);
                }
            }, 400);
        }

        // 执行实际分析（精确版）
        function performAnalysis(text) {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loadingSection = document.getElementById('loadingSection');
            const t = i18n[currentLang];

            try {
                // ========== 第一步：文本预处理 ==========
                // 转小写（英文），去除标点
                let processedText = text;
                if (currentLang === 'en') {
                    processedText = text.toLowerCase();
                }
                
                // ========== 第二步：基础分（避免 0%） ==========
                // 每种类型先给基础分 10 分（降低基础分，让关键词影响更大）
                const baseScore = 10;
                const scores = {};
                for (let i = 1; i <= 9; i++) {
                    scores[i] = baseScore;
                }

                // ========== 第三步：关键词匹配加分（5 级权重） ==========
                const patterns = semanticPatterns[currentLang];
                Object.keys(patterns).forEach(type => {
                    const typePatterns = patterns[type];
                    typePatterns.forEach(({ pattern, weight, desc }) => {
                        const matches = processedText.match(pattern);
                        if (matches) {
                            // 5 级权重：5/3/2/1/-2
                            if (weight > 0) {
                                scores[type] += weight;
                            } else {
                                // 负向词：减少其他类型的分数（相对加分）
                                for (let i = 1; i <= 9; i++) {
                                    if (i !== type) {
                                        scores[i] += Math.abs(weight) * 0.3;
                                    }
                                }
                            }
                        }
                    });
                });

                // ========== 第四步：语义相似度加分 ==========
                // 相似词组：一组词表达相似含义，匹配任意一个都给该类型加分
                const similarGroups = semanticSimilarity[currentLang];
                similarGroups.forEach(group => {
                    let matchCount = 0;
                    group.words.forEach(word => {
                        const regex = new RegExp(word, 'gi');
                        if (processedText.match(regex)) {
                            matchCount++;
                        }
                    });
                    // 匹配到组内任意词，给对应类型加分（每组 +2 分）
                    if (matchCount > 0) {
                        scores[group.type] += 2;
                    }
                });

                // ========== 第五步：计算百分比 ==========
                const total = Object.values(scores).reduce((a, b) => a + b, 0);
                const percentages = {};
                for (let i = 1; i <= 9; i++) {
                    percentages[i] = Math.round((scores[i] / total) * 100);
                }

                // ========== 第六步：找出主导类型 ==========
                let maxScore = 0;
                let mainType = 1;
                for (let i = 1; i <= 9; i++) {
                    if (scores[i] > maxScore) {
                        maxScore = scores[i];
                        mainType = i;
                    }
                }

                // ========== 第七步：计算翼型（相邻类型中较高的） ==========
                const wingTypes = getWingTypes(mainType);
                let wingScore = 0;
                let wingType = 0;
                wingTypes.forEach(w => {
                    if (scores[w] > wingScore) {
                        wingScore = scores[w];
                        wingType = w;
                    }
                });

                // ========== 第八步：压力/安全方向 ==========
                const stressType = stressDirections[mainType];
                const secureType = secureDirections[mainType];

                // ========== 第九步：生成专业报告 ==========
                const report = generateReport(mainType, wingType, percentages, stressType, secureType);

                // 显示结果
                showResult(percentages, mainType, wingType, report);
            } catch (e) {
                console.error('分析出错:', e);
                alert(t.error);
            } finally {
                // 恢复按钮，隐藏加载
                analyzeBtn.classList.remove('hidden');
                analyzeBtn.textContent = t.analyzeBtn;
                loadingSection.classList.add('hidden');
            }
        }

        // 显示结果
        function showResult(percentages, mainType, wingType, report) {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').classList.add('show');

            // 设置饼图变量
            const chart = document.getElementById('pieChart');
            let cumulativeDeg = 0;
            
            for (let i = 1; i <= 9; i++) {
                const deg = percentages[i] * 3.6;
                chart.style.setProperty(`--t${i}-deg`, `${cumulativeDeg + deg}deg`);
                cumulativeDeg += deg;
            }

            // 设置主导类型和翼型
            document.getElementById('mainType').textContent = `${mainType}w${wingType}`;
            document.getElementById('mainTypeLabel').textContent = i18n[currentLang].mainTypeLabel + ' · 翼型 ' + wingType;

            // 生成图例
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            // 按百分比排序
            const sorted = Object.entries(percentages).sort((a, b) => b[1] - a[1]);
            
            sorted.forEach(([type, percent]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                const isMain = parseInt(type) === mainType;
                const isWing = parseInt(type) === wingType;
                item.innerHTML = `
                    <div class="legend-color" style="background: ${typeColors[type - 1]}"></div>
                    <span class="legend-text">Type ${type} - ${typeNames[currentLang][type]}${isMain ? ' (主导)' : ''}${isWing && !isMain ? ' (翼型)' : ''}</span>
                    <span class="legend-percent">${percent}%</span>
                `;
                legend.appendChild(item);
            });

            // 显示专业报告
            const resultDesc = document.getElementById('resultDesc');
            resultDesc.innerHTML = report;
        }

        // 重新开始
        function restartTest() {
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('selfDesc').value = '';
        }

        // 页面加载时初始化语言
        window.onload = function() {
            initLang();
        };
    </script>
</body>
