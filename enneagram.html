<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #9a7a8a 0%, #aa8a9a 50%, #ba9aaa 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.2em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 1em;
            color: #7a6a7a;
            margin-bottom: 30px;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            font-size: 1.1em;
            color: #5a4a5a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .input-section textarea {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 15px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            resize: vertical;
            font-family: inherit;
            line-height: 1.8;
        }

        .input-section textarea:focus {
            border-color: rgba(154, 122, 138, 0.8);
            box-shadow: 0 4px 15px rgba(154, 122, 138, 0.2);
        }

        .input-hint {
            font-size: 0.9em;
            color: #9a7a8a;
            margin-top: 10px;
            font-style: italic;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .btn-analyze:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            margin-top: 40px;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.8em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #e74c5a 0deg,
                #e74c5a var(--t1-deg),
                #f39c12 var(--t1-deg),
                #f39c12 var(--t2-deg),
                #3498db var(--t2-deg),
                #3498db var(--t3-deg),
                #9b59b6 var(--t3-deg),
                #9b59b6 var(--t4-deg),
                #1abc9c var(--t4-deg),
                #1abc9c var(--t5-deg),
                #34495e var(--t5-deg),
                #34495e var(--t6-deg),
                #e67e22 var(--t6-deg),
                #e67e22 var(--t7-deg),
                #c0392b var(--t7-deg),
                #c0392b var(--t8-deg),
                #95a5a6 var(--t8-deg),
                #95a5a6 360deg
            );
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .chart-center-type {
            font-size: 2.5em;
            font-weight: bold;
            color: #9a7a8a;
        }

        .chart-center-label {
            font-size: 0.85em;
            color: #7a6a7a;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(154, 122, 138, 0.08);
            border-radius: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .legend-text {
            font-size: 0.9em;
            color: #5a4a5a;
        }

        .legend-percent {
            font-size: 0.9em;
            color: #9a7a8a;
            font-weight: 600;
            margin-left: auto;
        }

        .result-detail {
            background: rgba(154, 122, 138, 0.08);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #9a7a8a;
        }

        .result-detail h3 {
            font-size: 1.3em;
            color: #5a4a5a;
            margin-bottom: 15px;
        }

        .result-detail p {
            font-size: 1em;
            color: #7a6a7a;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .btn-restart {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #a0a0a0, #b0b0b0);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn-restart:hover {
            background: linear-gradient(135deg, #909090, #a0a0a0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.95em;
        }

        .back-link:hover {
            color: #7a6a7a;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .chart-container {
                width: 250px;
                height: 250px;
            }
            .chart-center {
                width: 120px;
                height: 120px;
            }
            .chart-center-type {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 九型人格分析</h1>
        <p class="subtitle">描述你自己，让我来读懂你的内心</p>

        <div class="input-section" id="inputSection">
            <label for="selfDesc">请用一段话描述你自己：</label>
            <textarea id="selfDesc" placeholder="例如：
我是一个比较内向的人，喜欢独处思考。在工作中我追求完美，常常会因为细节不够好而焦虑。我很在意别人的看法，希望能被认可和喜爱。面对冲突时，我倾向于避免正面冲突，但内心会有自己的想法和坚持。我有很多兴趣爱好，但常常三分钟热度...

（可以从性格特点、行为模式、内心感受、人际关系等方面描述）"></textarea>
            <p class="input-hint">💡 描述越详细，分析越准确。建议 100 字以上。</p>
            <button class="btn-analyze" onclick="analyzePersonality()" id="analyzeBtn">开始分析</button>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title">你的九型人格分布</h2>
            
            <div class="chart-container">
                <div class="pie-chart" id="pieChart"></div>
                <div class="chart-center">
                    <div class="chart-center-type" id="mainType">Type 4</div>
                    <div class="chart-center-label">主导类型</div>
                </div>
            </div>

            <div class="legend" id="legend"></div>

            <div class="result-detail">
                <h3 id="resultName">Type 4 - 浪漫主义者</h3>
                <p id="resultDesc"></p>
            </div>

            <button class="btn-restart" onclick="restartTest()">🔄 重新分析</button>
            <a href="index.html" class="back-link">← 返回主页</a>
        </div>
    </div>

    <script>
        // 九型人格关键词
        const typeKeywords = {
            1: ['完美', '原则', '正确', '道德', '标准', '批评', '改进', '秩序', '责任', '自律', '理想', '公正', '规范', '严谨', '正直'],
            2: ['帮助', '关心', '爱', '需要', '付出', '温暖', '善良', '他人', '给予', '认可', '感激', '关系', '体贴', '支持', '奉献'],
            3: ['成功', '成就', '目标', '效率', '形象', '认可', '竞争', '优秀', '表现', '价值', '进步', '结果', '领先', '荣誉', '胜利'],
            4: ['独特', '特别', '不同', '深度', '真实', '缺失', '羡慕', '艺术', '情感', '敏感', '内省', '意义', '浪漫', '悲伤', '美'],
            5: ['知识', '理解', '独立', '思考', '分析', '观察', '学习', '研究', '空间', '隐私', '理性', '专注', '探索', '智慧', '距离'],
            6: ['安全', '担心', '忠诚', '准备', '风险', '怀疑', '信任', '责任', '团体', '规则', '警惕', '支持', '可靠', '焦虑', '承诺'],
            7: ['快乐', '自由', '体验', '新鲜', '可能', '冒险', '乐观', '选择', '有趣', '逃避', '计划', '热情', '多样', '享受', '好奇'],
            8: ['控制', '力量', '保护', '直接', '挑战', '领导', '强势', '正义', '对抗', '支配', '自信', '行动', '权威', '果断', '真相'],
            9: ['和平', '和谐', '平静', '舒适', '避免', '融合', '接纳', '耐心', '稳定', '随和', '调解', '惰性', '包容', '安逸', '平衡']
        };

        const typeNames = {
            1: '完美主义者',
            2: '给予者',
            3: '成就者',
            4: '浪漫主义者',
            5: '观察者',
            6: '忠诚者',
            7: '热情者',
            8: '挑战者',
            9: '调停者'
        };

        const typeColors = [
            '#e74c5a', '#f39c12', '#3498db', '#9b59b6', '#1abc9c',
            '#34495e', '#e67e22', '#c0392b', '#95a5a6'
        ];

        const typeDescs = {
            1: "你追求完美，有强烈的道德感和原则性。你对自己和他人都有很高的标准，希望世界变得更好。你善于发现错误并纠正它们，但有时可能过于批判和僵化。",
            2: "你温暖、慷慨，总是把他人需求放在自己之前。你渴望被爱和被需要，通过帮助他人来获得价值感。你有很强的同理心，但有时可能忽视自己的需求。",
            3: "你目标明确，效率高，渴望成功和被认可。你善于适应环境，展现他人想看到的一面。你有强大的执行力，但有时可能过度工作和忽视感受。",
            4: "你敏感、富有创造力，渴望独特和深度。你容易感到与他人不同，情绪波动较大。你有艺术天赋和深度思考能力，但有时可能沉溺于过去和缺失感。",
            5: "你理性、独立，渴望理解和掌握知识。你需要大量独处时间，情感上保持距离。你有强大的分析能力，但有时可能过度思考和情感疏离。",
            6: "你忠诚、可靠，重视安全和稳定。你善于预见风险，为可能的困难做准备。你有很强的责任感，但有时可能过度担忧和犹豫不决。",
            7: "你乐观、热情，渴望体验和自由。你善于发现可能性，避免痛苦和限制。你有创造力和适应力，但有时可能承诺困难和逃避痛苦。",
            8: "你强势、自信，渴望控制和力量。你保护自己和身边的人，直面冲突。你有领导力和保护欲，但有时可能过度控制和难以示弱。",
            9: "你平和、包容，渴望和谐与平静。你善于理解各方立场，避免冲突。你有倾听能力和包容心，但有时可能逃避冲突和难以做决定。"
        };

        function analyzePersonality() {
            const text = document.getElementById('selfDesc').value.trim();
            
            if (text.length < 50) {
                alert('请详细描述你自己，至少 50 字哦～');
                return;
            }

            // 计算各类型得分
            const scores = {};
            for (let i = 1; i <= 9; i++) {
                scores[i] = 0;
            }

            // 统计关键词匹配
            typeKeywords.forEach((keywords, type) => {
                keywords.forEach(keyword => {
                    const regex = new RegExp(keyword, 'gi');
                    const matches = text.match(regex);
                    if (matches) {
                        scores[type] += matches.length;
                    }
                });
            });

            // 计算总分和百分比
            const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
            const percentages = {};
            for (let i = 1; i <= 9; i++) {
                percentages[i] = Math.round((scores[i] / total) * 100);
            }

            // 找出主导类型
            let maxScore = 0;
            let mainType = 1;
            for (let i = 1; i <= 9; i++) {
                if (scores[i] > maxScore) {
                    maxScore = scores[i];
                    mainType = i;
                }
            }

            // 显示结果
            showResult(percentages, mainType);
        }

        function showResult(percentages, mainType) {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').classList.add('show');

            // 设置饼图变量
            const chart = document.getElementById('pieChart');
            let cumulativeDeg = 0;
            
            for (let i = 1; i <= 9; i++) {
                const deg = percentages[i] * 3.6;
                chart.style.setProperty(`--t${i}-deg`, `${cumulativeDeg + deg}deg`);
                cumulativeDeg += deg;
            }

            // 设置主导类型
            document.getElementById('mainType').textContent = `Type ${mainType}`;

            // 生成图例
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            // 按百分比排序
            const sorted = Object.entries(percentages).sort((a, b) => b[1] - a[1]);
            
            sorted.forEach(([type, percent]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${typeColors[type - 1]}"></div>
                    <span class="legend-text">Type ${type} - ${typeNames[type]}</span>
                    <span class="legend-percent">${percent}%</span>
                `;
                legend.appendChild(item);
            });

            // 设置主导类型描述
            document.getElementById('resultName').textContent = `Type ${mainType} - ${typeNames[mainType]}`;
            document.getElementById('resultDesc').textContent = typeDescs[mainType];
        }

        function restartTest() {
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('selfDesc').value = '';
        }
    </script>
</body>
</html>
