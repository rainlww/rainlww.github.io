<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #9a7a8a 0%, #aa8a9a 50%, #ba9aaa 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.8);
            color: #5a4a5a;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: rgba(154, 122, 138, 0.2);
            border-color: #9a7a8a;
            font-weight: 600;
        }

        .lang-btn:hover {
            background: rgba(154, 122, 138, 0.15);
        }

        h1 {
            font-size: 2em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 1em;
            color: #7a6a7a;
            margin-bottom: 30px;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            font-size: 1.1em;
            color: #5a4a5a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 15px;
            font-size: 1em;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            line-height: 1.8;
        }

        textarea:focus {
            border-color: rgba(154, 122, 138, 0.8);
            box-shadow: 0 4px 15px rgba(154, 122, 138, 0.2);
        }

        .input-hint {
            font-size: 0.9em;
            color: #9a7a8a;
            margin-top: 10px;
            font-style: italic;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-analyze:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(154, 122, 138, 0.4);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.5em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #e74c5a 0deg var(--t1-deg, 0deg),
                #f39c12 var(--t1-deg, 0deg) var(--t2-deg, 0deg),
                #3498db var(--t2-deg, 0deg) var(--t3-deg, 0deg),
                #9b59b6 var(--t3-deg, 0deg) var(--t4-deg, 0deg),
                #1abc9c var(--t4-deg, 0deg) var(--t5-deg, 0deg),
                #34495e var(--t5-deg, 0deg) var(--t6-deg, 0deg),
                #e67e22 var(--t6-deg, 0deg) var(--t7-deg, 0deg),
                #c0392b var(--t7-deg, 0deg) var(--t8-deg, 0deg),
                #95a5a6 var(--t8-deg, 0deg) var(--t9-deg, 0deg)
            );
            transition: all 0.5s ease;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .chart-center-type {
            font-size: 2.5em;
            font-weight: 700;
            color: #9a7a8a;
        }

        .chart-center-label {
            font-size: 0.9em;
            color: #7a6a7a;
            margin-top: 5px;
        }

        .legend {
            margin-bottom: 30px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            margin-bottom: 8px;
            background: rgba(154, 122, 138, 0.08);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .legend-item:hover {
            background: rgba(154, 122, 138, 0.15);
            transform: translateX(5px);
        }

        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .legend-text {
            flex: 1;
            font-size: 0.95em;
            color: #5a4a5a;
        }

        .legend-percent {
            font-size: 1em;
            color: #9a7a8a;
            font-weight: 700;
            min-width: 50px;
            text-align: right;
        }

        .result-detail {
            background: rgba(154, 122, 138, 0.08);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #9a7a8a;
        }

        .result-detail h3 {
            font-size: 1.4em;
            color: #5a4a5a;
            margin-bottom: 15px;
        }

        .result-detail p {
            font-size: 1.05em;
            color: #7a6a7a;
            line-height: 2;
        }

        .btn-restart {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7a8a9a, #8a9aaa);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(122, 138, 154, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6em;
            }
            .chart-container {
                width: 250px;
                height: 250px;
            }
            .chart-center {
                width: 120px;
                height: 120px;
            }
            .chart-center-type {
                font-size: 2em;
            }
            .lang-switch {
                position: relative;
                top: 0;
                right: 0;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">

            <button class="btn-analyze" onclick="analyzePersonality()" id="analyzeBtn">开始分析</button>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title" id="resultTitle">你的九型人格分布</h2>
            
            <div class="chart-container">
                <div class="pie-chart" id="pieChart"></div>

            <a href="index.html" class="back-link" id="backLink">← 返回主页</a>

            if (lang === 'zh') {
                textarea.placeholder = `例如：
我是一个比较内向的人，喜欢独处思考。在工作中我追求完美，常常会因为细节不够好而焦虑。我很在意别人的看法，希望能被认可和喜爱。面对冲突时，我倾向于避免正面冲突，但内心会有自己的想法和坚持。我有很多兴趣爱好，但常常三分钟热度...

（可以从性格特点、行为模式、内心感受、人际关系等方面描述）`;
            } else {
                textarea.placeholder = `For example:
I'm a relatively introverted person who enjoys solitary thinking. At work, I pursue perfection and often feel anxious about details not being good enough. I care about others' opinions and hope to be recognized and liked. When facing conflicts, I tend to avoid direct confrontation, but I have my own thoughts and convictions. I have many interests, but often lose interest quickly...

(You can describe personality traits, behavioral patterns, inner feelings, interpersonal relationships, etc.)`;
            }
            
            // 如果已经有结果，更新结果文字
            const resultSection = document.getElementById('resultSection');
            if (resultSection.classList.contains('show')) {
                const mainType = document.getElementById('mainType').textContent.replace('Type ', '');
                updateResultText(parseInt(mainType));
            }
        }

        // 更新结果文字
        function updateResultText(mainType) {
            document.getElementById('resultName').textContent = `Type ${mainType} - ${typeNames[currentLang][mainType]}`;
            document.getElementById('resultDesc').textContent = typeDescs[currentLang][mainType];
        }

        // 分析人格
        function analyzePersonality() {
            const text = document.getElementById('selfDesc').value.trim();
            const analyzeBtn = document.getElementById('analyzeBtn');
            const t = i18n[currentLang];
            
            if (text.length < 50) {
                alert(t.shortDesc);
                return;
            }
            
            // 禁用按钮防止重复点击
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = t.analyzing;

            try {
                // 计算各类型得分
                const scores = {};
                for (let i = 1; i <= 9; i++) {
                    scores[i] = 0;
                }

                // 统计关键词匹配（带权重）
                const keywords = typeKeywords[currentLang];
                Object.keys(keywords).forEach(type => {
                    const groups = keywords[type];
                    groups.forEach(group => {
                        group.words.forEach(word => {
                            const regex = new RegExp(word, 'gi');
                            const matches = text.match(regex);
                            if (matches) {
                                scores[type] += matches.length * group.weight;
                            }
                        });
                    });
                });

                // 计算总分和百分比
                const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
                const percentages = {};
                for (let i = 1; i <= 9; i++) {
                    percentages[i] = Math.round((scores[i] / total) * 100);
                }

                // 找出主导类型
                let maxScore = 0;
                let mainType = 1;
                for (let i = 1; i <= 9; i++) {
                    if (scores[i] > maxScore) {
                        maxScore = scores[i];
                        mainType = i;
                    }
                }

                // 显示结果
                showResult(percentages, mainType);
            } catch (e) {
                console.error('分析出错:', e);
                alert(t.error);
            } finally {
                // 恢复按钮
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = t.analyzeBtn;
            }
        }

        // 显示结果
        function showResult(percentages, mainType) {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').classList.add('show');

            // 设置饼图变量
            const chart = document.getElementById('pieChart');
            let cumulativeDeg = 0;
            
            for (let i = 1; i <= 9; i++) {
                const deg = percentages[i] * 3.6;
                chart.style.setProperty(`--t${i}-deg`, `${cumulativeDeg + deg}deg`);
                cumulativeDeg += deg;
            }

            // 设置主导类型
            document.getElementById('mainType').textContent = `Type ${mainType}`;
            document.getElementById('mainTypeLabel').textContent = i18n[currentLang].mainTypeLabel;

            // 生成图例
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            // 按百分比排序
            const sorted = Object.entries(percentages).sort((a, b) => b[1] - a[1]);
            
            sorted.forEach(([type, percent]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${typeColors[type - 1]}"></div>
                    <span class="legend-text">Type ${type} - ${typeNames[currentLang][type]}</span>
                    <span class="legend-percent">${percent}%</span>
                `;
                legend.appendChild(item);
            });

            // 设置主导类型描述
            updateResultText(mainType);
        }

        // 重新开始
        function restartTest() {
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('selfDesc').value = '';
        }
    </script>
</body>
</html>
