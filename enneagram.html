<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #9a7a8a 0%, #aa8a9a 50%, #ba9aaa 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.2em;
            color: #5a4a5a;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 1em;
            color: #7a6a7a;
            margin-bottom: 30px;
            font-style: italic;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(154, 122, 138, 0.2);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-card {
            background: rgba(154, 122, 138, 0.08);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid rgba(154, 122, 138, 0.2);
            display: none;
        }

        .question-card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            font-size: 0.85em;
            color: #9a7a8a;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.2em;
            color: #5a4a5a;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(154, 122, 138, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            color: #5a4a5a;
        }

        .option:hover {
            background: rgba(154, 122, 138, 0.15);
            border-color: rgba(154, 122, 138, 0.6);
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border-color: rgba(154, 122, 138, 0.8);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-prev {
            background: linear-gradient(135deg, #a0a0a0, #b0b0b0);
            color: #fff;
        }

        .btn-next {
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            display: none;
            text-align: center;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .result-type {
            font-size: 3em;
            color: #9a7a8a;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .result-name {
            font-size: 1.5em;
            color: #5a4a5a;
            margin-bottom: 20px;
        }

        .result-desc {
            font-size: 1.1em;
            color: #7a6a7a;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: left;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            transform: translateX(-5px);
        }

        .intro-text {
            background: rgba(154, 122, 138, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 4px solid #9a7a8a;
        }

        .intro-text p {
            font-size: 1em;
            color: #5a4a5a;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .question-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 九型人格测试</h1>
        <p class="subtitle">探索你的核心动机与深层恐惧</p>

        <div class="intro-text" id="introText">
            <p><strong>九型人格（Enneagram）</strong>是一种古老的智慧系统，将人的性格分为九种基本类型。</p>
            <p>与 MBTI 不同，九型人格关注的是<strong>内在动机</strong>和<strong>核心恐惧</strong>，而非行为偏好。</p>
            <p>本测试共 18 道题，请根据你的<strong>第一反应</strong>选择最符合你的选项。</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="quizContainer"></div>

        <div class="result-card" id="resultCard">
            <div class="result-type" id="resultType"></div>
            <div class="result-name" id="resultName"></div>
            <div class="result-desc" id="resultDesc"></div>
            <button class="btn btn-next" onclick="restartTest()">🔄 重新测试</button>
            <br>
            <a href="index.html" class="back-link">← 返回主页</a>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-prev" id="btnPrev" onclick="prevQuestion()" disabled>← 上一题</button>
            <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
    </div>

    <script>
        // 九型人格测试题目（18 题）
        const questions = [
            {
                text: "当你面临压力时，你倾向于：",
                options: [
                    { text: "追求完美，纠正错误", type: 1 },
                    { text: "帮助他人，满足他人需求", type: 2 },
                    { text: "努力工作，争取成就", type: 3 },
                    { text: "退缩到内心世界", type: 4 }
                ]
            },
            {
                text: "你最大的恐惧是：",
                options: [
                    { text: "被批评、不完美", type: 1 },
                    { text: "不被爱、不被需要", type: 2 },
                    { text: "失败、没有价值", type: 3 },
                    { text: "平凡、没有独特性", type: 4 }
                ]
            },
            {
                text: "你希望别人如何看待你：",
                options: [
                    { text: "正直、有原则", type: 1 },
                    { text: "善良、乐于助人", type: 2 },
                    { text: "成功、有能力", type: 3 },
                    { text: "独特、有深度", type: 4 }
                ]
            },
            {
                text: "你做决定时主要依靠：",
                options: [
                    { text: "逻辑和客观分析", type: 5 },
                    { text: "直觉和想象力", type: 4 },
                    { text: "经验和安全感", type: 6 },
                    { text: "乐观和可能性", type: 7 }
                ]
            },
            {
                text: "在团队中，你通常扮演：",
                options: [
                    { text: "领导者，掌控全局", type: 8 },
                    { text: "协调者，维护和谐", type: 9 },
                    { text: "执行者，完成任务", type: 3 },
                    { text: "创新者，提出新想法", type: 7 }
                ]
            },
            {
                text: "你处理冲突的方式是：",
                options: [
                    { text: "直面冲突，据理力争", type: 8 },
                    { text: "避免冲突，寻求和平", type: 9 },
                    { text: "分析局势，谨慎应对", type: 6 },
                    { text: "转移话题，寻找乐趣", type: 7 }
                ]
            },
            {
                text: "你最看重：",
                options: [
                    { text: "知识和理解", type: 5 },
                    { text: "安全和稳定", type: 6 },
                    { text: "自由和选择", type: 7 },
                    { text: "控制和力量", type: 8 }
                ]
            },
            {
                text: "你的时间通常花在：",
                options: [
                    { text: "学习和研究感兴趣的事物", type: 5 },
                    { text: "准备应对可能的风险", type: 6 },
                    { text: "体验新事物，避免无聊", type: 7 },
                    { text: "保护自己和身边的人", type: 8 }
                ]
            },
            {
                text: "别人对你的评价通常是：",
                options: [
                    { text: "理性、独立", type: 5 },
                    { text: "忠诚、可靠", type: 6 },
                    { text: "热情、有趣", type: 7 },
                    { text: "强势、有保护欲", type: 8 }
                ]
            },
            {
                text: "你感到最舒适的状态是：",
                options: [
                    { text: "独处，不受打扰", type: 5 },
                    { text: "有明确的指导和规则", type: 6 },
                    { text: "有多种选择和可能性", type: 7 },
                    { text: "掌控局面，做决定", type: 8 }
                ]
            },
            {
                text: "你的核心动机是：",
                options: [
                    { text: "维持内心的平静和和谐", type: 9 },
                    { text: "被他人需要和欣赏", type: 2 },
                    { text: "做到最好，追求卓越", type: 1 },
                    { text: "保持独立和自给自足", type: 5 }
                ]
            },
            {
                text: "你最容易陷入的情绪是：",
                options: [
                    { text: "愤怒（对自己或他人）", type: 8 },
                    { text: "羞耻/自卑感", type: 4 },
                    { text: "焦虑/担忧", type: 6 },
                    { text: "麻木/惰性", type: 9 }
                ]
            },
            {
                text: "你对待规则的态度是：",
                options: [
                    { text: "严格遵守，认为规则很重要", type: 1 },
                    { text: "根据情况灵活调整", type: 9 },
                    { text: "质疑规则，寻求更好的方式", type: 5 },
                    { text: "利用规则达成目标", type: 3 }
                ]
            },
            {
                text: "你表达爱的方式是：",
                options: [
                    { text: "为对方做事，满足需求", type: 2 },
                    { text: "给予对方空间和自由", type: 5 },
                    { text: "保护对方，提供支持", type: 8 },
                    { text: "与对方分享美好体验", type: 7 }
                ]
            },
            {
                text: "你面对挑战时：",
                options: [
                    { text: "迎难而上，绝不退缩", type: 8 },
                    { text: "寻求他人帮助和支持", type: 2 },
                    { text: "先观察，再行动", type: 6 },
                    { text: "找到有趣的角度看待它", type: 7 }
                ]
            },
            {
                text: "你最不能忍受：",
                options: [
                    { text: "不公平和不正义", type: 1 },
                    { text: "被忽视和被拒绝", type: 2 },
                    { text: "被控制和被束缚", type: 8 },
                    { text: "无聊和重复", type: 7 }
                ]
            },
            {
                text: "你的成长方向是：",
                options: [
                    { text: "学会放松，接受不完美", type: 1 },
                    { text: "学会爱自己，而不只是爱他人", type: 2 },
                    { text: "学会做真实的自己，而非迎合他人", type: 3 },
                    { text: "学会放下过去，活在当下", type: 4 }
                ]
            },
            {
                text: "你希望被记住为：",
                options: [
                    { text: "一个有原则的人", type: 1 },
                    { text: "一个善良的人", type: 2 },
                    { text: "一个成功的人", type: 3 },
                    { text: "一个独特的人", type: 4 },
                    { text: "一个智慧的人", type: 5 },
                    { text: "一个忠诚的人", type: 6 },
                    { text: "一个快乐的人", type: 7 },
                    { text: "一个强大的人", type: 8 },
                    { text: "一个平和的人", type: 9 }
                ]
            }
        ];

        // 九型人格结果描述
        const results = {
            1: {
                name: "完美主义者（The Reformer）",
                desc: "你追求完美，有强烈的道德感和原则性。你希望世界变得更好，对自己和他人都有很高的标准。你的核心恐惧是被批评、不完美，核心动机是做到正确和正直。\n\n优势：正直、负责、自律、追求卓越\n挑战：过度批判、僵化、难以放松\n成长方向：学会接受不完美，对自己和他人更宽容"
            },
            2: {
                name: "给予者（The Helper）",
                desc: "你温暖、慷慨，总是把他人需求放在自己之前。你渴望被爱和被需要，通过帮助他人来获得价值感。你的核心恐惧是不被爱、不被需要，核心动机是被他人需要和欣赏。\n\n优势：善良、同理心强、乐于助人\n挑战：忽视自己需求、过度付出、期待回报\n成长方向：学会爱自己，设立健康的边界"
            },
            3: {
                name: "成就者（The Achiever）",
                desc: "你目标明确，效率高，渴望成功和被认可。你善于适应环境，展现他人想看到的一面。你的核心恐惧是失败、没有价值，核心动机是有成就、被赞赏。\n\n优势：有动力、高效、适应力强\n挑战：过度工作、忽视感受、形象导向\n成长方向：学会做真实的自己，而非迎合他人期待"
            },
            4: {
                name: "浪漫主义者（The Individualist）",
                desc: "你敏感、富有创造力，渴望独特和深度。你容易感到与他人不同，情绪波动较大。你的核心恐惧是平凡、没有独特性，核心动机是找到真实的自我和意义。\n\n优势：创造力、深度、真实\n挑战：情绪化、自我怀疑、沉溺过去\n成长方向：学会放下过去，活在当下，发现平凡中的美"
            },
            5: {
                name: "观察者（The Investigator）",
                desc: "你理性、独立，渴望理解和掌握知识。你需要大量独处时间，情感上保持距离。你的核心恐惧是无能、被侵入，核心动机是有能力、自给自足。\n\n优势：分析力强、独立、专注\n挑战：情感疏离、过度思考、孤立\n成长方向：学会与他人建立情感连接，分享你的知识"
            },
            6: {
                name: "忠诚者（The Loyalist）",
                desc: "你忠诚、可靠，重视安全和稳定。你善于预见风险，为可能的困难做准备。你的核心恐惧是没有支持、不安全，核心动机是获得安全和确定性。\n\n优势：忠诚、负责、预见性强\n挑战：过度担忧、犹豫不决、怀疑\n成长方向：学会信任自己和他人，面对不确定性"
            },
            7: {
                name: "热情者（The Enthusiast）",
                desc: "你乐观、热情，渴望体验和自由。你善于发现可能性，避免痛苦和限制。你的核心恐惧是被束缚、痛苦，核心动机是保持快乐和自由。\n\n优势：乐观、创造力、适应力\n挑战：承诺困难、逃避痛苦、分散精力\n成长方向：学会专注和深入，面对必要的痛苦"
            },
            8: {
                name: "挑战者（The Challenger）",
                desc: "你强势、自信，渴望控制和力量。你保护自己和身边的人，直面冲突。你的核心恐惧是被伤害、被控制，核心动机是保护自己、掌控局面。\n\n优势：领导力、保护欲、直接\n挑战：过度控制、愤怒、难以示弱\n成长方向：学会示弱，信任他人，放下控制"
            },
            9: {
                name: "调停者（The Peacemaker）",
                desc: "你平和、包容，渴望和谐与平静。你善于理解各方立场，避免冲突。你的核心恐惧是冲突、分离，核心动机是维持内心的平静和外在的和谐。\n\n优势：平和、包容、善于倾听\n挑战：逃避冲突、难以做决定、自我忽视\n成长方向：学会表达自己的需求，面对必要的冲突"
            }
        };

        let currentQuestion = 0;
        let answers = [];

        // 初始化测试
        function initQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card' + (index === 0 ? ' active' : '');
                card.innerHTML = `
                    <div class="question-number">问题 ${index + 1} / ${questions.length}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" data-type="${opt.type}" onclick="selectOption(this, ${index}, ${opt.type})">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });

            updateProgress();
        }

        // 选择选项
        function selectOption(element, questionIndex, type) {
            // 移除同题其他选项的选中状态
            const options = element.parentElement.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // 选中当前选项
            element.classList.add('selected');
            
            // 保存答案
            answers[questionIndex] = type;
            
            // 启用下一题按钮
            document.getElementById('btnNext').disabled = false;
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                document.querySelectorAll('.question-card')[currentQuestion].classList.remove('active');
                currentQuestion++;
                document.querySelectorAll('.question-card')[currentQuestion].classList.add('active');
                
                document.getElementById('btnPrev').disabled = false;
                updateProgress();
                
                // 如果是最后一题，改变按钮文字
                if (currentQuestion === questions.length - 1) {
                    document.getElementById('btnNext').textContent = '查看结果 ✨';
                }
            } else {
                showResult();
            }
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                document.querySelectorAll('.question-card')[currentQuestion].classList.remove('active');
                currentQuestion--;
                document.querySelectorAll('.question-card')[currentQuestion].classList.add('active');
                
                document.getElementById('btnNext').disabled = !answers[currentQuestion];
                document.getElementById('btnNext').textContent = '下一题 →';
                
                if (currentQuestion === 0) {
                    document.getElementById('btnPrev').disabled = true;
                }
                updateProgress();
            }
        }

        // 更新进度条
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 显示结果
        function showResult() {
            // 计算各类型得分
            const scores = {};
            answers.forEach(type => {
                scores[type] = (scores[type] || 0) + 1;
            });

            // 找出得分最高的类型
            let maxScore = 0;
            let resultType = 1;
            for (let type in scores) {
                if (scores[type] > maxScore) {
                    maxScore = scores[type];
                    resultType = parseInt(type);
                }
            }

            // 隐藏测验，显示结果
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('introText').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';

            const result = results[resultType];
            document.getElementById('resultType').textContent = `Type ${resultType}`;
            document.getElementById('resultName').textContent = result.name;
            document.getElementById('resultDesc').textContent = result.desc;
            document.getElementById('resultCard').classList.add('show');
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('navButtons').style.display = 'flex';
            document.getElementById('introText').style.display = 'block';
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('btnNext').disabled = true;
            document.getElementById('btnNext').textContent = '下一题 →';
            initQuiz();
        }

        // 页面加载时初始化
        initQuiz();
    </script>
</body>
