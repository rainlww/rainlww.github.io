<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 人格检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Georgia", "Microsoft YaHei", serif;
            background: linear-gradient(135deg, #d4f0e8 0%, #e8f8f0 50%, #f0fcf4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .title {
            font-size: 2em;
            color: #5a8a7a;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 0.9em;
            color: #888;
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(90, 138, 122, 0.05), rgba(138, 170, 154, 0.05));
            border-radius: 10px;
            border-left: 4px solid #5a8a7a;
        }
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 15px 25px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            background: #fafbfc;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #7ab8a0, #8ac8b0);
            color: #fff;
            border-color: #7ab8a0;
        }
        .tab-btn:hover:not(.active) {
            background: #f0f2f5;
        }
        
        .input-section { margin-bottom: 25px; }
        .input-label { font-size: 0.9em; color: #555; margin-bottom: 10px; display: block; font-weight: 600; }
        .input-box {
            width: 100%; padding: 18px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #fafbfc;
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.8;
        }
        .input-box:focus {
            outline: none;
            border-color: #7ab8a0;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(122, 184, 160, 0.15);
        }
        .btn {
            width: 100%; padding: 18px 35px;
            border: none; border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7ab8a0, #8ac8b0);
            color: #fff;
            box-shadow: 0 8px 25px rgba(122, 184, 160, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(122, 184, 160, 0.4); }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .btn-secondary {
            background: linear-gradient(135deg, #a8b8b0, #b8c8c0);
            color: #fff;
            padding: 14px 20px;
            font-size: 0.95em;
        }
        .btn-success { background: linear-gradient(135deg, #88c8a0, #98d8b0); }
        .hidden { display: none !important; }
        
        .result-header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(122, 184, 160, 0.08), rgba(138, 200, 176, 0.08));
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #7ab8a0;
        }
        .mbti-type {
            font-size: 3.5em;
            font-weight: bold;
            color: #5a8a7a;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .mbti-name { font-size: 1.3em; color: #666; margin-bottom: 15px; }
        .confidence-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #7ab8a0, #8ac8b0);
            color: #fff;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .type-description {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            border-left: 4px solid #7ab8a0;
            text-align: left;
        }
        .type-description h3 {
            color: #5a8a7a;
            font-size: 1.1em;
            margin-bottom: 12px;
        }
        .type-description p {
            color: #555;
            line-height: 2;
            font-size: 0.95em;
            text-align: justify;
        }
        
        .dimensions-section {
            margin-bottom: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }
        .section-title {
            font-size: 1.2em;
            color: #5a8a7a;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(90, 138, 122, 0.2);
        }
        .dimension-row {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .dimension-label {
            font-size: 0.9em;
            color: #555;
            font-weight: 600;
        }
        .dimension-bar-container {
            height: 10px;
            background: rgba(122, 184, 160, 0.15);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .dimension-bar {
            height: 100%;
            background: linear-gradient(90deg, #7ab8a0, #8ac8b0, #9ad8c0);
            border-radius: 5px;
            transition: width 1s ease;
        }
        .dimension-center {
            width: 2px;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .functions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .function-card {
            padding: 20px;
            background: linear-gradient(135deg, rgba(122, 184, 160, 0.06), rgba(138, 200, 176, 0.06));
            border-radius: 12px;
            border-left: 4px solid #7ab8a0;
        }
        .function-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #5a8a7a;
            margin-bottom: 8px;
        }
        .function-role {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(122, 184, 160, 0.15);
            color: #5a8a7a;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .function-desc { font-size: 0.85em; color: #666; line-height: 1.7; }
        
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a {
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(122, 184, 160, 0.8), rgba(138, 200, 176, 0.8));
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-block;
        }
        .back-link a:hover {
            background: linear-gradient(135deg, rgba(122, 184, 160, 1), rgba(138, 200, 176, 1));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .loading-section { text-align: center; padding: 50px 30px; }
        #loadingText { font-size: 0.9em; color: #7ab8a0; margin-bottom: 12px; font-style: italic; }
        
        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            .title { font-size: 1.6em; }
            .btn-group { grid-template-columns: 1fr; }
            .tabs { grid-template-columns: 1fr; }
            .dimension-row { grid-template-columns: 1fr; gap: 8px; }
            .functions-grid { grid-template-columns: 1fr; }
            .mbti-type { font-size: 2.5em; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">MBTI 人格类型检测</h1>
            <p class="subtitle">基于语义分析的人格类型测试</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('text')">📝 粘贴简介</button>
                <button class="tab-btn" onclick="switchTab('link')">🔗 Neta 链接</button>
            </div>
            
            <div id="textSection" class="input-section">
                <label class="input-label">请输入人物简介/行为描述/自述</label>
                <textarea class="input-box" id="textInput"></textarea>
            </div>
            
            <div id="linkSection" class="input-section hidden">
                <label class="input-label">请输入 Neta 人物链接或安利语</label>
                <div style="padding: 20px; background: linear-gradient(135deg, rgba(255, 193, 7, 0.08), rgba(255, 152, 0, 0.08)); border: 2px dashed rgba(255, 152, 0, 0.3); border-radius: 12px; text-align: center; margin-bottom: 15px;">
                    <div style="font-size: 1.1em; color: #ffb84d; font-weight: bold; margin-bottom: 8px;">🔧 维护中……</div>
                    <div style="font-size: 0.85em; color: #888; line-height: 1.6;">
                        链接自动获取功能暂时不可用<br>
                        请切换到「📝 粘贴简介」标签页手动输入～
                    </div>
                </div>
                <textarea class="input-box" id="linkInput" disabled style="opacity: 0.5; background: #f5f5f5;"></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="analyzeMBTI()" id="analyzeBtn">🔬 开始分析</button>
            
            <div class="loading-section hidden" id="loadingSection">
                <div id="loadingText" style="font-size: 0.9em; color: #7ab8a0; margin-bottom: 12px; font-style: italic;">执行者雨落正在读你的心……</div>
                <div style="width: 250px; height: 8px; background: rgba(122, 184, 160, 0.2); border-radius: 4px; margin: 0 auto; overflow: hidden;">
                    <div id="loadingBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #7ab8a0, #8ac8b0, #9ad8c0); border-radius: 4px; transition: width 0.3s ease;"></div>
                </div>
            </div>
            
            <div class="output-section hidden" id="mbtiResultSection">
                <div id="mbtiResult"></div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-secondary btn-success" onclick="copyMBTIResult()">📋 复制报告</button>
                    <button class="btn btn-secondary" onclick="resetMBTI()">🗑️ 重新分析</button>
                </div>
            </div>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>
    
    <div id="toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px; border-radius: 12px; opacity: 0; transition: opacity 0.3s ease; font-weight: 500; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">已复制！</div>
    
    <script>
        function switchTab(tab) {
            const textSection = document.getElementById('textSection');
            const linkSection = document.getElementById('linkSection');
            const tabBtns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'text') {
                textSection.classList.remove('hidden');
                linkSection.classList.add('hidden');
                tabBtns[0].classList.add('active');
                tabBtns[1].classList.remove('active');
            } else {
                textSection.classList.add('hidden');
                linkSection.classList.remove('hidden');
                tabBtns[0].classList.remove('active');
                tabBtns[1].classList.add('active');
            }
        }

        // ========== 语义分析引擎 ==========
        // 基于完整语义的关键词匹配

                desc: '具有创造力的发明家，对知识有着止不住的渴望',

        function getOppositeDimension(dim) {
            const opposites = { E: 'I', I: 'E', S: 'N', N: 'S', T: 'F', F: 'T', J: 'P', P: 'J' };
            return opposites[dim];
        }

        function analyzeSemantically(text) {
            const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            const matchedPatterns = { E: [], I: [], S: [], N: [], T: [], F: [], J: [], P: [] };
            
            for (const [dimension, patterns] of Object.entries(semanticPatterns)) {
                for (const { pattern, weight, desc } of patterns) {
                    const match = text.match(pattern);
                    if (match) {
                        if (weight > 0) {
                            scores[dimension] += weight;
                            if (!matchedPatterns[dimension].includes(desc)) {
                                matchedPatterns[dimension].push(desc);
                            }
                        } else if (weight < 0) {
                            const opposite = getOppositeDimension(dimension);
                            scores[opposite] += Math.abs(weight);
                            if (!matchedPatterns[opposite].includes(desc)) {
                                matchedPatterns[opposite].push(desc);
                            }
                        }
                    }
                }
            }
            
            return { scores, matchedPatterns };
        }

        function deriveMBTIType(functionScores) {
            const { scores } = functionScores;
            const EI = scores.E >= scores.I ? 'E' : 'I';
            const SN = scores.S >= scores.N ? 'S' : 'N';
            const TF = scores.T >= scores.F ? 'T' : 'F';
            const JP = scores.J >= scores.P ? 'J' : 'P';
            return EI + SN + TF + JP;
        }

        function generateProfessionalReport(text, mbtiType, functionScores) {
            const { scores, matchedPatterns } = functionScores;
            const stack = typeFunctionStacks[mbtiType];
            const typeInfo = typeDescriptions[mbtiType];
            
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const confidence = totalScore > 15 ? '较高' : totalScore > 8 ? '中等' : '仅供参考';
            
            const EI_total = scores.E + scores.I;
            const SN_total = scores.S + scores.N;
            const TF_total = scores.T + scores.F;
            const JP_total = scores.J + scores.P;
            
            const percents = {
                E: EI_total > 0 ? Math.round((scores.E / EI_total) * 100) : 50,
                I: EI_total > 0 ? Math.round((scores.I / EI_total) * 100) : 50,
                S: SN_total > 0 ? Math.round((scores.S / SN_total) * 100) : 50,
                N: SN_total > 0 ? Math.round((scores.N / SN_total) * 100) : 50,
                T: TF_total > 0 ? Math.round((scores.T / TF_total) * 100) : 50,
                F: TF_total > 0 ? Math.round((scores.F / TF_total) * 100) : 50,
                J: JP_total > 0 ? Math.round((scores.J / JP_total) * 100) : 50,
                P: JP_total > 0 ? Math.round((scores.P / JP_total) * 100) : 50
            };
            
            return {
                type: mbtiType,
                name: typeInfo.name,
                desc: typeInfo.desc,
                intro: typeInfo.intro,
                confidence,
                percents,
                scores,
                matchedPatterns,
                stack: stack
            };
        }

        async function analyzeMBTI() {
            try {
                const currentTab = document.querySelector('.tab-btn.active');
                const isTextTab = currentTab.textContent.includes('粘贴简介');
                
                let input = '';
                
                if (isTextTab) {
                    input = document.getElementById('textInput').value.trim();
                    if (!input) { showToast('请输入人物描述～'); return; }
                } else {
                    showToast('链接功能维护中，请使用文本输入～');
                    return;
                }
                
                if (input.length < 10) { showToast('描述太短了，请提供更详细的信息～'); return; }
                
                const analyzeBtn = document.getElementById('analyzeBtn');
                const loadingSection = document.getElementById('loadingSection');
                const loadingBar = document.getElementById('loadingBar');
                const resultSection = document.getElementById('mbtiResultSection');
                
                analyzeBtn.classList.add('hidden');
                resultSection.classList.add('hidden');
                loadingSection.classList.remove('hidden');
                loadingBar.style.width = '0%';
                
                let progress = 0;
                const loadingInterval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    if (progress > 100) progress = 100;
                    loadingBar.style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(loadingInterval);
                        setTimeout(() => { showResult(input); }, 500);
                    }
                }, 400);
            } catch (error) {
                console.error('analyzeMBTI 出错:', error);
                showToast('分析失败：' + error.message);
                document.getElementById('analyzeBtn').classList.remove('hidden');
                document.getElementById('loadingSection').classList.add('hidden');
            }
        }

            try {
                const functionScores = analyzeSemantically(input);
                const mbtiType = deriveMBTIType(functionScores);
                const report = generateProfessionalReport(input, mbtiType, functionScores);
                displayResult(mbtiType, report);
            } catch (error) {
                console.error('分析过程出错:', error);
                showToast('分析失败：' + error.message);
            } finally {
                document.getElementById('analyzeBtn').classList.remove('hidden');
                document.getElementById('loadingSection').classList.add('hidden');

        function copyMBTIResult() {
            const resultDiv = document.getElementById('mbtiResult');
            const type = resultDiv.querySelector('.mbti-type').textContent;
            const name = resultDiv.querySelector('.mbti-name').textContent;
            const intro = resultDiv.querySelector('.type-description p').textContent;
            const text = `MBTI 人格类型：${type} - ${name}\n\n${intro}`;
            const tempInput = document.createElement('textarea');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast('已复制结果！');
        }

        function resetMBTI() {
            document.getElementById('textInput').value = '';

        function showToast(message) {
            const toast = document.getElementById('toast');
