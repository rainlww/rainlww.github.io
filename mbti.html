<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 人格检测 - 专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Georgia", "Microsoft YaHei", serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        .title {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(240, 147, 251, 0.08));
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        /* 选项卡 */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 15px 25px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            background: #fafbfc;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: #667eea;
        }
        .tab-btn:hover:not(.active) {
            background: #f0f2f5;
        }
        
        .input-section { margin-bottom: 25px; }
        .input-label { font-size: 0.9em; color: #555; margin-bottom: 10px; display: block; font-weight: 600; }
        .input-box {
            width: 100%; padding: 18px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #fafbfc;
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.8;
        }
        .input-box:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
        }
        .btn {
            width: 100%; padding: 18px 35px;
            border: none; border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45); }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .btn-secondary {
            background: linear-gradient(135deg, #a8a8b0, #b8b8c0);
            color: #fff;
            padding: 14px 20px;
            font-size: 0.95em;
        }
        .btn-success { background: linear-gradient(135deg, #27ae60, #229954); }
        .hidden { display: none !important; }
        
        /* 结果样式 */
        .result-header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #667eea;
        }
        .mbti-type {
            font-size: 3.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .mbti-name { font-size: 1.3em; color: #666; margin-bottom: 15px; }
        .confidence-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        /* 维度分析 */
        .dimensions-section {
            margin-bottom: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }
        .section-title {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }
        .dimension-row {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .dimension-label {
            font-size: 0.9em;
            color: #555;
            font-weight: 600;
        }
        .dimension-bar-container {
            height: 10px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .dimension-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 5px;
            transition: width 1s ease;
        }
        .dimension-center {
            width: 2px;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 认知功能 */
        .functions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .function-card {
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(240, 147, 251, 0.08));
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .function-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }
        .function-role {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .function-desc { font-size: 0.85em; color: #666; line-height: 1.7; }
        
        /* 分析报告 */
        .analysis-section {
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .analysis-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed rgba(102, 126, 234, 0.2);
        }
        .analysis-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .analysis-label {
            font-size: 0.95em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .analysis-content {
            font-size: 0.9em;
            color: #444;
            line-height: 2;
            text-align: justify;
        }
        
        /* 发展建议 */
        .suggestions-section {
            padding: 25px;
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.08), rgba(34, 153, 84, 0.08));
            border-radius: 15px;
            border-left: 4px solid #27ae60;
        }
        .suggestion-item {
            margin-bottom: 15px;
            padding-left: 25px;
            position: relative;
        }
        .suggestion-item::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }
        .suggestion-text { font-size: 0.9em; color: #444; line-height: 1.8; }
        
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a {
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
            border-radius: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            display: inline-block;
        }
        .back-link a:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.25));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .loading-section { text-align: center; padding: 50px 30px; }
        .loading-section > div:first-child { font-size: 4em; margin-bottom: 25px; animation: bounce 1.5s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            .title { font-size: 1.6em; }
            .btn-group { grid-template-columns: 1fr; }
            .tabs { grid-template-columns: 1fr; }
            .dimension-row { grid-template-columns: 1fr; gap: 8px; }
            .functions-grid { grid-template-columns: 1fr; }
            .mbti-type { font-size: 2.5em; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">🧠 MBTI 人格类型检测</h1>
            <p class="subtitle">基于荣格八维认知功能理论的专业人格分析</p>
            
            <!-- 选项卡 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('text')">📝 粘贴简介</button>
                <button class="tab-btn" onclick="switchTab('link')">🔗 Neta 链接</button>
            </div>
            
            <!-- 文本输入区 -->
            <div id="textSection" class="input-section">
                <label class="input-label">请输入人物简介/行为描述/自述</label>
                <textarea class="input-box" id="textInput"></textarea>
            </div>
            
            <!-- 链接输入区 -->
            <div id="linkSection" class="input-section hidden">
                <label class="input-label">请输入 Neta 人物链接或安利语</label>

            </div>
            
            <button class="btn btn-primary" onclick="analyzeMBTI()" id="analyzeBtn">🔬 开始专业分析</button>
            
            <div class="loading-section hidden" id="loadingSection">
                <div id="loadingText" style="font-size: 0.9em; color: #667eea; margin-bottom: 12px; font-style: italic;">执行者雨落正在读你的心……</div>
                <div style="width: 250px; height: 8px; background: rgba(102, 126, 234, 0.2); border-radius: 4px; margin: 0 auto; overflow: hidden;">
                    <div id="loadingBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #667eea, #764ba2, #f093fb); border-radius: 4px; transition: width 0.3s ease;"></div>
                </div>
            </div>
            
            <div class="output-section hidden" id="mbtiResultSection">
                <div id="mbtiResult"></div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-secondary btn-success" onclick="copyMBTIResult()">📋 复制报告</button>
                    <button class="btn btn-secondary" onclick="resetMBTI()">🗑️ 重新分析</button>
                </div>
            </div>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>
    
    <div id="toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px; border-radius: 12px; opacity: 0; transition: opacity 0.3s ease; font-weight: 500; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">已复制！</div>

            const textSection = document.getElementById('textSection');

            if (tab === 'text') {
                textSection.classList.remove('hidden');
                linkSection.classList.add('hidden');
                tabBtns[0].classList.add('active');
                tabBtns[1].classList.remove('active');

        // Neta 链接解析器 - 支持多种格式
        function parseNetaLink(text) {
            // 格式 1: 完整句子 "我在捏 Ta 给你安利...（角色名）～ https://t.nieta.art/xxx"
            const sentencePattern = /(?:nieta|捏 Ta|捏捏).*?(https?:\/\/[^\s]+)/i;
            const sentenceMatch = text.match(sentencePattern);
            if (sentenceMatch) {
                const url = sentenceMatch[1];
                const result = extractUuidFromUrl(url);
                if (result) return result;
            }
            
            // 格式 2: 直接 URL
            const urlPatterns = [
                /https?:\/\/t\.nieta\.art\/([a-zA-Z0-9_-]+)/i,
                /https?:\/\/nieta\.art\/character\/([a-f0-9-]+)/i,
                /https?:\/\/nieta\.art\/([a-f0-9-]+)/i,
                /https?:\/\/app\.nieta\.art\/[^\s]*uuid=([a-f0-9-]+)/i,
                /https?:\/\/[^\s]*uuid=([a-f0-9-]+)/i
            ];
            
            for (const pattern of urlPatterns) {
                const match = text.match(pattern);
                if (match) {
                    const extracted = match[1].toLowerCase();
                    // 如果是 UUID 格式（36 字符），直接返回
                    if (/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$/i.test(extracted)) {
                        return extracted;
                    }
                    // 如果是短链接 ID，返回标记
                    return { type: 'short', id: extracted };
                }
            }
            
            // 格式 3: 单独 UUID
            const uuidPattern = /([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})/i;
            const uuidMatch = text.match(uuidPattern);
            if (uuidMatch) {
                return uuidMatch[1].toLowerCase();
            }
            
            return null;
        }
        
        // 从 URL 中提取 UUID
        function extractUuidFromUrl(url) {
            // 短链接：https://t.nieta.art/VlIVZA7l
            const shortPattern = /t\.nieta\.art\/([a-zA-Z0-9_-]+)/i;
            const shortMatch = url.match(shortPattern);
            if (shortMatch) {
                const id = shortMatch[1].toLowerCase();
                if (/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$/i.test(id)) {
                    return id;
                }
                return { type: 'short', id: id };
            }
            
            // 标准链接：https://nieta.art/character/xxx
            const charPattern = /nieta\.art\/character\/([a-f0-9-]+)/i;
            const charMatch = url.match(charPattern);
            if (charMatch) return charMatch[1].toLowerCase();
            
            // 带参数的链接：https://app.nieta.art/...?uuid=xxx
            const paramPattern = /uuid=([a-f0-9-]+)/i;
            const paramMatch = url.match(paramPattern);
            if (paramMatch) return paramMatch[1].toLowerCase();
            
            return null;
        }

        // 从 Neta API 获取角色简介
        async function fetchNetaCharacter(uuid) {
            const apiUrl = `https://api.talesofai.com/v2/travel/parent/${uuid}/profile`;
            
            try {
                // 尝试使用 CORS 代理
                const corsProxies = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`,
                    `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`
                ];
                
                let data = null;
                let lastError = null;
                
                for (const proxyUrl of corsProxies) {
                    try {
                        console.log('尝试代理:', proxyUrl);
                        const response = await fetch(proxyUrl, {
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json'
                            }
                        });
                        console.log('响应状态:', response.status);
                        if (response.ok) {
                            data = await response.json();
                            console.log('成功获取数据:', data);
                            break;
                        }
                    } catch (e) {
                        lastError = e;
                        console.log(`代理 ${proxyUrl} 失败:`, e.message);
                    }
                }
                
                if (!data) {
                    console.error('所有代理都失败，最后错误:', lastError);
                    throw new Error('无法连接到 Neta API，可能是 CORS 限制或网络问题');
                }
                
                // 提取简介信息（按优先级）
                const bio = data.oc_bio || {};
                const description = bio.description || bio.persona || data.name || '';
                
                console.log('提取的简介:', description.substring(0, 50) + '...');
                return description;
            } catch (error) {
                console.error('获取 Neta 角色失败:', error);
                throw error;
            }
        }

        function analyzeCognitiveFunctions(text) {
            const textLower = text.toLowerCase();
            const scores = {};
            const matchedKeywords = {};
            
            for (const [func, data] of Object.entries(cognitiveFunctions)) {
                scores[func] = 0;
                matchedKeywords[func] = [];
                
                for (const keyword of data.keywords) {
                    const kwLower = keyword.toLowerCase();
                    if (textLower.includes(kwLower)) {
                        const lengthBonus = kwLower.length > 4 ? 1.5 : 1;
                        scores[func] += data.weight * lengthBonus;
                        if (!matchedKeywords[func].includes(keyword)) {
                            matchedKeywords[func].push(keyword);
                        }
                    }
                }
            }
            
            return { scores, matchedKeywords };
        }

        function deriveMBTIType(functionScores) {
            const { scores } = functionScores;
            
            const E_score = scores.Ne + scores.Se + scores.Te + scores.Fe;
            const I_score = scores.Ni + scores.Si + scores.Ti + scores.Fi;
            const EI = E_score >= I_score ? 'E' : 'I';
            
            const S_score = scores.Se + scores.Si;
            const N_score = scores.Ne + scores.Ni;
            const SN = S_score >= N_score ? 'S' : 'N';
            
            const T_score = scores.Te + scores.Ti;
            const F_score = scores.Fe + scores.Fi;
            const TF = T_score >= F_score ? 'T' : 'F';
            
            const J_score = scores.Te + scores.Fe + scores.Si + scores.Ni;
            const P_score = scores.Ti + scores.Fi + scores.Se + scores.Ne;
            const JP = J_score >= P_score ? 'J' : 'P';
            
            return EI + SN + TF + JP;
        }

        function generateProfessionalReport(text, mbtiType, functionScores) {
            const { scores, matchedKeywords } = functionScores;
            const stack = typeFunctionStacks[mbtiType];
            const typeInfo = typeDescriptions[mbtiType];
            
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const confidence = totalScore > 100 ? '非常高' : totalScore > 60 ? '较高' : totalScore > 30 ? '中等' : '仅供参考';
            
            const E_score = scores.Ne + scores.Se + scores.Te + scores.Fe;
            const I_score = scores.Ni + scores.Si + scores.Ti + scores.Fi;
            const EI_total = E_score + I_score || 1;
            
            const S_score = scores.Se + scores.Si;
            const N_score = scores.Ne + scores.Ni;
            const SN_total = S_score + N_score || 1;
            
            const T_score = scores.Te + scores.Ti;
            const F_score = scores.Fe + scores.Fi;
            const TF_total = T_score + F_score || 1;
            
            const J_score = scores.Te + scores.Fe + scores.Si + scores.Ni;
            const P_score = scores.Ti + scores.Fi + scores.Se + scores.Ne;
            const JP_total = J_score + P_score || 1;
            
            const percents = {
                E: Math.round((E_score / EI_total) * 100),
                I: Math.round((I_score / EI_total) * 100),
                S: Math.round((S_score / SN_total) * 100),
                N: Math.round((N_score / SN_total) * 100),
                T: Math.round((T_score / TF_total) * 100),
                F: Math.round((F_score / TF_total) * 100),
                J: Math.round((J_score / JP_total) * 100),
                P: Math.round((P_score / JP_total) * 100)
            };
            
            return {
                type: mbtiType,
                name: typeInfo.name,
                desc: typeInfo.desc,
                confidence,
                percents,
                stack,
                scores,
                matchedKeywords,
                suggestions: generateSuggestions(mbtiType, functionScores)
            };
        }
