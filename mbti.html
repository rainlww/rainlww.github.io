<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 人格检测 - 专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Georgia", "Microsoft YaHei", serif;
            background: linear-gradient(135deg, #a8c8a8 0%, #b8d8b8 50%, #c8e8c8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        .title {
            font-size: 2em;
            background: linear-gradient(135deg, #5a8a5a, #6a9a6a, #7aaa7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(90, 138, 90, 0.08), rgba(106, 154, 106, 0.08));
            border-radius: 10px;
            border-left: 4px solid #5a8a5a;
        }
        
        .accuracy-notice {
            font-size: 0.8em;
            color: #ff9800;
            text-align: center;
            margin-bottom: 25px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.08), rgba(255, 193, 7, 0.08));
            border-radius: 10px;
            border: 1px dashed rgba(255, 152, 0, 0.4);
        }
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 15px 25px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            background: #fafbfc;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #5a8a5a, #6a9a6a);
            color: #fff;
            border-color: #5a8a5a;
        }
        .tab-btn:hover:not(.active) {
            background: #f0f2f5;
        }
        
        .input-section { margin-bottom: 25px; }
        .input-label { font-size: 0.9em; color: #555; margin-bottom: 10px; display: block; font-weight: 600; }
        .input-box {
            width: 100%; padding: 18px;
            border: 2px solid #e0e8ea;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #fafbfc;
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.8;
        }
        .input-box:focus {
            outline: none;
            border-color: #5a8a5a;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(90, 138, 90, 0.12);
        }
        .btn {
            width: 100%; padding: 18px 35px;
            border: none; border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5a8a5a, #6a9a6a);
            color: #fff;
            box-shadow: 0 8px 25px rgba(90, 138, 90, 0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(90, 138, 90, 0.45); }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .btn-secondary {
            background: linear-gradient(135deg, #a8a8b0, #b8b8c0);
            color: #fff;
            padding: 14px 20px;
            font-size: 0.95em;
        }
        .btn-success { background: linear-gradient(135deg, #27ae60, #229954); }
        .hidden { display: none !important; }
        
        .result-header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(90, 138, 90, 0.1), rgba(106, 154, 106, 0.1));
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #5a8a5a;
        }
        .mbti-type {
            font-size: 3.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #5a8a5a, #6a9a6a, #7aaa7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .mbti-name { font-size: 1.3em; color: #666; margin-bottom: 15px; }
        .confidence-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #5a8a5a, #6a9a6a);
            color: #fff;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .dimensions-section {
            margin-bottom: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }
        .section-title {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }
        .dimension-row {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .dimension-label {
            font-size: 0.9em;
            color: #555;
            font-weight: 600;
        }
        .dimension-bar-container {
            height: 10px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .dimension-bar {
            height: 100%;
            background: linear-gradient(90deg, #5a8a5a, #6a9a6a, #7aaa7a);
            border-radius: 5px;
            transition: width 1s ease;
        }
        .dimension-center {
            width: 2px;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .functions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .function-card {
            padding: 20px;
            background: linear-gradient(135deg, rgba(90, 138, 90, 0.08), rgba(106, 154, 106, 0.08));
            border-radius: 12px;
            border-left: 4px solid #5a8a5a;
        }
        .function-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #5a8a5a;
            margin-bottom: 8px;
        }
        .function-role {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(90, 138, 90, 0.15);
            color: #5a8a5a;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .function-desc { font-size: 0.85em; color: #666; line-height: 1.7; }
        
        .analysis-section {
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .analysis-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed rgba(102, 126, 234, 0.2);
        }
        .analysis-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .analysis-label {
            font-size: 0.95em;
            color: #5a8a5a;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .analysis-content {
            font-size: 0.9em;
            color: #444;
            line-height: 2;
            text-align: justify;
        }
        
        .suggestions-section {
            padding: 25px;
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.08), rgba(34, 153, 84, 0.08));
            border-radius: 15px;
            border-left: 4px solid #27ae60;
        }
        .suggestion-item {
            margin-bottom: 15px;
            padding-left: 25px;
            position: relative;
        }
        .suggestion-item::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }
        .suggestion-text { font-size: 0.9em; color: #444; line-height: 1.8; }
        
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a {
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
            border-radius: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            display: inline-block;
        }
        .back-link a:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.25));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .loading-section { text-align: center; padding: 50px 30px; }
        #loadingText { font-size: 0.9em; color: #5a8a5a; margin-bottom: 12px; font-style: italic; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            .title { font-size: 1.6em; }
            .btn-group { grid-template-columns: 1fr; }
            .tabs { grid-template-columns: 1fr; }
            .dimension-row { grid-template-columns: 1fr; gap: 8px; }
            .functions-grid { grid-template-columns: 1fr; }
            .mbti-type { font-size: 2.5em; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">MBTI 人格类型检测</h1>
            <p class="subtitle">基于荣格八维认知功能理论的专业人格分析</p>
            <p class="accuracy-notice">⚠️ 当前使用语义分析模式（简化版），精确度有限，仅供参考～ AI 精准分析功能开发中...</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('text')">📝 粘贴简介</button>
                <button class="tab-btn" onclick="switchTab('link')">🔗 Neta 链接</button>
            </div>
            
            <div id="textSection" class="input-section">
                <label class="input-label">请输入人物简介/行为描述/自述</label>
                <textarea class="input-box" id="textInput"></textarea>
            </div>
            
            <div id="linkSection" class="input-section hidden">
                <label class="input-label">请输入 Neta 人物链接或安利语</label>
                <div style="padding: 20px; background: linear-gradient(135deg, rgba(255, 193, 7, 0.1), rgba(255, 152, 0, 0.1)); border: 2px dashed rgba(255, 152, 0, 0.4); border-radius: 12px; text-align: center; margin-bottom: 15px;">
                    <div style="font-size: 1.1em; color: #ff9800; font-weight: bold; margin-bottom: 8px;">🔧 维护中……</div>
                    <div style="font-size: 0.85em; color: #888; line-height: 1.6;">
                        由于 API 接口升级，链接自动获取功能暂时不可用<br>
                        请切换到「📝 粘贴简介」标签页手动输入～<br>
                        <span style="color: #aaa; font-size: 0.8em;">（恢复时间待定）</span>
                    </div>
                </div>
                <textarea class="input-box" id="linkInput" disabled style="opacity: 0.5; background: #f5f5f5;"></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="analyzeMBTI()" id="analyzeBtn">🔬 开始专业分析</button>
            
            <div class="loading-section hidden" id="loadingSection">
                <div id="loadingText" style="font-size: 0.9em; color: #667eea; margin-bottom: 12px; font-style: italic;">执行者雨落正在读你的心……</div>
                <div style="width: 250px; height: 8px; background: rgba(90, 138, 90, 0.2); border-radius: 4px; margin: 0 auto; overflow: hidden;">
                    <div id="loadingBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #5a8a5a, #6a9a6a, #7aaa7a); border-radius: 4px; transition: width 0.3s ease;"></div>
                </div>
            </div>
            
            <div class="output-section hidden" id="mbtiResultSection">
                <div id="mbtiResult"></div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-secondary btn-success" onclick="copyMBTIResult()">📋 复制报告</button>
                    <button class="btn btn-secondary" onclick="resetMBTI()">🗑️ 重新分析</button>
                </div>
            </div>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>
    
    <div id="toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px; border-radius: 12px; opacity: 0; transition: opacity 0.3s ease; font-weight: 500; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">已复制！</div>
    
    <script>
        function switchTab(tab) {
            const textSection = document.getElementById('textSection');
            const linkSection = document.getElementById('linkSection');
            const tabBtns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'text') {
                textSection.classList.remove('hidden');
                linkSection.classList.add('hidden');
                tabBtns[0].classList.add('active');
                tabBtns[1].classList.remove('active');
            } else {
                textSection.classList.add('hidden');
                linkSection.classList.remove('hidden');
                tabBtns[0].classList.remove('active');
                tabBtns[1].classList.add('active');
            }
        }

        // ========== 语义分析引擎 ==========
        // 基于整体文本理解，不是单个词匹配
        
        // 语义模式库（按维度分类）
        const semanticPatterns = {
            // E vs I: 能量来源
            E: [
                { pattern: /喜欢 ( 和人|社交 | 聚会 | 热闹 | 朋友 | 群体|交流|聊天)/, weight: 3, desc: '偏好社交互动' },
                { pattern: / (外向|活泼 | 开朗 | 热情|善于表达|乐于分享)/, weight: 2, desc: '外向特质' },
                { pattern: / ( 人多的地方 | 人群中 | 社交场合)/, weight: 2, desc: '享受人群' },
                { pattern: / ( 主动 ( 交流 | 搭话 | 接触|认识)|喜欢 ( 认识|结交) 新朋友)/, weight: 2, desc: '主动社交' },
                { pattern: / ( 一个人|独处|独自|安静|内向|宅|不想 ( 说话 | 交流|见人)|害怕 ( 社交 | 陌生人)|社恐)/, weight: -3, desc: '回避社交（反向）' }
            ],
            I: [
                { pattern: /喜欢 ( 一个人|独处|独自|安静|宅|思考|阅读|写作)/, weight: 3, desc: '偏好独处' },
                { pattern: / (内向|安静|慢热|不善言辞|害羞|腼腆)/, weight: 2, desc: '内向特质' },
                { pattern: / ( 需要 ( 独处|个人空间|自己的时间)|在 ( 安静|独自) 环境中)/, weight: 2, desc: '需要个人空间' },
                { pattern: / ( 人多的地方 | 社交 | 聚会 | 热闹|群体活动) 感到 ( 累|疲惫 | 消耗 | 不适|想逃)/, weight: 2, desc: '社交消耗能量' },
                { pattern: / ( 朋友不多 | 几个知心朋友 | 深度交流 | 一对一)/, weight: 2, desc: '偏好深度关系' }
            ],
            
            // S vs N: 信息获取方式
            S: [
                { pattern: / ( 注重|关注|重视|在意) ( 细节|实际|现实|具体|当下|眼前|事实|数据|经验)/, weight: 3, desc: '关注具体现实' },
                { pattern: / ( 脚踏实地|实事求是 | 按部就班|循规蹈矩|一步一步)/, weight: 2, desc: '务实特质' },
                { pattern: / ( 相信 ( 经验 | 事实 | 数据|证据)|根据 ( 过去|经验 | 实际) )/, weight: 2, desc: '依赖经验' },
                { pattern: / ( 抽象|理论|概念|想象|未来|可能性|脑洞|天马行空|不切实际)/, weight: -2, desc: '回避抽象（反向）' }
            ],
            N: [
                { pattern: /喜欢 ( 想象|幻想|脑洞|抽象|理论|概念|思考 ( 未来 | 可能性))/, weight: 3, desc: '偏好抽象概念' },
                { pattern: / ( 天马行空|富有想象力 | 创意|创新|独特|新颖|未来|可能性)/, weight: 2, desc: '直觉特质' },
                { pattern: / ( 看到 ( 本质 | 规律 | 趋势|大局|整体)|洞察|预见|直觉)/, weight: 2, desc: '洞察本质' },
                { pattern: / ( 细节|琐碎|重复|枯燥|实际|现实|当下) 感到 ( 无聊|厌倦 | 没耐心)/, weight: 2, desc: '厌倦细节' }
            ],
            
            // T vs F: 决策方式
            T: [
                { pattern: / ( 理性|逻辑|分析|推理|客观|公平|原则|道理|对错)/, weight: 3, desc: '理性决策' },
                { pattern: / ( 讲道理|论对错|追求 ( 真理 | 真相|公正)|重视 ( 逻辑 | 原则))/, weight: 2, desc: '重视逻辑' },
                { pattern: / ( 不太 ( 在意 | 考虑) 别人 ( 感受 | 想法)|直接|坦率|直言不讳)/, weight: 2, desc: '直接表达' },
                { pattern: / ( 感情用事|情绪化|太敏感|过于 ( 在意 | 考虑) 别人感受)/, weight: -2, desc: '回避情感（反向）' }
            ],
            F: [
                { pattern: / ( 感性|情感|感受|情绪|共情|同理心|体贴|温柔|善良)/, weight: 3, desc: '感性决策' },
                { pattern: / ( 在意|考虑|顾及) ( 别人|他人|大家) 的 ( 感受|想法|情绪)/, weight: 2, desc: '重视他人感受' },
                { pattern: / ( 和谐|和睦|避免冲突|不想 ( 伤害 | 得罪) 别人)/, weight: 2, desc: '追求和谐' },
                { pattern: / ( 冷漠|无情|理性至上|只讲道理|不在乎 ( 感受 | 情绪))/, weight: -2, desc: '回避情感表达（反向）' }
            ],
            
            // J vs P: 生活方式
            J: [
                { pattern: /喜欢 ( 计划|安排|秩序|规律|条理|整洁|清单|时间表)/, weight: 3, desc: '偏好计划' },
                { pattern: / ( 有条理|有计划|自律|按时|准时|提前|井井有条|按部就班)/, weight: 2, desc: '有序特质' },
                { pattern: / ( 做决定|下定 ( 决心 | 结论)|确定|明确|完成|结束)/, weight: 2, desc: '追求确定性' },
                { pattern: / ( 拖延|临时|随意|混乱|没计划|随性|看心情)/, weight: -2, desc: '回避无序（反向）' }
            ],
            P: [
                { pattern: /喜欢 ( 自由|灵活|随意|随性|探索|新鲜感|可能性|开放)/, weight: 3, desc: '偏好灵活' },
                { pattern: / ( 随性|随意|灵活|自由|不受约束|讨厌 ( 计划 | 束缚 | 限制))/, weight: 2, desc: '自由特质' },
                { pattern: / ( 保持 ( 开放 | 灵活|弹性)|不喜欢 ( 被限制 | 被约束|太死板))/, weight: 2, desc: '保持开放' },
                { pattern: / ( 计划|安排|规律|约束|限制|死板|太 ( 有条理 | 按部就班)) 感到 ( 束缚 | 压抑 | 不舒服)/, weight: 2, desc: '抗拒过度计划' }
            ]
        };
        
        const typeFunctionStacks = {
            'INTJ': ['Ni', 'Te', 'Fi', 'Se'],
            'INTP': ['Ti', 'Ne', 'Si', 'Fe'],
            'ENTJ': ['Te', 'Ni', 'Se', 'Fi'],
            'ENTP': ['Ne', 'Ti', 'Fe', 'Si'],
            'INFJ': ['Ni', 'Fe', 'Ti', 'Se'],
            'INFP': ['Fi', 'Ne', 'Si', 'Te'],
            'ENFJ': ['Fe', 'Ni', 'Se', 'Ti'],
            'ENFP': ['Ne', 'Fi', 'Te', 'Si'],
            'ISTJ': ['Si', 'Te', 'Fi', 'Ne'],
            'ISFJ': ['Si', 'Fe', 'Ti', 'Ne'],
            'ESTJ': ['Te', 'Si', 'Ne', 'Fi'],
            'ESFJ': ['Fe', 'Si', 'Ne', 'Ti'],
            'ISTP': ['Ti', 'Se', 'Ni', 'Fe'],
            'ISFP': ['Fi', 'Se', 'Ni', 'Te'],
            'ESTP': ['Se', 'Ti', 'Fe', 'Ni'],
            'ESFP': ['Se', 'Fi', 'Te', 'Ni']
        };

        const typeDescriptions = {
            'INTJ': { name: '建筑师型', desc: '富有想象力和战略性的思想家，一切皆在计划之中' },
            'INTP': { name: '逻辑学家型', desc: '具有创造力的发明家，对知识有着止不住的渴望' },
            'ENTJ': { name: '指挥官型', desc: '大胆、富有想象力且意志强大的领导者' },
            'ENTP': { name: '辩论家型', desc: '聪明好奇的思想者，不会放弃任何智力上的挑战' },
            'INFJ': { name: '提倡者型', desc: '安静而神秘，同时鼓舞人心且不知疲倦的理想主义者' },

        function parseNetaLink(text) {
            const sentencePattern = /(?:nieta|捏 Ta|捏捏).*?(https?:\/\/[^\s]+)/i;
            const sentenceMatch = text.match(sentencePattern);
            if (sentenceMatch) {
                const url = sentenceMatch[1];
                const result = extractUuidFromUrl(url);
                if (result) return result;
            }
            
            const urlPatterns = [
                /https?:\/\/t\.nieta\.art\/([a-zA-Z0-9_-]+)/i,
                /https?:\/\/nieta\.art\/character\/([a-f0-9-]+)/i,
                /https?:\/\/nieta\.art\/([a-f0-9-]+)/i,
                /https?:\/\/app\.nieta\.art\/[^\s]*uuid=([a-f0-9-]+)/i,
                /https?:\/\/[^\s]*uuid=([a-f0-9-]+)/i
            ];
            
            for (const pattern of urlPatterns) {
                const match = text.match(pattern);
                if (match) {
                    const extracted = match[1].toLowerCase();
                    if (/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$/i.test(extracted)) {
                        return extracted;
                    }
                    return { type: 'short', id: extracted };
                }
            }
            
            const uuidPattern = /([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})/i;
            const uuidMatch = text.match(uuidPattern);
            if (uuidMatch) {
                return uuidMatch[1].toLowerCase();
            }
            
            return null;
        }
        
        function extractUuidFromUrl(url) {
            const shortPattern = /t\.nieta\.art\/([a-zA-Z0-9_-]+)/i;
            const shortMatch = url.match(shortPattern);
            if (shortMatch) {
                const id = shortMatch[1].toLowerCase();
                if (/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$/i.test(id)) {
                    return id;
                }
                return { type: 'short', id: id };
            }
            
            const charPattern = /nieta\.art\/character\/([a-f0-9-]+)/i;
            const charMatch = url.match(charPattern);
            if (charMatch) return charMatch[1].toLowerCase();
            
            const paramPattern = /uuid=([a-f0-9-]+)/i;
            const paramMatch = url.match(paramPattern);
            if (paramMatch) return paramMatch[1].toLowerCase();
            
            return null;
        }

        async function fetchNetaCharacter(uuid) {
            const apiUrl = `https://api.talesofai.com/v2/travel/parent/${uuid}/profile`;
            
            try {
                const corsProxies = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`,
                    `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`
                ];
                
                let data = null;
                let lastError = null;
                
                for (const proxyUrl of corsProxies) {
                    try {
                        const response = await fetch(proxyUrl, {
                            method: 'GET',
                            headers: { 'Accept': 'application/json' }
                        });
                        if (response.ok) {
                            data = await response.json();
                            break;
                        }
                    } catch (e) {
                        lastError = e;
                    }
                }
                
                if (!data) {
                    throw new Error('无法连接到 Neta API');
                }
                
                const bio = data.oc_bio || {};
                return bio.description || bio.persona || data.name || '';
            } catch (error) {
                throw error;
            }
        }

        // 语义分析核心函数
        function analyzeSemantically(text) {
            console.log('开始分析文本，长度:', text.length);
            const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            const matchedPatterns = { E: [], I: [], S: [], N: [], T: [], F: [], J: [], P: [] };
            
            // 对每个维度进行语义匹配
            for (const [dimension, patterns] of Object.entries(semanticPatterns)) {
                for (const { pattern, weight, desc } of patterns) {
                    const match = text.match(pattern);
                    if (match) {
                        console.log('匹配到:', dimension, desc, '权重:', weight);
                        if (weight > 0) {
                            scores[dimension] += weight;
                            if (!matchedPatterns[dimension].includes(desc)) {
                                matchedPatterns[dimension].push(desc);
                            }
                        } else {
                            const opposite = getOppositeDimension(dimension);
                            scores[opposite] += Math.abs(weight);
                            if (!matchedPatterns[opposite].includes(desc)) {
                                matchedPatterns[opposite].push(desc);
                            }
                        }
                    }
                }
            }
            
            console.log('分析结果:', scores);
            return { scores, matchedPatterns };
        }
        
        function getOppositeDimension(dim) {
            const opposites = { E: 'I', I: 'E', S: 'N', N: 'S', T: 'F', F: 'T', J: 'P', P: 'J' };
            return opposites[dim];
        }

        function deriveMBTIType(functionScores) {
            const { scores } = functionScores;
            
            const EI = scores.E >= scores.I ? 'E' : 'I';
            const SN = scores.S >= scores.N ? 'S' : 'N';
            const TF = scores.T >= scores.F ? 'T' : 'F';
            const JP = scores.J >= scores.P ? 'J' : 'P';
            
            return EI + SN + TF + JP;
        }

        function generateProfessionalReport(text, mbtiType, functionScores) {
            const { scores, matchedPatterns } = functionScores;
            const stack = typeFunctionStacks[mbtiType];
            const typeInfo = typeDescriptions[mbtiType];
            
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const confidence = totalScore > 15 ? '较高' : totalScore > 8 ? '中等' : '仅供参考';
            
            const EI_total = scores.E + scores.I || 1;
            const SN_total = scores.S + scores.N || 1;
            const TF_total = scores.T + scores.F || 1;
            const JP_total = scores.J + scores.P || 1;
            
            const percents = {
                E: Math.round((scores.E / EI_total) * 100),
                I: Math.round((scores.I / EI_total) * 100),
                S: Math.round((scores.S / SN_total) * 100),
                N: Math.round((scores.N / SN_total) * 100),
                T: Math.round((scores.T / TF_total) * 100),
                F: Math.round((scores.F / TF_total) * 100),
                J: Math.round((scores.J / JP_total) * 100),
                P: Math.round((scores.P / JP_total) * 100)
            };
            
            return {
                type: mbtiType,
                name: typeInfo.name,
                desc: typeInfo.desc,
                confidence,
                percents,
                scores,
                matchedPatterns,
                suggestions: generateSuggestions(mbtiType)
