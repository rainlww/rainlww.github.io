<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨落们的档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 页面头部 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
            border-radius: 8px;
        }

        .page-title {
            font-size: 2.5em;
            color: #5a4a5a;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: #7a6a7a;
            font-style: italic;
        }

        /* 筛选区 */
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #9a7a8a;
            box-shadow: 0 0 0 2px rgba(154, 122, 138, 0.2);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-tag {
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            color: #555;
        }

        .filter-tag:hover {
            background: #f5f5f5;
            border-color: #9a7a8a;
        }

        .filter-tag.active {
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border-color: #9a7a8a;
        }

        /* 荷穆勒提示 */
        .homulesha-notice {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            display: none;
            background: rgba(154, 122, 138, 0.1);
            border-radius: 4px;
        }

        .homulesha-notice.show {
            display: block;
        }

        .homulesha-notice-text {
            font-size: 0.95em;
            color: #9a7a8a;
            font-style: italic;
        }

        /* 人物卡片网格 - PRTS 风格 */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        /* 人物卡片 */
        .character-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .character-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: #9a7a8a;
        }

        .character-card-cover {
            width: 100%;
            padding-top: 140%; /* 竖版比例 */
            position: relative;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
            overflow: hidden;
        }

        .character-card-cover > * {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .character-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-card-cover .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(154, 122, 138, 0.4);
        }

        /* 卡片底部信息 */
        .character-card-info {
            padding: 12px;
            background: #fff;
        }

        .character-card-name {
            font-size: 1em;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .character-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }

        .character-card-tag {
            font-size: 0.7em;
            color: #666;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #e0e0e0;
        }

        /* 空状态 */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1em;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            background: #e8e8e8;
        }

        /* 页脚 */
        .page-footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 0.85em;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">落下的雨千万滴</h1>
            <p class="page-subtitle">— 每一滴微小的雨珠，汇集成了滂沱大雨。—</p>
        </div>

        <!-- 筛选区 -->
        <div class="filter-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索角色或标签…" oninput="handleSearch()">
            </div>
            <div class="filter-tags" id="filterTags">
                <!-- 标签由 JavaScript 动态生成 -->
            </div>
        </div>

        <!-- 荷穆勒提示 -->
        <div class="homulesha-notice" id="homuleshaNotice">
            <p class="homulesha-notice-text">"荷穆勒"之名，意味着重重苦难。</p>
        </div>

        <!-- 人物卡片网格 -->
        <div class="characters-grid" id="charactersGrid">
            <!-- 人物卡片 1: 明雨落 -->
            <div class="character-card" onclick="openCharacter('ming-yuluo')">
                <div class="character-card-cover">
                    <img src="ming-yuluo-1-opt.jpg" alt="明雨落">
                </div>
                <div class="character-card-info">
                    <div class="character-card-name">明雨落</div>
                    <div class="character-card-tags">
                        <span class="character-card-tag">0601 号观测站</span>
                        <span class="character-card-tag">明雨落</span>
                    </div>
                </div>
            </div>
            
            <!-- 人物卡片 2: 雨落 -->
            <div class="character-card" onclick="openCharacter('yuluo')">
                <div class="character-card-cover">
                    <div class="placeholder">📷</div>
                </div>
                <div class="character-card-info">
                    <div class="character-card-name">雨落</div>
                    <div class="character-card-tags">
                        <span class="character-card-tag">明雨落</span>
                    </div>
                </div>
            </div>
            
            <!-- 人物卡片 3: 荷穆勒夏 -->
            <div class="character-card" onclick="openCharacter('homulesha')">
                <div class="character-card-cover">
                    <img src="homulesha-cover-new-opt.jpg" alt="荷穆勒夏">
                </div>
                <div class="character-card-info">
                    <div class="character-card-name">荷穆勒夏</div>
                    <div class="character-card-tags">
                        <span class="character-card-tag">荷穆勒</span>
                        <span class="character-card-tag">明雨落</span>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-link">← 返回主页</a>
        </div>

        <!-- 页脚 -->
        <div class="page-footer">
            雨落们的档案馆 · 记录每一滴雨的故事
        </div>
    </div>

    <script>
        // ========== 人物数据 ==========
        const characters = [
            {
                id: "ming-yuluo",
                name: "明雨落",
                cover: "ming-yuluo-1-opt.jpg",
                tags: ["0601 号观测站", "明雨落"],
                nietaLink: "",
                description: "（简介待填写）",
                related: []
            },
            {
                id: "yuluo",
                name: "雨落",
                cover: "",
                tags: ["明雨落"],
                nietaLink: "",
                description: "（简介待填写）",
                related: []
            },
            {
                id: "homulesha",
                name: "荷穆勒夏",
                cover: "homulesha-cover-new-opt.jpg",
                tags: ["荷穆勒", "明雨落"],
                nietaLink: "",
                description: "（简介待填写）",
                related: []
            }
        ];

        // 预置标签
        const presetTags = [
            "0601 号观测站",
            "明雨落",
            "明落月",
            "明循月",
            "明泉月",
            "荷穆勒"
        ];

        // 当前选中的标签
        let selectedTags = [];

        // 初始化
        function init() {
            renderFilterTags();
        }

        // 渲染筛选标签
        function renderFilterTags() {
            const container = document.getElementById('filterTags');
            if (!container) return;
            container.innerHTML = presetTags.map(tag => `
                <div class="filter-tag" data-tag="${tag}" onclick="toggleTag('${tag}')">
                    ${tag}
                </div>
            `).join('');
        }

        // 切换标签选中状态
        function toggleTag(tag) {
            const index = selectedTags.indexOf(tag);
            if (index > -1) {
                selectedTags.splice(index, 1);
            } else {
                selectedTags.push(tag);
            }

            // 更新 UI
            document.querySelectorAll('.filter-tag').forEach(el => {
                el.classList.toggle('active', selectedTags.includes(el.dataset.tag));
            });

            // 检查是否选中荷穆勒
            updateHomuleshaNotice();

            // 筛选人物卡片
            filterCharacters();
        }

        // 筛选人物卡片
        function filterCharacters() {
            const cards = document.querySelectorAll('.character-card');
            cards.forEach(card => {
                const onclick = card.getAttribute('onclick');
                if (!onclick) return;
                const match = onclick.match(/'([^']+)'/);
                if (!match) return;
                const charId = match[1];
                const char = characters.find(c => c.id === charId);
                if (!char) return;

                if (selectedTags.length === 0) {
                    card.style.display = 'block';
                    return;
                }

                const hasSelectedTag = selectedTags.some(tag => char.tags.includes(tag));
                card.style.display = hasSelectedTag ? 'block' : 'none';
            });
        }

        // 更新荷穆勒提示
        function updateHomuleshaNotice() {
            const notice = document.getElementById('homuleshaNotice');
            if (selectedTags.includes('荷穆勒')) {
                notice.classList.add('show');
            } else {
                notice.classList.remove('show');
            }
        }

        // 搜索处理
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!query) {
                document.querySelectorAll('.filter-tag').forEach(el => {
                    el.style.display = 'block';
                });
                return;
            }

            document.querySelectorAll('.filter-tag').forEach(el => {
                const tagText = el.dataset.tag.toLowerCase();
                if (tagText.includes(query)) {
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            });
        }

        // 打开人物档案（新页面）
        function openCharacter(charId) {
            window.location.href = `character-${charId}.html`;
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
