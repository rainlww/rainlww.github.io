            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 页面头部 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #FFF9C4 0%, #E3F2FD 100%);
            border-radius: 8px;
        }

        .page-title {
            font-size: 2.5em;
            font-family: 'Comic Sans MS', 'Chalkboard', 'Arial Rounded MT Bold', 'Microsoft YaHei', sans-serif;
            color: #5a4a5a;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 1.1em;
            color: #7a6a7a;
            font-style: italic;
        }

        /* 筛选区 */
        .filter-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #9a7a8a;
            box-shadow: 0 0 0 2px rgba(154, 122, 138, 0.2);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-tag {
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            color: #555;
        }

        .filter-tag:hover {
            background: #f5f5f5;
            border-color: #9a7a8a;
        }

        .filter-tag.active {
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            border-color: #9a7a8a;
        }

        /* 荷穆勒提示 */
        /* 视图切换按钮 - PRTS 风格 */

            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .view-toggle-btn {
            padding: 10px 28px;
            border: none;
            background: #2d2d2d;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .view-toggle-btn:hover {
            background: #404040;
        }
        .view-toggle-btn.active {
            background: #3ba8c7;
        }

            display: none;
        }

            border-collapse: separate;
            border-spacing: 0 15px;
            margin-top: 20px;

        .characters-table.show {
            display: table;
        }
        .characters-table tbody tr {

        }

            border-radius: 8px 0 0 8px;
        }
        .characters-table td:last-child {
            border-right: 1px solid #f0f0f0;
            border-radius: 0 8px 8px 0;
        }
        .table-row-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .table-avatar {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
            overflow: hidden;
            background: #f5f5f5;
        }
        .table-avatar img {

            height: 100%;

        }
        .table-avatar .placeholder {

            height: 100%;

            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: #ccc;
            background: #f5f5f5;
        }
        .table-info {

            min-width: 0;
        }
        .table-header {

            align-items: baseline;
            gap: 12px;

        }
        .table-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
        }
        .table-number {
            font-size: 0.85em;
            color: #666;
            font-family: monospace;
        }
        .table-details {
            display: inline-grid;
            grid-template-columns: auto auto;
            gap: 8px 15px;
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 6px;
        }
        .table-detail-label {
            font-size: 0.8em;
            color: #999;
            font-weight: 500;
        }
        .table-detail-value {
            font-size: 0.9em;
            color: #333;
            font-weight: 500;
        }

        /* 立绘视图 */
        .characters-grid.hide {
            display: none;
        }

        /* 人物卡片网格 - PRTS 风格 */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        /* 人物卡片 */
        .character-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .character-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: #9a7a8a;
        }

        .character-card-cover {
            width: 100%;
            padding-top: 140%; /* 竖版比例 */
            position: relative;
            background: linear-gradient(135deg, #FFF9C4 0%, #E3F2FD 100%);
            overflow: hidden;
        }

        .character-card-cover > * {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .character-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-card-cover .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(154, 122, 138, 0.4);
        }

        /* 卡片底部信息 */
        .character-card-info {
            padding: 12px;
            background: #fff;
        }

        .character-card-name {
            font-size: 1em;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .character-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }

        .character-card-tag {
            font-size: 0.7em;
            color: #666;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #e0e0e0;
        }

        /* 空状态 */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1em;

        /* 返回链接 */

            display: inline-block;
            margin-top: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            background: #e8e8e8;
        }

        /* 页脚 */
        .page-footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 0.85em;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;

        /* 移动端适配 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8em;
                letter-spacing: 0;
                word-break: keep-all;
                white-space: normal;
            }
            .page-subtitle {
                font-size: 1em;
            }
            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .character-card-tag {
                font-size: 0.65em;
                padding: 2px 5px;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 1.3em;
                letter-spacing: 0;
                word-break: keep-all;
                white-space: normal;
            }
            .page-subtitle {
                font-size: 0.9em;
            }
            .characters-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .character-card-info {
                padding: 8px;
            }
            .character-card-name {
                font-size: 0.9em;
            }
            .filter-tags {
                gap: 8px;
            }
            .filter-tag {
                padding: 6px 12px;
                font-size: 0.8em;
            }
        }
    </style>

        <!-- 荷穆勒提示 --><!-- 视图切换 -->
        <div class="view-toggles">
            <button class="view-toggle-btn active" onclick="switchView('card')">立绘视图</button>
            <button class="view-toggle-btn" onclick="switchView('table')">表格视图</button>
        </div>

        <!-- 表格视图 -->

        // 预置标签
        // 按人物查找标签
        const characterTags = ["明雨落", "苏甘泉", "荷穆勒", "明落月", "明循月", "明泉月", "长明", "轻若"];
        // 按所属查找标签
        const affiliationTags = ["0601 号观测站", "黄昏雪会馆", "捏捏茶馆", "维护者协会", "圣拉姆特", "环城", "槐安公寓"];

        // 当前选中的标签
        let selectedTags = [];

        // 格式化名字：将#后的内容用浅色斜体显示
        function formatName(name) {
            if (name && name.includes('#')) {
                const parts = name.split('#');
                return parts[0] + '<span class="name-suffix">#' + parts.slice(1).join('#') + '</span>';
            }
            return name;
        }

        // 渲染人物卡片
        function renderCards() {
            const grid = document.getElementById('charactersGrid');
            if (!grid) return;
            
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            const filteredChars = characters.filter(char => {
                if (selectedTags.length > 0) {
                    return selectedTags.every(tag => char.tags.includes(tag));
                }
                if (query) {
                    return char.name.toLowerCase().includes(query) || char.tags.some(tag => tag.toLowerCase().includes(query));
                }
                return true;
            });
            
            if (filteredChars.length === 0) {
                grid.style.display = 'none';
                return;
            }
            grid.style.display = 'grid';

            grid.innerHTML = filteredChars.map(function(char) {
                var coverHtml = char.cover 
                    ? '<img src="' + char.cover + '" loading="lazy" alt="' + char.name + '">'
                    : '<div class="placeholder">📷</div>';
                return '<div class="character-card" onclick="openCharacter(\'' + char.id + '\')">' +
                    '<div class="character-card-cover">' + coverHtml + '</div>' +
                    '<div class="character-card-info">' +
                    '<div class="character-card-name">' + formatName(char.name) + '</div>' +
                    '<div class="character-card-tags">' +
                    char.tags.map(function(tag) { return '<span class="character-card-tag">' + tag + '</span>'; }).join('') +
                    '</div></div></div>';
            }).join('');
        }

        // 初始化
        function init() {
            renderFilterTags();
            renderCards();
        }

        // 渲染筛选标签
        function renderFilterTags() {
            // 渲染人物标签
            const charContainer = document.getElementById('characterFilterTags');
            if (charContainer) {
                charContainer.innerHTML = characterTags.map(tag => `
                    <div class="filter-tag" data-tag="${tag}" onclick="toggleTag('${tag}')">
                        ${tag}
                    </div>
                `).join('');
            }
            // 渲染所属标签
            const affContainer = document.getElementById('affiliationFilterTags');
            if (affContainer) {
                affContainer.innerHTML = affiliationTags.map(tag => `
                    <div class="filter-tag" data-tag="${tag}" onclick="toggleTag('${tag}')">
                        ${tag}
                    </div>
                `).join('');
            }
        }

        // 切换标签选中状态
        function toggleTag(tag) {
            const index = selectedTags.indexOf(tag);
            if (index > -1) {
                selectedTags.splice(index, 1);
            } else {
                selectedTags.push(tag);
            }

            // 更新 UI
            document.querySelectorAll('.filter-tag').forEach(el => {
                el.classList.toggle('active', selectedTags.includes(el.dataset.tag));
            });

            // 检查是否选中荷穆勒
            // removed

            // 筛选人物卡片
            renderCards();
            renderTable();

            let notice = document.getElementById('homuleshaNotice');

                        noticeDiv.style.cssText = 'text-align: center; padding: 15px; margin: 20px 0; background: rgba(100, 100, 100, 0.08); border-radius: 4px;';

                    }
                }
            } else {
                if (notice) {
                    notice.remove();
                }
            }
        }

            cards.forEach(card => {
                const onclick = card.getAttribute('onclick');
                if (!onclick) return;
                const match = onclick.match(/'([^']+)'/);
                if (!match) return;
                const charId = match[1];
                const char = characters.find(c => c.id === charId);
                if (!char) return;

                if (selectedTags.length === 0) {
                    card.style.display = 'block';
                    hasResults = true;
                    return;
                }

                // 交集筛选：必须包含所有选中的标签
                const hasAllTags = selectedTags.every(tag => char.tags.includes(tag));
                if (hasAllTags) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // 更新表格视图
            renderTable();

            // 显示/隐藏空状态提示
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                if (!hasResults) {
                    emptyState.style.display = 'block';
                    // 检查是否有选中的标签不存在于任何角色中
                    const allTags = characters.flatMap(c => c.tags);
                    const hasUnaddedTag = selectedTags.some(tag => !allTags.includes(tag));
                    
                    if (hasUnaddedTag) {
                        // 有标签尚未添加人物
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>';
                    } else {
                        // 交集为空
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">观测站的记录里查无此人……是不是找错了？</p>';
                    }
                } else {
                    emptyState.style.display = 'none';
                }
            }
        }

        // 更新荷穆勒提示
        function updateHomuleshaNotice() {
            const notice = document.getElementById('homuleshaNotice');
        }

        // 视图切换
        function switchView(view) {
            const grid = document.getElementById('charactersGrid');
            const table = document.getElementById('charactersTable');
            const btns = document.querySelectorAll('.view-toggle-btn');
            
            if (view === 'card') {
                grid.style.display = 'grid';
                table.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                grid.style.display = 'none';
                table.style.display = 'table';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                renderTable();
            }
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('charactersTableBody');
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const filteredChars = characters.filter(char => {
                if (selectedTags.length > 0) {
                    return selectedTags.every(tag => char.tags.includes(tag));
                }
                if (query) {
                    return char.name.toLowerCase().includes(query) || char.tags.some(tag => tag.toLowerCase().includes(query));
                }
                return true;
            });

            // 更新空状态提示
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                if (filteredChars.length === 0) {
                    emptyState.style.display = 'block';
                    const allTags = characters.flatMap(c => c.tags);
                    const hasUnaddedTag = selectedTags.some(tag => !allTags.includes(tag));
                    if (hasUnaddedTag) {
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>';
                    } else {
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">观测站的记录里查无此人……是不是找错了？</p>';
                    }
                }
            }

            tbody.innerHTML = filteredChars.map(char => `
                <tr onclick="openCharacter('${char.id}')" style="cursor: pointer;">
                    <td>
                        <div class="table-row-content">
                            <div class="table-avatar">
                                ${char.cover ? `<img src="${char.cover}" loading="lazy" alt="${char.name}">` : '<div class="placeholder">📷</div>'}
                            </div>
                            <div class="table-info">
                                <div class="table-header">
                                    <span class="table-name">${formatName(char.name)}</span>
                                    <span class="table-number">${char.number || char.id}</span>
                                </div>
                                <div class="table-details">
                                    <span class="table-detail-label">性别</span>
                                    <span class="table-detail-value">${char.gender || "未知"}</span>
                                    <span class="table-detail-label">所属</span>
                                    <span class="table-detail-value">${char.affiliation || "未知"}</span>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 搜索处理
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!query) {
                document.querySelectorAll('.filter-tag').forEach(el => {
                    el.style.display = 'block';
                });
                return;
            }

            document.querySelectorAll('.filter-tag').forEach(el => {
                const tagText = el.dataset.tag.toLowerCase();
                if (tagText.includes(query)) {
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            });
        }

        // 打开人物档案（新页面）
        function openCharacter(charId) {
            window.location.href = `character-${charId}.html`;
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
