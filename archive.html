<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨落们的档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 50%, #d5c2d5 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 2em;
            color: #5a4a5a;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: left;
        }

        /* 筛选按钮 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 25px;
            background: rgba(90, 74, 90, 0.2);
            color: #5a4a5a;
            border: none;
            border-radius: 25px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn.active {
            background: rgba(90, 74, 90, 0.6);
            color: #fff;
        }

        .filter-btn:hover {
            background: rgba(90, 74, 90, 0.4);
            transform: translateY(-2px);
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .archive-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(90, 74, 90, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .archive-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(90, 74, 90, 0.2);
        }

        .card-cover {
            width: 100%;
            height: 350px;
            background: #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-cover.locked {
            background: linear-gradient(135deg, #c5b5c5, #b5a5b5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lock-icon {
            font-size: 3em;
            color: rgba(255, 255, 255, 0.6);
        }

        .card-number {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            background: rgba(90, 74, 90, 0.6);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9em;
            font-weight: bold;
        }

        .card-info {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2em;
            color: #5a4a5a;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.9em;
            color: #8a7a8a;
            line-height: 1.6;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
        }

        .card-views {
            color: #a090a0;
        }

        .card-rating {
            background: rgba(255, 200, 100, 0.3);
            color: #c89050;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 600;
        }

        .locked-text {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 20px;
        }

        .locked-sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* 返回按钮 */
        .back-link {
            text-align: center;
            margin-top: 50px;
        }

        .back-link a {
            color: #5a4a5a;
            text-decoration: none;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            transition: all 0.3s ease;
            display: inline-block;
            font-size: 0.95em;
        }

        .back-link a:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
            .card-cover {
                height: 280px;
            }
            .page-title {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>

            </div>

            <div class="archive-card">

                    <span class="card-number">Ⅷ</span>

            <div class="archive-card">

            <div class="archive-card">

        <!-- 返回按钮 -->
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>

    <script>
        // 筛选按钮交互
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
