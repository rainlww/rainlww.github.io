<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明雨落 - 雨落们的档案馆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #9a7a8a; text-decoration: none; font-size: 0.9em; padding: 6px 14px; background: #f5f5f5; border-radius: 4px; }
        .back-link:hover { color: #7a6a7a; background: #e8e8e8; }
        .page-title { font-size: 2.5em; color: #333; font-weight: bold; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #ddd; letter-spacing: 0; word-break: keep-all; white-space: normal; }
        .character-quote { font-size: 0.95em; color: #888; font-style: italic; margin-bottom: 20px; line-height: 1.8; text-align: left; }
        .character-quote div { margin-bottom: 4px; }
        .collapse-section { margin-bottom: 20px; border: none; }
        .collapse-section[open] { border-bottom: 1px solid #e0e0e0; padding-bottom: 15px; }
        .collapse-title { list-style: none; display: flex; align-items: center; gap: 8px; font-size: 1.2em; font-weight: 500; color: #333; cursor: pointer; padding: 10px 0; margin: 0; transition: color 0.2s; }
        .collapse-title:hover { color: #9a7a8a; }
        .collapse-title::-webkit-details-marker { display: none; }
        .collapse-icon { transition: transform 0.3s; flex-shrink: 0; }
        .collapse-section[open] .collapse-icon { transform: rotate(180deg); }
        .collapse-content { padding: 10px 0 0 28px; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .artwork-container { text-align: center; }
        .artwork-frame { 
            display: inline-block; 
            max-width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, #e8e4d9 0%, #d4cfc4 100%); 
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .artwork-frame img { 
            display: block; 
            max-width: 100%; 
            height: auto; 
            border-radius: 2px;
        }
        .artwork-caption { 
            padding: 12px; 
            text-align: center; 
            background: #f9f9f9; 
            font-size: 0.9em; 
            color: #666; 
            border-top: 1px solid #e0e0e0;
            margin-top: 10px;
            border-radius: 4px;
        }
        .view-toggle { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .view-toggle-btn {
            padding: 8px 20px;
            border: 1px solid #9a7a8a;
            background: #fff;
            color: #9a7a8a;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .view-toggle-btn:hover {
            background: #f5f5f5;
        }
        .view-toggle-btn.active {
            background: #9a7a8a;
            color: #fff;
        }
        .toc-list { list-style: none; }
        .toc-list li { margin-bottom: 6px; }
        .toc-list a { color: #9a7a8a; text-decoration: none; font-size: 0.95em; }
        .toc-list a:hover { color: #7a6a7a; text-decoration: underline; }
        @media (max-width: 768px) { .page-title { font-size: 2em; } }
        @media (max-width: 480px) { .page-title { font-size: 1.5em; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="archive.html" class="back-link">← 返回档案馆</a>
        <h1 class="page-title" id="pageTitle">明雨落</h1>
        
        <details class="collapse-section">
            <summary class="collapse-title">
                <svg class="collapse-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                目录
            </summary>
            <div class="collapse-content">
                <ul class="toc-list">
                    <li><a href="#artwork">立绘展示</a></li>
                    <li><a href="#description">人物简介</a></li>
                    <li><a href="#related">相关雨落</a></li>
                    <li><a href="#external">外部链接</a></li>
                </ul>
            </div>
        </details>
        
        <details class="collapse-section" id="artwork">
            <summary class="collapse-title">
                <svg class="collapse-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                立绘展示
            </summary>
            <div class="collapse-content">
                <div class="artwork-container">
                    <div class="view-toggle">
                        <button class="view-toggle-btn active" onclick="switchArtwork('portrait')">竖版</button>
                        <button class="view-toggle-btn" onclick="switchArtwork('landscape')">横版</button>
                    </div>
                    <div class="artwork-frame">
                        <img id="artworkImage" src="ming-yuluo-1-opt.jpg" alt="明雨落">
                    </div>
                    <div class="artwork-caption" id="artworkCaption">明雨落 - 竖版立绘</div>
                </div>
            </div>
        </details>
        
        <details class="collapse-section" id="description">
            <summary class="collapse-title">
                <svg class="collapse-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                人物简介
            </summary>
            <div class="collapse-content">
                <p style="color: #999; font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>
            </div>
        </details>
        
        <details class="collapse-section" id="related">
            <summary class="collapse-title">
                <svg class="collapse-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                相关雨落
            </summary>
            <div class="collapse-content">
                <p style="color: #999; font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>
            </div>
        </details>
        
        <details class="collapse-section" id="external">
            <summary class="collapse-title">
                <svg class="collapse-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                外部链接
            </summary>
            <div class="collapse-content">
                <p style="color: #999; font-size: 0.9em;">暂无外部链接</p>
            </div>
        </details>
    </div>
    <script>
        const artworks = {
            portrait: {
                src: 'ming-yuluo-1-opt.jpg',
                caption: '明雨落 - 竖版立绘'
            },
            landscape: {
                src: 'ming-yuluo-landscape-opt.jpg',
                caption: '明雨落 - 横版立绘'
            }
        };
        function switchArtwork(type) {
            document.getElementById('artworkImage').src = artworks[type].src;
            document.getElementById('artworkCaption').textContent = artworks[type].caption;
            document.querySelectorAll('.view-toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
