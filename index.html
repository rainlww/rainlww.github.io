<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到雨落的世界！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Loading 页面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 2.8em;
            color: #fff;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard', 'YouYuan', 'Microsoft YaHei', cursive;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.15), 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 5px;
        }

        /* 主页 */
        #main-screen {
            display: none;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 40px 20px;
            position: relative;
        }

        #main-screen.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 背景模糊层 */
        #bgOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(3px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
            padding-top: 80px;
        }

        .title {
            font-size: 3.5em;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 1.4em;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .entries-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .entries-grid { grid-template-columns: 1fr; }
        }

        .entry-card {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 12px;
            padding: 20px 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.4);
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .entry-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .entry-title {
            font-size: 1.2em;
            color: #3a5a6a;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .entry-desc {
            font-size: 0.9em;
            color: #4a6a7a;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .entry-btn {
            background: linear-gradient(135deg, #5a7d8a, #7a9da8);
            color: #fff;
            border: none;
            padding: 8px 25px;
            font-size: 0.95em;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(90, 125, 138, 0.4);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .entry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(90, 125, 138, 0.5);
            background: linear-gradient(135deg, #6a8d9a, #8aada8);
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95em;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
            line-height: 1.8;
        }

        /* 切换背景按钮 */
        .switch-bg-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #5a7d8a;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            letter-spacing: 1px;
        }

        .switch-bg-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* 开始播放按钮 */
        .play-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.85));
            color: #5a7d8a;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            letter-spacing: 1px;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.9));
        }

        @media (max-width: 600px) {
            .play-btn {
                bottom: 80px;
                left: 20px;
                padding: 10px 20px;
                font-size: 0.85em;
            }
            .switch-bg-btn {
                bottom: 20px;
                right: 20px;
                padding: 10px 18px;
                font-size: 0.85em;
            }
        }

        /* 弹窗 */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #modal.show {
            display: flex;
            animation: modalFadeIn 0.4s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.92));
            padding: 60px 50px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            margin: 20px;
            position: relative;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .modal-text {
            font-size: 1.3em;
            color: #5a7d8a;
            line-height: 2.2;
            margin-bottom: 30px;
            font-style: italic;
        }

        .modal-signature {
            font-size: 1.1em;
            color: #8a9a9f;
            text-align: right;
            margin-top: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            color: #8a9a9f;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .modal-close:hover {
            color: #5a7d8a;
            transform: scale(1.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .title { font-size: 2.5em; letter-spacing: 5px; }
            .subtitle { font-size: 1.1em; }
            .entries-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Loading 页面 -->
    <div id="loading-screen">
        <div class="loading-text" id="loadingText">Loading</div>
    </div>

    <!-- 主页 -->
    <div id="main-screen">
        <!-- 背景模糊层 -->
        <div id="bgOverlay"></div>
        
        <div class="container">
            <h1 class="title">欢迎来到雨落的世界！</h1>

            <div class="entries-grid">
                <!-- 雨落们的观测记录 -->
                <div class="entry-card" onclick="window.open('https://t.nieta.art/LB4nC1Iq', '_blank'); return false;">
                    <h2 class="entry-title">雨落们的观测记录</h2>
                    <p class="entry-desc">
                        这里存放着观测站，以及各个世界的精彩时刻！<br>
                        快来快来！
                    </p>
                    <button class="entry-btn" onclick="window.open('https://t.nieta.art/LB4nC1Iq', '_blank'); return false;">点击进入</button>
                </div>

                <!-- 绘境 · 标签配方库 -->
                <div class="entry-card" onclick="navigateTo('huijing.html')">
                    <h2 class="entry-title">绘境 · 标签配方库</h2>
                    <p class="entry-desc">
                        这是一个神奇的 tag 生成器！指哪打哪，萌新福音！<br>
                        来试试吗？
                    </p>
                    <button class="entry-btn">进入绘境</button>
                </div>

                <!-- 测试·更深认识 ta -->
                <div class="entry-card" onclick="navigateTo('test-choice.html')">
                    <h2 class="entry-title">测试·更深认识 ta</h2>
                    <p class="entry-desc">
                        通过专业测试，更深入地了解 ta 的内心<br>
                        探索人格的奥秘～
                    </p>
                    <button class="entry-btn">开始测试</button>
                </div>

                <!-- 预留入口 -->
                <div class="entry-card" onclick="navigateTo('coming-soon.html')">
                    <h2 class="entry-title">创作工坊</h2>
                    <p class="entry-desc">
                        角色设计 · 世界观设定 · 故事创作<br>
                        敬请期待
                    </p>
                    <button class="entry-btn">即将上线</button>
                </div>
            </div>

            <div class="footer">
                <p>雨落的世界 · 由 伊斯派菈 制作</p>
                <p style="margin-top: 8px;">每一个世界，都是一段独特的旅程</p>
            </div>
        </div>
        
        <!-- 开始播放按钮 -->
        <button class="play-btn" id="playBtn" onclick="showModal()">🎵 开始播放</button>
        
        <!-- 切换背景按钮 -->
        <button class="switch-bg-btn" onclick="switchBackground()">🖼️ 切换背景</button>
    </div>

    <!-- 弹窗 -->
    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal(event)">×</span>
            <div class="modal-text">
                谨以此音乐献给小椰果<br>
                ——一直在等你回家的雨落
            </div>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 背景图片数组（使用优化后的图片）
        const backgrounds = ['banner_optimized.jpg', 'banner2_optimized.jpg'];
        let currentBgIndex = 0;
        let musicStarted = false;

        // 设置背景图片
        function setBackground(index) {
            const mainScreen = document.getElementById('main-screen');
            const bgUrl = "url('" + backgrounds[index] + "')";
            mainScreen.style.backgroundImage = bgUrl;
        }

        // 切换背景
        function switchBackground() {
            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            const mainScreen = document.getElementById('main-screen');
            
            mainScreen.style.opacity = '0.7';
            setTimeout(function() {
                setBackground(currentBgIndex);
                mainScreen.style.opacity = '1';
            }, 150);
        }

        // 显示弹窗
        function showModal() {
            const modal = document.getElementById('modal');
            const playBtn = document.getElementById('playBtn');
            
            modal.classList.add('show');
            playBtn.style.display = 'none';
            
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.6;
            bgMusic.play().catch(function(e) {
                console.log('音乐播放失败：', e);
            });
            
            musicStarted = true;
        }

        // 关闭弹窗
        function closeModal(event) {
            if (event.target.id === 'modal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('modal');
                modal.classList.remove('show');
            }
        }

        // 页面加载
        window.addEventListener('DOMContentLoaded', function() {
            const loadingScreen = document.getElementById('loading-screen');
            const mainScreen = document.getElementById('main-screen');
            const loadingText = document.getElementById('loadingText');
            
            // 省略号动画（0-1-2-3-0 循环）
            let dotCount = 0;
            const dotInterval = setInterval(function() {
                dotCount = (dotCount + 1) % 4;
                let dots = '';
                for (let i = 0; i < dotCount; i++) {
                    dots += '.';
                }
                loadingText.textContent = 'Loading' + dots;
            }, 400);
            
            // 预加载背景图片
            let loadedImages = 0;
            const totalImages = backgrounds.length;
            
            backgrounds.forEach(function(src) {
                const img = new Image();
                img.src = src;
                img.onload = function() {
                    loadedImages++;
                    
                    if (loadedImages >= totalImages) {
                        // 图片加载完成，停止动画，显示页面
                        clearInterval(dotInterval);
                        setTimeout(function() {
                            loadingScreen.classList.add('hidden');
                            mainScreen.classList.add('visible');
                            
                            // 随机设置背景
                            currentBgIndex = Math.floor(Math.random() * backgrounds.length);
                            setBackground(currentBgIndex);
                        }, 500);
                    }
                };
                img.onerror = function() {
                    console.log('图片加载失败：' + src);
                    loadedImages++;
                };
            });
            
            // 最少等待 1.5 秒（确保用户看到 Loading 动画）
            setTimeout(function() {
                if (loadedImages < totalImages) {
                    // 图片还没加载完，继续等
                } else {
                    clearInterval(dotInterval);
                    loadingScreen.classList.add('hidden');
                    mainScreen.classList.add('visible');
                    currentBgIndex = Math.floor(Math.random() * backgrounds.length);
                    setBackground(currentBgIndex);
                }
            }, 1500);
        });

        // 导航函数
        function navigateTo(url) {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.remove('hidden');
            
            setTimeout(function() {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
