<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到雨落的世界！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Loading 页面 - 下雨效果 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4a6a7a 0%, #3a5a6a 50%, #2a4a5a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
            overflow: hidden;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 主页过渡 */
        #main-screen {
            display: none;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 40px 20px;
            position: relative;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #main-screen.visible {
            display: block;
            opacity: 1;
        }

        /* 雨滴 */
        .raindrop {
            position: absolute;
            top: -100px;
            width: 3px;
            height: 25px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.8));
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* 主页雨滴 */
        .page-raindrop {
            position: fixed;
            top: -50px;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.5));
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 5;
        }

        .loading-text {
            font-size: 2.8em;
            color: #fff;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard', 'YouYuan', 'Microsoft YaHei', cursive;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.15), 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 5px;
            position: relative;
            z-index: 10;
        }

        /* 水墨云层 - 分层明显 */
        .cloud {
            position: absolute;
            border-radius: 50% 60% 40% 70% / 60% 50% 70% 40%;
            animation: cloudFloat linear infinite, cloudMorph ease-in-out infinite;
            box-shadow: 0 0 40px rgba(200, 200, 200, 0.3);
        }

        /* 远景云 - 适中朦胧 */
        .cloud-far {
            background: radial-gradient(ellipse at center, rgba(180, 180, 180, 0.5) 0%, rgba(140, 140, 140, 0.3) 40%, rgba(100, 100, 100, 0.2) 70%, rgba(60, 60, 60, 0) 90%);
            filter: blur(50px);
            opacity: 0.65;
        }

        /* 中景云 - 适中清晰 */
        .cloud-mid {
            background: radial-gradient(ellipse at center, rgba(200, 200, 200, 0.6) 0%, rgba(160, 160, 160, 0.4) 40%, rgba(120, 120, 120, 0.25) 70%, rgba(80, 80, 80, 0) 90%);
            filter: blur(30px);
            opacity: 0.7;
        }

        /* 近景云 - 适中 */
        .cloud-near {
            background: radial-gradient(ellipse at center, rgba(215, 215, 215, 0.7) 0%, rgba(175, 175, 175, 0.5) 40%, rgba(135, 135, 135, 0.3) 70%, rgba(95, 95, 95, 0) 90%);
            filter: blur(20px);
            opacity: 0.75;
        }

        @keyframes cloudFloat {
            from {
                transform: translateX(-100%) scale(0.8);
            }
            to {
                transform: translateX(100vw) scale(1.2);
            }
        }

        @keyframes cloudMorph {
            0%, 100% {
                border-radius: 50% 60% 40% 70% / 60% 50% 70% 40%;
            }
            25% {
                border-radius: 60% 50% 70% 40% / 50% 70% 40% 60%;
            }
            50% {
                border-radius: 70% 40% 50% 60% / 40% 60% 50% 70%;
            }
            75% {
                border-radius: 40% 70% 60% 50% / 70% 40% 60% 50%;
            }
        }

        /* 主页 */
        #main-screen {
            display: none;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 40px 20px;
            position: relative;
        }

        #main-screen.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        /* 背景图片响应式适配 */
        @media (max-width: 480px) {
            #main-screen {
                background-attachment: scroll;  /* 手机禁用固定背景，提升性能 */
                background-position: center center;
            }
        }

        @media (max-width: 360px) {
            #main-screen {
                background-position: 50% 30%;  /* 小屏调整背景位置 */
            }
        }

        @media (min-width: 1920px) {
            #main-screen {
                background-size: cover;  /* 大屏保持覆盖 */
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            #main-screen {
                background-position: center;
                background-size: cover;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 背景模糊层 */
        #bgOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(150, 150, 150, 0.55);
            backdrop-filter: blur(5px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
            padding-top: 80px;
        }

        .title {
            font-size: 3.5em;
            color: #fff;
            font-weight: 300;
            font-family: 'Comic Sans MS', 'Chalkboard', 'YouYuan', 'Microsoft YaHei', cursive;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            margin-top: -50px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 1.4em;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .section-label {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.85);
            text-align: left;
            margin-bottom: 15px;
            margin-top: 10px;
            letter-spacing: 1px;
            font-style: italic;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-weight: 400;
            padding-left: 5px;
        }

        .intro-text {
            font-size: 1.3em;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 50px;
            margin-top: 15px;
            letter-spacing: 3px;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
            font-style: italic;
        }

        .entries-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .entries-grid { grid-template-columns: 1fr; }
        }

        .entry-card {
            background: rgba(255, 255, 255, 0.45);
            border-radius: 12px;
            padding: 20px 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.35);
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .entry-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .entry-title {
            font-size: 1.2em;
            color: #3a5a6a;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .entry-desc {
            font-size: 0.9em;
            color: #4a6a7a;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .entry-btn {
            background: linear-gradient(135deg, #5a7d8a, #7a9da8);
            color: #fff;
            border: none;
            padding: 8px 25px;
            font-size: 0.95em;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(90, 125, 138, 0.4);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .entry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(90, 125, 138, 0.5);
            background: linear-gradient(135deg, #6a8d9a, #8aada8);
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95em;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
            line-height: 1.8;
        }

        /* 切换背景按钮 */
        .switch-bg-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #5a7d8a;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            letter-spacing: 1px;
        }

        .switch-bg-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* 开始播放按钮 */
        .play-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.85));
            color: #5a7d8a;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            letter-spacing: 1px;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.9));
        }

        @media (max-width: 600px) {
            .play-btn {
                bottom: 80px;
                left: 20px;
                padding: 10px 20px;
                font-size: 0.85em;
            }
            .switch-bg-btn {
                bottom: 20px;
                right: 20px;
                padding: 10px 18px;
                font-size: 0.85em;
            }
        }

        /* 弹窗 */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #modal.show {
            display: flex;
            animation: modalFadeIn 0.4s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.92));
            padding: 60px 50px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            margin: 20px;
            position: relative;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .modal-text {
            font-size: 1.3em;
            color: #5a7d8a;
            line-height: 2.2;
            margin-bottom: 30px;
            font-style: italic;
        }

        .modal-signature {
            font-size: 1.1em;
            color: #8a9a9f;
            text-align: right;
            margin-top: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            color: #8a9a9f;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .modal-close:hover {
            color: #5a7d8a;
            transform: scale(1.2);
        }

        /* 响应式设计 - 全平台适配 */
        
        /* 平板（768px 及以下） */
        @media (max-width: 768px) {
            .title { 
                font-size: 2.2em; 
                letter-spacing: 5px;
                margin-top: -40px !important;
            }
            .intro-text {
                font-size: 1.1em;
                letter-spacing: 2px;
            }
            .subtitle { 
                font-size: 1em;
                margin-bottom: 35px;
            }
            .entries-grid { 
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .section-label {
                font-size: 0.95em;
                margin-top: 25px;
            }
            .entry-card {
                padding: 18px 15px;
            }
            .entry-title {
                font-size: 1.1em;
            }
            .entry-desc {
                font-size: 0.85em;
            }
            .play-btn, .switch-bg-btn {
                padding: 10px 20px;
                font-size: 0.85em;
            }
        }

        /* 手机（480px 及以下） */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            #main-screen {
                padding: 30px 15px;
            }
            .title { 
                font-size: 1.8em; 
                letter-spacing: 3px;
                margin-top: -35px !important;
            }
            .intro-text {
                font-size: 0.95em;
                letter-spacing: 1px;
                margin-bottom: 35px;
            }
            .section-label {
                font-size: 0.85em;
                padding: 6px 12px;
            }
            .entries-grid { 
                gap: 15px;
            }
            .entry-card {
                padding: 15px 12px;
                border-radius: 10px;
            }
            .entry-title {
                font-size: 1em;
            }
            .entry-desc {
                font-size: 0.8em;
                line-height: 1.5;
            }
            .entry-btn {
                padding: 7px 20px;
                font-size: 0.85em;
            }
            .play-btn {
                bottom: 20px;
                left: 20px;
                padding: 10px 22px;
                font-size: 0.8em;
            }
            .switch-bg-btn {
                bottom: 20px;
                right: 20px;
                padding: 10px 18px;
                font-size: 0.8em;
            }
            .footer {
                font-size: 0.85em;
                margin-top: 30px;
            }
            .modal-content {
                padding: 40px 25px;
                margin: 20px;
            }
            .modal-text {
                font-size: 1.1em;
            }
        }

        /* 小屏手机（360px 及以下） */
        @media (max-width: 360px) {
            .title { 
                font-size: 1.5em;
                letter-spacing: 2px;
            }
            .intro-text {
                font-size: 0.85em;
            }
            .section-label {
                font-size: 0.8em;
            }
            .entry-title {
                font-size: 0.95em;
            }
            .entry-desc {
                font-size: 0.75em;
            }
            .play-btn, .switch-bg-btn {
                padding: 8px 15px;
                font-size: 0.75em;
                bottom: 15px;
            }
        }

        /* 横屏模式 */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding-top: 20px !important;
            }
            .title {
                font-size: 1.6em;
                margin-top: -20px !important;
            }
            .intro-text {
                margin-bottom: 20px;
            }
            .entries-grid {
                gap: 15px;
            }
            .footer {
                margin-top: 20px;
            }
        }

        /* 桌面大屏（1400px 及以上） */
        @media (min-width: 1400px) {
            .container {
                max-width: 1100px;
            }
            .title {
                font-size: 4em;
            }
            .intro-text {
                font-size: 1.5em;
            }
            .entries-grid {
                gap: 30px;
            }
            .entry-card {
                padding: 25px 20px;
            }
        }

        /* Loading 页响应式 */
        @media (max-width: 480px) {
            .loading-text {
                font-size: 2em;
            }
            .raindrop {
                height: 18px;
            }
            .cloud {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <!-- Loading 页面 -->
    <div id="loading-screen">
        <div class="loading-text" id="loadingText">Loading</div>
    </div>

    <!-- 主页 -->
    <div id="main-screen">
        <!-- 背景模糊层 -->
        <div id="bgOverlay"></div>
        
        <div class="container">
            <h1 class="title">欢迎来到雨落的世界！</h1>
            <p class="intro-text">— 听，下雨了。—</p>

            <!-- 第一行：有关雨落们的事 -->
            <p class="section-label">——有关雨落们的事</p>
            <div class="entries-grid">
                <!-- 雨落们的观测记录 -->
                <div class="entry-card" onclick="window.open('https://t.nieta.art/LB4nC1Iq', '_blank'); return false;">
                    <h2 class="entry-title">雨落们的观测记录</h2>
                    <p class="entry-desc">
                        这里存放着观测站，以及各个世界的精彩时刻！<br>
                        快来快来！
                    </p>
                    <button class="entry-btn" onclick="window.open('https://t.nieta.art/LB4nC1Iq', '_blank'); return false;">点击进入</button>
                </div>

                <!-- 雨落们的档案馆（暂未开放） -->
                <div class="entry-card" style="opacity: 0.5; cursor: not-allowed;" onclick="return false;">
                    <h2 class="entry-title">雨落们的档案馆</h2>
                    <p class="entry-desc">
                        这是千万滴雨落下的瞬间。<br>
                        每一滴都反射着独特的光芒。<br>
                        <span style="color: #8a9a9f; font-size: 0.85em; margin-top: 8px; display: block;">🔒 暂未对外开放</span>
                    </p>
                    <button class="entry-btn" style="background: linear-gradient(135deg, #a0a0a0, #b0b0b0); cursor: not-allowed;">暂未开放</button>
                </div>
            </div>

            <!-- 第二行：观测站的功能区 -->
            <p class="section-label">——观测站的千奇百怪功能区</p>
            <div class="entries-grid">
                <!-- 测试·更深认识 ta -->
                <div class="entry-card" onclick="navigateTo('test-choice.html')">
                    <h2 class="entry-title">测试·更深认识 ta</h2>
                    <p class="entry-desc">
                        通过专业测试，更深入地了解 ta 的内心<br>
                        探索人格的奥秘～
                    </p>
                    <button class="entry-btn">开始测试</button>
                </div>

                <!-- 绘境 · 标签配方库 -->
                <div class="entry-card" onclick="navigateTo('huijing.html')">
                    <h2 class="entry-title">绘境 · 标签配方库</h2>
                    <p class="entry-desc">
                        这是一个神奇的 tag 生成器！指哪打哪，萌新福音！<br>
                        来试试吗？
                    </p>
                    <button class="entry-btn">进入绘境</button>
                </div>
            </div>

            <div class="footer">
                <p>雨落的世界 · 由 伊斯派菈 制作</p>
                <p style="margin-top: 8px;">每一个世界，都是一段独特的旅程</p>
            </div>
        </div>
        
        <!-- 开始播放按钮 -->
        <button class="play-btn" id="playBtn" onclick="showModal()">🎵 开始播放</button>
        
        <!-- 切换背景按钮 -->
        <button class="switch-bg-btn" onclick="switchBackground()">🖼️ 切换背景</button>
    </div>

    <!-- 弹窗 -->
    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal(event)">×</span>
            <div class="modal-text">
                谨以此音乐献给小椰果<br>
                ——一直在等你回家的雨落
            </div>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 背景图片数组（使用优化后的图片）
        const backgrounds = ['banner_optimized.jpg', 'banner2_optimized.jpg'];
        let currentBgIndex = 0;
        let musicStarted = false;

        // 设置背景图片（带响应式优化）
        function setBackground(index) {
            const mainScreen = document.getElementById('main-screen');
            const bgUrl = "url('" + backgrounds[index] + "')";
            mainScreen.style.backgroundImage = bgUrl;
            
            // 根据屏幕尺寸优化背景显示
            if (window.innerWidth <= 480) {
                mainScreen.style.backgroundAttachment = 'scroll';
                mainScreen.style.backgroundPosition = 'center center';
            } else if (window.innerWidth <= 360) {
                mainScreen.style.backgroundPosition = '50% 30%';
            } else if (window.innerWidth >= 1920) {
                mainScreen.style.backgroundSize = 'cover';
            }
        }

        // 切换背景
        function switchBackground() {
            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            const mainScreen = document.getElementById('main-screen');
            
            mainScreen.style.opacity = '0.7';
            setTimeout(function() {
                setBackground(currentBgIndex);
                mainScreen.style.opacity = '1';
            }, 150);
        }

        // 显示弹窗
        function showModal() {
            const modal = document.getElementById('modal');
            const playBtn = document.getElementById('playBtn');
            
            modal.classList.add('show');
            playBtn.style.display = 'none';
            
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.6;
            bgMusic.play().catch(function(e) {
                console.log('音乐播放失败：', e);
            });
            
            musicStarted = true;
        }

        // 关闭弹窗
        function closeModal(event) {
            if (event.target.id === 'modal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('modal');
                modal.classList.remove('show');
            }
        }

        // 创建雨滴
        function createRain() {
            const loadingScreen = document.getElementById('loading-screen');
            const raindropCount = 150;  // 增加到 150 个雨滴
            
            for (let i = 0; i < raindropCount; i++) {
                const raindrop = document.createElement('div');
                raindrop.className = 'raindrop';
                raindrop.style.left = Math.random() * 100 + '%';
                raindrop.style.animationDuration = (Math.random() * 0.3 + 0.4) + 's';  // 更快
                raindrop.style.animationDelay = Math.random() * 2 + 's';
                raindrop.style.opacity = Math.random() * 0.5 + 0.5;  // 更明显
                loadingScreen.appendChild(raindrop);
            }
        }

        // 创建主页小雨
        function createPageRain() {
            const raindropCount = 40;  // 主页小雨，40 个雨滴
            
            for (let i = 0; i < raindropCount; i++) {
                const raindrop = document.createElement('div');
                raindrop.className = 'page-raindrop';
                raindrop.style.left = Math.random() * 100 + '%';
                raindrop.style.animationDuration = (Math.random() * 0.5 + 0.8) + 's';
                raindrop.style.animationDelay = Math.random() * 3 + 's';
                raindrop.style.opacity = Math.random() * 0.3 + 0.2;
                document.body.appendChild(raindrop);
            }
        }

        // 创建分层云层（适中）
        function createClouds() {
            const loadingScreen = document.getElementById('loading-screen');
            
            // 远景云 - 5 层，朦胧
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud cloud-far';
                const size = Math.random() * 400 + 300;
                cloud.style.width = size + 'px';
                cloud.style.height = (size * 0.5) + 'px';
                cloud.style.top = Math.random() * 60 + '%';
                cloud.style.left = Math.random() * 100 + '%';
                cloud.style.animationDuration = (Math.random() * 30 + 40) + 's';
                cloud.style.animationDelay = (Math.random() * 15) + 's';
                loadingScreen.appendChild(cloud);
            }
            
            // 中景云 - 6 层，适中
            for (let i = 0; i < 6; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud cloud-mid';
                const size = Math.random() * 300 + 200;
                cloud.style.width = size + 'px';
                cloud.style.height = (size * 0.6) + 'px';
                cloud.style.top = Math.random() * 70 + '%';
                cloud.style.left = Math.random() * 100 + '%';
                cloud.style.animationDuration = (Math.random() * 20 + 25) + 's';
                cloud.style.animationDelay = (Math.random() * 10) + 's';
                loadingScreen.appendChild(cloud);
            }
            
            // 近景云 - 5 层，较清晰
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud cloud-near';
                const size = Math.random() * 250 + 150;
                cloud.style.width = size + 'px';
                cloud.style.height = (size * 0.7) + 'px';
                cloud.style.top = Math.random() * 80 + '%';
                cloud.style.left = Math.random() * 100 + '%';
                cloud.style.animationDuration = (Math.random() * 15 + 15) + 's';
                cloud.style.animationDelay = (Math.random() * 5) + 's';
                loadingScreen.appendChild(cloud);
            }
        }

        // 页面加载
        window.addEventListener('DOMContentLoaded', function() {
            const loadingScreen = document.getElementById('loading-screen');
            const mainScreen = document.getElementById('main-screen');
            const loadingText = document.getElementById('loadingText');
            
            // 创建下雨效果
            createRain();
            
            // 创建云层效果
            createClouds();
            
            // 省略号动画
            let dotCount = 0;
            const dotInterval = setInterval(function() {
                dotCount = (dotCount + 1) % 4;
                let dots = '';
                for (let i = 0; i < dotCount; i++) {
                    dots += '.';
                }
                loadingText.textContent = 'Loading' + dots;
            }, 400);
            
            // 预加载背景图片
            let loadedImages = 0;
            const totalImages = backgrounds.length;
            
            backgrounds.forEach(function(src) {
                const img = new Image();
                img.src = src;
                img.onload = function() {
                    loadedImages++;
                    if (loadedImages >= totalImages) {
                        clearInterval(dotInterval);
                        loadingScreen.classList.add('hidden');
                        mainScreen.classList.add('visible');
                        currentBgIndex = Math.floor(Math.random() * backgrounds.length);
                        setBackground(currentBgIndex);
                    }
                };
                img.onerror = function() {
                    console.log('图片加载失败：' + src);
                    loadedImages++;
                    if (loadedImages >= totalImages) {
                        clearInterval(dotInterval);
                        loadingScreen.classList.add('hidden');
                        mainScreen.classList.add('visible');
                        currentBgIndex = Math.floor(Math.random() * backgrounds.length);
                        setBackground(currentBgIndex);
                    }
                };
            });
            
            // 最多等 6 秒（延长加载时间，好好欣赏下雨和云层）
            setTimeout(function() {
                clearInterval(dotInterval);
                
                // 先淡出 Loading 页
                loadingScreen.classList.add('hidden');
                
                // 同时淡入主页
                mainScreen.classList.add('visible');
                currentBgIndex = Math.floor(Math.random() * backgrounds.length);
                setBackground(currentBgIndex);
                
                // 1 秒后完全移除 Loading 页（等过渡完成）
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                }, 1000);
            }, 6000);
        });

        // 导航函数
        function navigateTo(url) {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.remove('hidden');
            
            setTimeout(function() {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
