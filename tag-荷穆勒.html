<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签——荷穆勒 - 雨落们的档案馆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #9a7a8a; text-decoration: none; font-size: 0.9em; padding: 6px 14px; background: #f5f5f5; border-radius: 4px; }
        .back-link:hover { color: #7a6a7a; background: #e8e8e8; }
        .page-header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #FFF9C4 0%, #E3F2FD 100%); border-radius: 8px; margin-bottom: 30px; }
        .tag-title { font-size: 2em; color: #333; font-weight: bold; margin-bottom: 10px; letter-spacing: 0; word-break: keep-all; white-space: normal; }
        .tag-count { font-size: 1em; color: #666; }
        .character-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .character-item { background: #fff; border: 2px solid #FFD54F; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .character-item:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(255, 213, 79, 0.4); border-color: #FFC107; }
        .character-item-name { font-size: 1.1em; color: #333; font-weight: 600; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state p { font-size: 0.9em; font-style: italic; margin: 10px 0; }
        @media (max-width: 768px) { .tag-title { font-size: 1.5em; } .character-list { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
        @media (max-width: 480px) { .character-list { grid-template-columns: 1fr; } .character-item-name { font-size: 1em; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="archive.html" class="back-link">← 返回档案馆</a>
        <div class="page-header">
            <h1 class="tag-title">标签——荷穆勒</h1>
            <p class="tag-count">共 1 位角色</p>
        </div>
        <div class="character-list">
            <div class="character-item" onclick="window.location.href='character-homulesha.html'">
                <div class="character-item-name">荷穆勒夏</div>
            </div>

        </div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>(´• ω •`)</p>
            <p>啊哦……轻若还没有添加哦……</p>
        </div>
    </div>
</body>
</html>
