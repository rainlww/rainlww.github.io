        .infobox-table th, .infobox-table td { padding: 8px 0; border-bottom: 1px solid #e0e0e0; text-align: left; }

        .infobox-table td { color: #333; }
        .wiki-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .wiki-tag { display: inline-block; padding: 4px 12px; background: #f5f5f5; border-radius: 4px; font-size: 0.85em; color: #666; border: 1px solid #e0e0e0; text-decoration: none; }
        .wiki-tag:hover { background: #e8e8e8; }
        .toc-list { list-style: none; }
        .toc-list li { margin-bottom: 6px; }
        .toc-list a { color: #9a7a8a; text-decoration: none; font-size: 0.95em; }
        .toc-list a:hover { color: #7a6a7a; text-decoration: underline; }
        .related-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .related-item { padding: 8px 16px; background: #f5f5f5; border-radius: 4px; font-size: 0.95em; color: #555; border: 1px solid #e0e0e0; }
        .artwork-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .artwork-item { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: all 0.3s ease; }
        .artwork-item:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .artwork-item-image { width: 100%; display: flex; justify-content: center; align-items: center; background: #f9f9f9; overflow: hidden; }
        .artwork-item-image img { width: 100%; height: auto; display: block; }
        .artwork-caption { padding: 12px; text-align: center; background: #f9f9f9; font-size: 0.9em; color: #666; border-top: 1px solid #e0e0e0; }
        .collapse-section { margin-bottom: 20px; border: none; }
        .collapse-section[open] { border-bottom: 1px solid #e0e0e0; padding-bottom: 15px; }
        .collapse-title { list-style: none; display: flex; align-items: center; gap: 8px; font-size: 1.2em; font-weight: 500; color: #333; cursor: pointer; padding: 10px 0; margin: 0; transition: color 0.2s; }
        .collapse-title:hover { color: #9a7a8a; }
        .collapse-title::-webkit-details-marker { display: none; }
        .collapse-icon { transition: transform 0.3s; flex-shrink: 0; }
        .collapse-section[open] .collapse-icon { transform: rotate(180deg); }
        .collapse-content { padding: 10px 0 0 28px; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .wiki-layout { flex-direction: column; } .wiki-infobox { width: 100%; order: -1; } .page-title { font-size: 2em; } }
