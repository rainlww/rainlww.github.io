<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荷穆勒夏 - 雨落们的档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 14px;
            background: #f5f5f5;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            background: #e8e8e8;
        }

        /* 页面标题 */
        .page-title {
            font-size: 2.5em;
            color: #333;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* Wiki 风格布局：左右分栏 */
        .wiki-layout {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        /* 左侧：主要内容区 */
        .wiki-main {
            flex: 1;
            min-width: 0;
        }

        /* 右侧：信息框 */
        .wiki-infobox {
            flex: 0 0 300px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            height: fit-content;
        }

        /* 信息框内图片 */
        .infobox-image {
            width: 100%;
            margin-bottom: 15px;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .infobox-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .infobox-image .placeholder {
            width: 100%;
            padding-top: 133%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(154, 122, 138, 0.4);
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
        }

        /* 信息框表格 */
        .infobox-table {
            width: 100%;
            font-size: 0.9em;
        }

        .infobox-table th,
        .infobox-table td {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        .infobox-table th {
            color: #666;
            font-weight: 500;
            width: 80px;
        }

        .infobox-table td {
            color: #333;
        }

        /* 章节 */
        .wiki-section {
            margin-bottom: 30px;
        }

        .wiki-section-title {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #9a7a8a;
        }

        .wiki-section-content {
            font-size: 1em;
            color: #555;
            line-height: 1.8;
        }

        /* 标签 */
        .wiki-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .wiki-tag {
            font-size: 0.85em;
            color: #666;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        /* 链接按钮 */
        .wiki-link {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .wiki-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(154, 122, 138, 0.4);
        }

        /* 相关人物 */
        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-item {
            padding: 6px 14px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 0.9em;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .wiki-layout {
                flex-direction: column;
            }
            .wiki-infobox {
                flex: none;
                width: 100%;
                order: -1;
            }
            .page-title {
                font-size: 2em;
            }
            .wiki-section-title {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="archive.html" class="back-link">← 返回档案馆</a>
        
        <h1 class="page-title">荷穆勒夏</h1>
        
        <div class="wiki-layout">
            <!-- 左侧：主要内容区 -->
            <div class="wiki-main">
                <div class="wiki-section">
                    <h2 class="wiki-section-title">📜 简介</h2>
                    <div class="wiki-section-content" id="description">
                        （简介待填写）
                    </div>
                </div>
                
                <div class="wiki-section" id="linkSection" style="display: none;">
                    <h2 class="wiki-section-title">🔗 捏 Ta 链接</h2>
                    <a href="#" class="wiki-link" id="characterLink" target="_blank">查看角色</a>
                </div>
                
                <div class="wiki-section">
                    <h2 class="wiki-section-title">👥 相关人物</h2>
                    <div class="related-list" id="relatedList">
                        <span class="related-item">（暂无）</span>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：信息框 -->
            <div class="wiki-infobox">
                <div class="infobox-image" id="infoboxImage">
                    <div class="placeholder">📷</div>
                </div>
                
                <table class="infobox-table">
                    <tr>
                        <th>名字</th>
                        <td id="infoName">-</td>
                    </tr>
                    <tr>
                        <th>标签</th>
                        <td>
                            <div class="wiki-tags" id="infoTags"></div>
                        </td>
                    </tr>
                    <tr>
                        <th>档案馆编号</th>
                        <td id="infoId">-</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 人物数据
        const character = {
            id: "homulesha",
            name: "荷穆勒夏",
            cover: "homulesha-cover-opt.jpg",
            tags: ["荷穆勒", "明雨落"],
            nietaLink: "",
            description: "（简介待填写）",
            related: []
        };

        // 初始化页面
        window.addEventListener('DOMContentLoaded', function() {
            // 设置页面标题
            document.querySelector('.page-title').textContent = character.name;

            // 设置信息框图片
            const imageEl = document.getElementById('infoboxImage');
            if (character.cover) {
                imageEl.innerHTML = `<img src="${character.cover}" alt="${character.name}">`;
            }

            // 设置信息框名字
            document.getElementById('infoName').textContent = character.name;

            // 设置信息框标签
            const tagsEl = document.getElementById('infoTags');
            tagsEl.innerHTML = character.tags.map(tag => 
                `<span class="wiki-tag">${tag}</span>`
            ).join('');

            // 设置信息框编号
            document.getElementById('infoId').textContent = character.id;

            // 设置简介
            document.getElementById('description').textContent = character.description;

            // 设置捏 Ta 链接
            if (character.nietaLink) {
                document.getElementById('linkSection').style.display = 'block';
                document.getElementById('characterLink').href = character.nietaLink;
            }

            // 设置相关人物
            if (character.related && character.related.length > 0) {
                document.getElementById('relatedList').innerHTML = character.related.map(name => 
                    `<span class="related-item">${name}</span>`
                ).join('');
            }
        });
    </script>
</body>
</html>
