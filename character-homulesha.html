<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荷穆勒夏 - 雨落们的档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 14px;
            background: #f5f5f5;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            background: #e8e8e8;
        }

        /* 页面标题 */
        .page-title {
            font-size: 2.5em;
            color: #333;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* Wiki 风格布局：左右分栏 */
        .wiki-layout {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        /* 左侧：主要内容区 */
        .wiki-main {
            flex: 1;
            min-width: 0;
        }

        /* 右侧：信息框 */
        .wiki-infobox {
            flex: 0 0 300px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            height: fit-content;
        }

        /* 信息框内图片 */
        .infobox-image {
            width: 100%;
            margin-bottom: 15px;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .infobox-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .infobox-image .placeholder {
            width: 100%;
            padding-top: 133%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(154, 122, 138, 0.4);
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
        }

        /* 信息框表格 */
        .infobox-table {
            width: 100%;
            font-size: 0.9em;
        }

        .infobox-table th,
        .infobox-table td {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        .infobox-table th {
            color: #666;
            font-weight: 500;
            width: 80px;
        }

        .infobox-table td {
            color: #333;
        }

        /* 目录导航 */
        .toc {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px 20px;
            margin-bottom: 30px;
        }

        .toc-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list li {
            margin-bottom: 6px;
        }

        .toc-list a {
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .toc-list a:hover {
            color: #7a6a7a;
            text-decoration: underline;
        }

        /* 章节 */
        .wiki-section {
            margin-bottom: 40px;
            scroll-margin-top: 20px;
        }

        .wiki-section-title {
            font-size: 1.6em;
            color: #333;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #9a7a8a;
        }

        .wiki-section-content {
            font-size: 1em;
            color: #555;
            line-height: 1.8;
        }

        /* 标签 */
        .wiki-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .wiki-tag {
            font-size: 0.85em;
            color: #666;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        /* 链接按钮 */
        .wiki-link {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .wiki-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(154, 122, 138, 0.4);
        }

        /* 相关人物 */
        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-item {
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 0.95em;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        /* 立绘展示区 - 多图网格 */
        .character-artwork {
            margin: 30px 0;
        }

        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .artwork-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .artwork-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .artwork-item-image {
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f9f9f9;
            overflow: hidden;
        }

        .artwork-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .artwork-caption {
            padding: 12px;
            text-align: center;
            background: #f9f9f9;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .wiki-layout {
                flex-direction: column;
            }
            .wiki-infobox {
                flex: none;
                width: 100%;
                order: -1;
            }
            .page-title {
                font-size: 2em;
            }
            .wiki-section-title {
                font-size: 1.4em;
            }
            .character-artwork img {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="archive.html" class="back-link">← 返回档案馆</a>
        
        <h1 class="page-title" id="pageTitle">荷穆勒夏</h1>
        
        <div class="wiki-layout">
            <!-- 左侧：主要内容区 -->
            <div class="wiki-main">
                <!-- 目录 -->
                <div class="toc">
                    <div class="toc-title">目录</div>
                    <ul class="toc-list">
                        <li><a href="#artwork">立绘展示</a></li>
                        <li><a href="#description">角色简介</a></li>
                        <li><a href="#related">相关雨落</a></li>
                        <li><a href="#external">外部链接</a></li>
                    </ul>
                </div>

                <!-- 立绘展示 -->
                <div class="wiki-section" id="artwork">
                    <h2 class="wiki-section-title">立绘展示</h2>
                    <div class="character-artwork">
                        <div class="artwork-grid">
                            <!-- 立绘 1：封面 -->
                            <div class="artwork-item">
                                <div class="artwork-item-image">
                                    <img src="homulesha-cover-new-opt.jpg?v=2" alt="荷穆勒夏 - 封面">
                                </div>
                                <div class="artwork-caption">荷穆勒夏 - 封面</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 角色简介 -->
                <div class="wiki-section" id="description">
                    <h2 class="wiki-section-title">角色简介</h2>
                    <div class="wiki-section-content" id="descriptionContent">
                        （简介待填写）
                    </div>
                </div>

                <!-- 相关人物 -->
                <div class="wiki-section" id="related">
                    <h2 class="wiki-section-title">相关雨落</h2>
                    <div class="related-list" id="relatedYuluoList">
                        <span class="related-item">（暂无）</span>
                    </div>
                </div>

                <!-- 外部链接 -->
                <div class="wiki-section" id="external">
                    <h2 class="wiki-section-title">外部链接</h2>
                    <div id="externalLinks">
                        <a href="#" class="wiki-link" id="nietaLink" target="_blank" style="display: none;">查看捏 Ta 角色</a>
                        <p style="color: #999; font-size: 0.9em; margin-top: 10px;" id="noLink" style="display: none;">暂无外部链接</p>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：信息框 -->
            <div class="wiki-infobox">
                <div class="infobox-image" id="infoboxImage">
                    <div class="placeholder">📷</div>
                </div>
                
                <table class="infobox-table">
                    <tr>
                        <th>名字</th>
                        <td id="infoName">-</td>
                    </tr>
                    <tr>
                        <th>档案馆编号</th>
                        <td id="infoId">-</td>
                    </tr>
                    <tr>
                        <th>标签</th>
                        <td>
                            <div class="wiki-tags" id="infoTags"></div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 人物数据
        const character = {
            id: "homulesha",
            name: "荷穆勒夏",
            cover: "homulesha-cover-new-opt.jpg?v=2",
            tags: ["荷穆勒", "明雨落"],
            nietaLink: "",
            description: "（简介待填写）",
            relatedYuluo: ["明雨落", "雨落"]
        };

        // 初始化页面
        window.addEventListener('DOMContentLoaded', function() {
            // 设置页面标题
            document.getElementById('pageTitle').textContent = character.name;

            // 设置信息框图片
            const imageEl = document.getElementById('infoboxImage');
            if (character.cover) {
                imageEl.innerHTML = `<img src="${character.cover}" alt="${character.name}">`;
            }

// 设置信息框名字
            document.getElementById('infoName').textContent = character.name;

            // 设置信息框编号
            document.getElementById('infoId').textContent = character.number;

            // 设置信息框标签
            const tagsEl = document.getElementById('infoTags');
            tagsEl.innerHTML = character.tags.map(tag => 
                `<a href="tag-${tag}.html" class="wiki-tag" style="text-decoration: none; cursor: pointer;">${tag}</a>`
            ).join('');

            // 设置简介
            document.getElementById('descriptionContent').textContent = character.description;

            // 设置捏 Ta 链接
            if (character.nietaLink) {
                document.getElementById('nietaLink').style.display = 'inline-block';
                document.getElementById('nietaLink').href = character.nietaLink;
                document.getElementById('noLink').style.display = 'none';
            } else {
                document.getElementById('nietaLink').style.display = 'none';
                document.getElementById('noLink').style.display = 'block';
            }

            // 设置相关人物
            if (character.relatedYuluo && character.relatedYuluo.length > 0) {
                document.getElementById('relatedList').innerHTML = character.relatedYuluo.map(name => 
                    `<span class="related-item">${name}</span>`
                ).join('');
            }
        });
    </script>
</body>
</html>
