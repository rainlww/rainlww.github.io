<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荷穆勒夏 - 雨落们的档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Microsoft YaHei', 'Segoe UI', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 50%, #d5c2d5 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #9a7a8a;
            text-decoration: none;
            font-size: 0.95em;
            padding: 8px 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #7a6a7a;
            background: rgba(255,255,255,0.8);
        }

        /* PRTS Wiki 风格卡片 */
        .character-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
        }

        /* 左右分栏布局 */
        .character-layout {
            display: flex;
            flex-direction: row;
        }

        /* 左侧：角色大图 */
        .character-left {
            flex: 0 0 320px;
            background: linear-gradient(135deg, #f5e6f0 0%, #e8d5e8 100%);
            padding: 25px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            border-right: 1px solid #e0e0e0;
        }

        .character-cover {
            width: 100%;
            max-width: 260px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .character-cover img {
            width: 100%;
            height: auto;
            display: block;
        }

        .character-cover .placeholder {
            width: 100%;
            padding-top: 133%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(154, 122, 138, 0.4);
            background: linear-gradient(135deg, #e8d5e8 0%, #d5c2d5 100%);
        }

        /* 右侧：信息区 */
        .character-right {
            flex: 1;
            padding: 30px;
            background: #fff;
        }

        .character-name {
            font-size: 2em;
            color: #333;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .character-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .character-tag {
            font-size: 0.8em;
            color: #666;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            font-weight: 500;
        }

        .character-section {
            margin-bottom: 25px;
        }

        .character-section-title {
            font-size: 1em;
            color: #333;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .character-section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            border-radius: 2px;
        }

        .character-section-content {
            font-size: 0.95em;
            color: #555;
            line-height: 1.8;
        }

        .character-link {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #9a7a8a, #aa8a9a);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-weight: 500;
        }

        .character-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(154, 122, 138, 0.4);
        }

        .character-related {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .character-related-item {
            padding: 6px 14px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 0.9em;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .character-layout {
                flex-direction: column;
            }
            .character-left {
                flex: none;
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }
            .character-cover {
                max-width: 200px;
            }
            .character-right {
                padding: 20px;
            }
            .character-name {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="archive.html" class="back-link">← 返回档案馆</a>
        
        <div class="character-card">
            <div class="character-layout">
                <!-- 左侧：角色大图 -->
                <div class="character-left">
                    <div class="character-cover">
                        <img src="homulesha-cover-opt.jpg" alt="荷穆勒夏">
                    </div>
                </div>
                
                <!-- 右侧：信息区 -->
                <div class="character-right">
                    <h1 class="character-name">荷穆勒夏</h1>
                    <div class="character-tags">
                        <span class="character-tag">荷穆勒</span>
                        <span class="character-tag">明雨落</span>
                    </div>
                    
                    <div class="character-section">
                        <h2 class="character-section-title">📜 简介</h2>
                        <div class="character-section-content">
                            （简介待填写）
                        </div>
                    </div>
                    
                    <div class="character-section" id="linkSection" style="display: none;">
                        <h2 class="character-section-title">🔗 捏 Ta 链接</h2>
                        <a href="#" class="character-link" id="characterLink" target="_blank">查看角色</a>
                    </div>
                    
                    <div class="character-section" id="relatedSection">
                        <h2 class="character-section-title">👥 相关人物</h2>
                        <div class="character-related" id="relatedList">
                            （暂无）
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 人物数据
        const character = {
            id: "homulesha",
            name: "荷穆勒夏",
            cover: "homulesha-cover-opt.jpg",
            tags: ["荷穆勒", "明雨落"],
            nietaLink: "",
            description: "（简介待填写）",
            related: []
        };

        // 初始化页面
        window.addEventListener('DOMContentLoaded', function() {
            // 设置名字
            document.querySelector('.character-name').textContent = character.name;

            // 设置标签
            const tagsEl = document.querySelector('.character-tags');
            tagsEl.innerHTML = character.tags.map(tag => 
                `<span class="character-tag">${tag}</span>`
            ).join('');

            // 设置简介
            document.querySelector('.character-section-content').textContent = character.description;

            // 设置捏 Ta 链接
            if (character.nietaLink) {
                document.getElementById('linkSection').style.display = 'block';
                document.getElementById('characterLink').href = character.nietaLink;
            }

            // 设置相关人物
            if (character.related && character.related.length > 0) {
                document.getElementById('relatedList').innerHTML = character.related.map(name => 
                    `<span class="character-related-item">${name}</span>`
                ).join('');
            }
        });
    </script>
</body>
</html>
