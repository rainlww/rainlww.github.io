<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨落们的观测记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
        }

        h1 {
            font-size: 1.8em;
            color: #5a7d8a;
            font-weight: bold;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            color: #8a9a9f;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #5a7d8a, #7a9da8);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(90, 125, 138, 0.45);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8a9a9f, #9aabad);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 雨落们的观测记录</h1>
        <p>捏 Ta 页面需要在独立窗口中打开<br>点击下方按钮即可进入～</p>
        <div class="btn-group">
            <a href="https://t.nieta.art/LB4nC1Iq" target="_blank" class="btn">进入观测站</a>
            <a href="index.html" class="btn btn-secondary">返回主页</a>
        </div>
    </div>
</body>
</html>
