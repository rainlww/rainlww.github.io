        // 当前选中的标签

        // 格式化名字：将#后的内容用浅色斜体显示
        function formatName(name) {
            if (name && name.includes('#')) {
                const parts = name.split('#');
                return parts[0] + '<span class="name-suffix">#' + parts.slice(1).join('#') + '</span>';
            }
            return name;
        }

        // 渲染人物卡片
        function renderCards() {
            const grid = document.getElementById('charactersGrid');
            if (!grid) return;
            
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            const filteredChars = characters.filter(char => {
                if (selectedTags.length > 0) {
                    return selectedTags.every(tag => char.tags.includes(tag));
                }
                if (query) {
                    return char.name.toLowerCase().includes(query) || char.tags.some(tag => tag.toLowerCase().includes(query));
                }
                return true;
            });
            
            if (filteredChars.length === 0) {
                grid.style.display = 'none';
                return;
            }
            grid.style.display = 'grid';

            grid.innerHTML = filteredChars.map(function(char) {
                var coverHtml = char.cover 
                    ? '<img src="' + char.cover + '" loading="lazy" alt="' + char.name + '">'
                    : '<div class="placeholder">📷</div>';

                    '<div class="character-card-name">' + formatName(char.name) + '</div>' +
                    '<div class="character-card-tags">' +
                    char.tags.map(function(tag) { return '<span class="character-card-tag">' + tag + '</span>'; }).join('') +
                    '</div></div></div>';
            }).join('');
        }

        // 初始化
        function init() {
            renderFilterTags();
            renderCards();
        }

        // 渲染筛选标签
        function renderFilterTags() {
            // 渲染人物标签
            const charContainer = document.getElementById('characterFilterTags');
            if (charContainer) {
                charContainer.innerHTML = characterTags.map(tag => `
                    <div class="filter-tag" data-tag="${tag}" onclick="toggleTag('${tag}')">
                        ${tag}
                    </div>
                `).join('');
            }
            // 渲染所属标签
            const affContainer = document.getElementById('affiliationFilterTags');
            if (affContainer) {
                affContainer.innerHTML = affiliationTags.map(tag => `
                    <div class="filter-tag" data-tag="${tag}" onclick="toggleTag('${tag}')">
                        ${tag}
                    </div>
                `).join('');
            }
        }

        // 切换标签选中状态
        function toggleTag(tag) {
            const index = selectedTags.indexOf(tag);
            if (index > -1) {
                selectedTags.splice(index, 1);
            } else {
                selectedTags.push(tag);
            }

            // 更新 UI
            document.querySelectorAll('.filter-tag').forEach(el => {
                el.classList.toggle('active', selectedTags.includes(el.dataset.tag));
            });

            // 检查是否选中荷穆勒
            // removed

            // 筛选人物卡片
            renderCards();
            renderTable();

            // 荷穆勒提示：只在选中荷穆勒标签时动态创建
            let notice = document.getElementById('homuleshaNotice');
            if (selectedTags.includes('荷穆勒')) {
                if (!notice) {
                    const viewToggles = document.querySelector('.view-toggles');
                    if (viewToggles) {
                        const noticeDiv = document.createElement('div');
                        noticeDiv.id = 'homuleshaNotice';
                        noticeDiv.style.cssText = 'text-align: center; padding: 15px; margin: 20px 0; background: rgba(139, 115, 85, 0.1); border-radius: 4px;';
                        noticeDiv.innerHTML = '<p style="font-size: 0.95em; color: #8B7355; font-style: italic; margin: 0;">"荷穆勒"之名，意味着重重苦难。</p>';
                        viewToggles.parentNode.insertBefore(noticeDiv, viewToggles);
                    }
                }
            } else {
                if (notice) {
                    notice.remove();
                }
            }
        }

        // 筛选人物卡片
        function filterCharacters() {
            const cards = document.querySelectorAll('.character-card');
            let hasResults = false;

            cards.forEach(card => {
                const onclick = card.getAttribute('onclick');
                if (!onclick) return;
                const match = onclick.match(/'([^']+)'/);
                if (!match) return;
                const charId = match[1];
                const char = characters.find(c => c.id === charId);
                if (!char) return;

                if (selectedTags.length === 0) {
                    card.style.display = 'block';
                    hasResults = true;
                    return;
                }

                // 交集筛选：必须包含所有选中的标签
                const hasAllTags = selectedTags.every(tag => char.tags.includes(tag));
                if (hasAllTags) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // 更新表格视图
            renderTable();

            // 显示/隐藏空状态提示
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                if (!hasResults) {
                    emptyState.style.display = 'block';
                    // 检查是否有选中的标签不存在于任何角色中
                    const allTags = characters.flatMap(c => c.tags);
                    const hasUnaddedTag = selectedTags.some(tag => !allTags.includes(tag));
                    
                    if (hasUnaddedTag) {
                        // 有标签尚未添加人物
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>';
                    } else {
                        // 交集为空
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">观测站的记录里查无此人……是不是找错了？</p>';
                    }
                } else {
                    emptyState.style.display = 'none';
                }
            }
        }

        // 更新荷穆勒提示
        function updateHomuleshaNotice() {
            const notice = document.getElementById('homuleshaNotice');
        }

        // 视图切换
        function switchView(view) {
            const grid = document.getElementById('charactersGrid');
            const table = document.getElementById('charactersTable');
            const btns = document.querySelectorAll('.view-toggle-btn');
            
            if (view === 'card') {
                grid.style.display = 'grid';
                table.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                grid.style.display = 'none';
                table.style.display = 'table';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                renderTable();
            }
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('charactersTableBody');
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const filteredChars = characters.filter(char => {
                if (selectedTags.length > 0) {
                    return selectedTags.every(tag => char.tags.includes(tag));
                }
                if (query) {
                    return char.name.toLowerCase().includes(query) || char.tags.some(tag => tag.toLowerCase().includes(query));
                }
                return true;
            });

            // 更新空状态提示
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                if (filteredChars.length === 0) {
                    emptyState.style.display = 'block';
                    const allTags = characters.flatMap(c => c.tags);
                    const hasUnaddedTag = selectedTags.some(tag => !allTags.includes(tag));
                    if (hasUnaddedTag) {
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">啊哦……轻若还没有添加哦……</p>';
                    } else {
                        emptyState.innerHTML = '<p style="font-size: 0.9em; font-style: italic; margin-bottom: 10px;">(´• ω •`)</p><p style="font-size: 0.9em; font-style: italic;">观测站的记录里查无此人……是不是找错了？</p>';
                    }
                }
            }

            tbody.innerHTML = filteredChars.map(char => `
                <tr onclick="openCharacter('${char.id}')" style="cursor: pointer;">
                    <td>
                        <div class="table-row-content">
                            <div class="table-avatar">
                                ${char.cover ? `<img src="${char.cover}" loading="lazy" alt="${char.name}">` : '<div class="placeholder">📷</div>'}
                            </div>
                            <div class="table-info">
                                <div class="table-header">
                                    <span class="table-name">${formatName(char.name)}</span>
                                    <!-- 圣拉姆特从不以编号记人 -->
                                </div>
                                <div class="table-details">
                                    <span class="table-detail-label">性别</span>
                                    <span class="table-detail-value">${char.gender || "未知"}</span>
                                    <span class="table-detail-label">所属</span>
                                    <span class="table-detail-value">${char.affiliation || "未知"}</span>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 搜索处理
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!query) {
                document.querySelectorAll('.filter-tag').forEach(el => {
                    el.style.display = 'block';
                });
                return;
            }

            document.querySelectorAll('.filter-tag').forEach(el => {
                const tagText = el.dataset.tag.toLowerCase();
                if (tagText.includes(query)) {
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            });
        }

        // 打开人物档案（新页面）
        function openCharacter(charId) {
            window.location.href = `character-${charId}.html`;
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
