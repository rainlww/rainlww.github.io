<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neta 点赞工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 头部 */
        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; color: #333; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-name { font-size: 14px; color: #666; }
        
        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h3 { font-size: 16px; color: #333; margin-bottom: 15px; }
        
        /* 表单 */
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-row input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-danger { background: #f44336; color: white; }
        
        /* 标签列表 */
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag-item {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .tag-item button {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        
        /* 配置网格 */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .config-item label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        .config-item input, .config-item select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        
        /* 进度条 */
        .progress { background: #e0e0e0; border-radius: 8px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 24px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; transition: width 0.3s; }
        
        /* 统计 */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .stat-item { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }
        
        /* 按钮组 */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group .btn { flex: 1; padding: 12px; font-size: 15px; font-weight: 500; }
        .btn-start { background: #4caf50; color: white; }
        .btn-start:hover:not(:disabled) { background: #43a047; }
        .btn-pause { background: #ff9800; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 日志 */
        .log { max-height: 300px; overflow-y: auto; background: #1e1e1e; border-radius: 8px; padding: 12px; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.8; }
        .log-entry { padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; }
        .log-success { background: rgba(76,175,80,0.2); color: #81c784; }
        .log-error { background: rgba(244,67,54,0.2); color: #e57373; }
        .log-info { background: rgba(33,150,243,0.2); color: #64b5f6; }
        .log-warning { background: rgba(255,152,0,0.2); color: #ffb74d; }
        
        /* 排行榜 */
        .ranking-list { list-style: none; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px 15px; background: #f8f9fa; border-radius: 6px; margin-bottom: 8px; }
        .ranking-rank { font-weight: bold; color: #667eea; width: 30px; }
        .ranking-name { flex: 1; color: #333; }
        .ranking-count { color: #999; font-size: 13px; }
        
        /* 登录框 */
        .login-box { max-width: 450px; margin: 50px auto; text-align: center; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
        .login-tip { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; line-height: 2; color: #666; }
        .login-tip a { color: #667eea; }
        
        /* 隐藏 */
        .hidden { display: none !important; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .config-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div id="login-section" class="card login-box">
            <h1 style="color: #667eea; margin-bottom: 20px;">💜 Neta 点赞工具</h1>
            <div class="login-tip">
                <strong>获取 Token 方法：</strong><br>
                1. 打开 <a href="https://www.talesofai.cn" target="_blank">捏 ta 网页版</a><br>
                2. 点击右上角个人头像 → 隐私设置<br>
                3. 点击"获取 NETA TOKEN"<br>
                4. 复制粘贴到下方
            </div>
            <input type="text" id="token-input" class="login-input" placeholder="请输入 NETA TOKEN" />
            <button id="login-btn" class="btn btn-primary" style="width: 100%;">登录</button>
            <div id="login-status" style="margin-top: 15px; color: #f44336; font-size: 14px;"></div>
        </div>

        <!-- 主界面 -->
        <div id="main-section" class="hidden">
            <!-- 头部 -->
            <div class="header">
                <h1>💜 Neta 点赞工具</h1>
                <div class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" />
                    <span id="user-name" class="user-name">-</span>
                    <button class="btn btn-danger" onclick="logout()" style="padding: 6px 12px; font-size: 13px;">退出</button>
                </div>
            </div>

            <!-- 配置 -->
            <div class="card">
                <h3>📋 配置</h3>
                <div class="form-row">
                    <input type="text" id="tag-name" placeholder="标签名（不带#）" />
                    <button class="btn btn-primary" onclick="addTag()">添加标签</button>
                </div>
                <div id="tag-list" class="tag-list"></div>
                
                <div class="config-grid" style="margin-top: 15px;">
                    <div class="config-item">
                        <label>起始页码</label>
                        <input type="number" id="start-page" value="0" min="0" />
                    </div>
                    <div class="config-item">
                        <label>每页数量</label>
                        <input type="number" id="page-size" value="10" min="1" max="50" />
                    </div>
                    <div class="config-item">
                        <label>跳过作品数</label>
                        <input type="number" id="skip-first" value="0" min="0" />
                    </div>
                    <div class="config-item">
                        <label>最多处理</label>
                        <input type="number" id="max-works" value="100" min="1" />
                    </div>
                    <div class="config-item">
                        <label>点赞速度 (ms)</label>
                        <input type="number" id="like-speed" value="2000" min="500" step="100" />
                    </div>
                    <div class="config-item">
                        <label>排除创作者</label>
                        <input type="text" id="exclude-creators" value="轻若雨落，rainlww,rain_lww" />
                    </div>
                </div>
            </div>

            <!-- 进度 -->
            <div class="card">
                <h3>📊 进度</h3>
                <div class="progress">
                    <div id="progress-bar" class="progress-bar" style="width: 0%;">0%</div>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div id="stat-total" class="stat-value">0</div>
                        <div class="stat-label">点赞</div>
                    </div>
                    <div class="stat-item">
                        <div id="stat-skipped" class="stat-value">0</div>
                        <div class="stat-label">跳过</div>
                    </div>
                    <div class="stat-item">
                        <div id="stat-failed" class="stat-value">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                    <div class="stat-item">
                        <div id="stat-time" class="stat-value">00:00</div>
                        <div class="stat-label">时间</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="btn-start" class="btn btn-start" onclick="startLike()">▶️ 开始</button>
                    <button id="btn-pause" class="btn btn-pause" onclick="pauseLike()" disabled>⏸️ 暂停</button>
                    <button id="btn-stop" class="btn btn-stop" onclick="stopLike()" disabled>⏹️ 停止</button>
                </div>
            </div>

            <!-- 排行榜 -->
            <div class="card">
                <h3>🔥 热门标签排行榜</h3>
                <button class="btn btn-primary" onclick="loadRanking()" style="margin-bottom: 15px;">🔄 刷新</button>
                <ul id="ranking-list" class="ranking-list"></ul>
            </div>

            <!-- 日志 -->
            <div class="card">
                <h3>📜 日志</h3>
                <div id="log-container" class="log"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.talesofai.cn';
        let currentUser = null;
        let isRunning = false;
        let isPaused = false;
        let stats = { total: 0, skipped: 0, failed: 0, startTime: null };
        let timerInterval = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkLogin();
        });

        // 检查登录
        function checkLogin() {
            const token = localStorage.getItem('neta_token');
            if (token) {
                loadUserProfile(token);
            }
        }

        // 加载用户信息
        async function loadUserProfile(token) {
            try {
                const res = await fetch(`${API_BASE}/v1/user/`, {
                    headers: { 'x-token': token, 'x-platform': 'nieta-app/web' }
                });
                
                if (!res.ok) throw new Error('Token 无效');
                
                const data = await res.json();
                currentUser = {
                    token: token,
                    name: data.nick_name || data.name || '用户',
                    avatar: data.avatar_url || '',
                    uuid: data.uuid
                };

                localStorage.setItem('neta_token', token);
                document.getElementById('user-avatar').src = currentUser.avatar;
                document.getElementById('user-name').textContent = currentUser.name;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                
                loadTags();
                loadRanking();
            } catch (error) {
                localStorage.removeItem('neta_token');
                document.getElementById('login-status').textContent = 'Token 无效，请重新登录';
            }
        }

        // 登录
        document.getElementById('login-btn').addEventListener('click', async () => {
            const token = document.getElementById('token-input').value.trim();
            if (!token) {
                document.getElementById('login-status').textContent = '请输入 Token';
                return;
            }
            
            document.getElementById('login-btn').disabled = true;
            document.getElementById('login-btn').textContent = '登录中...';
            await loadUserProfile(token);
            document.getElementById('login-btn').disabled = false;
            document.getElementById('login-btn').textContent = '登录';
        });

        // 登出
        function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            localStorage.removeItem('neta_token');
            location.reload();
        }

        // 标签管理
        function loadTags() {
            const tags = JSON.parse(localStorage.getItem('saved_tags') || '[]');
            renderTags(tags);
        }

        function addTag() {
            const input = document.getElementById('tag-name');
            const tagName = input.value.trim();
            if (!tagName) return;

            const tags = JSON.parse(localStorage.getItem('saved_tags') || '[]');
            if (tags.some(t => t.name === tagName)) {
                log(`标签 #${tagName} 已存在`, 'warning');
                return;
            }

            tags.push({ name: tagName });
            localStorage.setItem('saved_tags', JSON.stringify(tags));
            renderTags(tags);
            input.value = '';
            log(`添加标签：#${tagName}`, 'success');
        }

        function removeTag(tagName) {
            const tags = JSON.parse(localStorage.getItem('saved_tags') || '[]').filter(t => t.name !== tagName);
            localStorage.setItem('saved_tags', JSON.stringify(tags));
            renderTags(tags);
            log(`移除标签：#${tagName}`, 'info');
        }

        function renderTags(tags) {
            const container = document.getElementById('tag-list');
            if (tags.length === 0) {
                container.innerHTML = '<div style="color: #999; font-size: 13px; padding: 10px;">暂无标签，请添加</div>';
                return;
            }
            container.innerHTML = tags.map(tag => `
                <div class="tag-item">
                    #${tag.name}
                    <button onclick="removeTag('${tag.name}')">×</button>
                </div>
            `).join('');
        }

        // 点赞控制
        function startLike() {
            const tags = JSON.parse(localStorage.getItem('saved_tags') || '[]');
            if (tags.length === 0) {
                alert('请先添加标签');
                return;
            }

            isRunning = true;
            isPaused = false;
            stats = { total: 0, skipped: 0, failed: 0, startTime: Date.now() };

            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-pause').disabled = false;
            document.getElementById('btn-stop').disabled = false;

            timerInterval = setInterval(updateTimer, 1000);
            processTags(tags);
        }

        function pauseLike() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
            log(isPaused ? '已暂停' : '继续点赞', 'warning');
        }

        function stopLike() {
            isRunning = false;
            clearInterval(timerInterval);
            
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-pause').disabled = true;
            document.getElementById('btn-pause').textContent = '⏸️ 暂停';
            document.getElementById('btn-stop').disabled = true;

            log('已停止', 'error');
        }

        async function processTags(tags) {
            const config = {
                startPage: parseInt(document.getElementById('start-page').value) || 0,
                pageSize: parseInt(document.getElementById('page-size').value) || 10,
                skipFirst: parseInt(document.getElementById('skip-first').value) || 0,
                maxWorks: parseInt(document.getElementById('max-works').value) || 100,
                likeSpeed: parseInt(document.getElementById('like-speed').value) || 2000,
                excludeCreators: document.getElementById('exclude-creators').value.split(',').map(s => s.trim())
            };

            const offset = config.startPage * config.pageSize + config.skipFirst;
            let processed = 0;

            for (const tag of tags) {
                if (!isRunning) break;

                log(`开始处理标签：#${tag.name}`, 'info');

                try {
                    const res = await fetch(
                        `${API_BASE}/v1/hashtag/${encodeURIComponent(tag.name)}/stories?page_index=${config.startPage}&page_size=${config.pageSize}`,
                        { headers: { 'x-token': currentUser.token, 'x-platform': 'nieta-app/web' } }
                    );

                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }

                    const data = await res.json();
                    const stories = data.list || [];

                    log(`获取到 ${stories.length} 个作品`, 'success');

                    for (let i = 0; i < stories.length && processed < config.maxWorks; i++) {
                        if (!isRunning) break;
                        if (isPaused) {
                            await sleep(500);
                            continue;
                        }

                        const story = stories[i];
                        processed++;

                        // 检查是否自己的作品
                        const isOwn = config.excludeCreators.some(creator => 
                            story.creator_name && story.creator_name.includes(creator)
                        );

                        if (isOwn) {
                            stats.skipped++;
                            log(`⏭️ 跳过：${story.name || '无题'}（自己的作品）`, 'warning');
                            updateStats();
                            continue;
                        }

                        // 点赞
                        log(`❤️ 点赞：${story.name || '无题'}`, 'info');
                        
                        const likeRes = await fetch(`${API_BASE}/v1/story/${story.uuid}/like`, {
                            method: 'POST',
                            headers: { 'x-token': currentUser.token, 'x-platform': 'nieta-app/web' }
                        });

                        if (likeRes.ok) {
                            stats.total++;
                            log(`✅ 点赞成功`, 'success');
                        } else {
                            stats.failed++;
                            const errorText = await likeRes.text();
                            log(`⚠️ 点赞失败：${errorText}`, 'error');
                        }

                        updateStats();
                        await sleep(config.likeSpeed);
                    }
                } catch (error) {
                    log(`处理标签 #${tag.name} 失败：${error.message}`, 'error');
                }
            }

            stopLike();
            log('所有标签处理完成！', 'success');
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-skipped').textContent = stats.skipped;
            document.getElementById('stat-failed').textContent = stats.failed;

            const total = stats.total + stats.skipped + stats.failed;
            const percent = total > 0 ? Math.round((stats.total / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-bar').textContent = percent + '% (' + stats.total + '/' + total + ')';
        }

        function updateTimer() {
            if (!stats.startTime) return;
            const elapsed = Math.floor((Date.now() - stats.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('stat-time').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 日志
        function log(message, level = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${level}`;
            
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 排行榜
        async function loadRanking() {
            const container = document.getElementById('ranking-list');
            container.innerHTML = '<li style="text-align: center; color: #999; padding: 20px;">加载中...</li>';

            try {
                const res = await fetch(`${API_BASE}/v1/configs/config?namespace=space&key=topic_tags_config`, {
                    headers: { 'x-token': currentUser.token, 'x-platform': 'nieta-app/web' }
                });

                if (!res.ok) throw new Error('获取失败');

                const data = await res.json();
                const tags = Object.entries(data.value || {}).map(([name, config]) => ({
                    name,
                    count: config.participants_count || 0
                })).sort((a, b) => b.count - a.count).slice(0, 20);

                container.innerHTML = tags.map((tag, index) => `
                    <li class="ranking-item">
                        <span class="ranking-rank">${index + 1}</span>
                        <span class="ranking-name">#${tag.name}</span>
                        <span class="ranking-count">${tag.count.toLocaleString()} 人参与</span>
                    </li>
                `).join('');
                
                log('排行榜加载成功', 'success');
            } catch (error) {
                container.innerHTML = '<li style="text-align: center; color: #f44336; padding: 20px;">加载失败：' + error.message + '</li>';
                log('排行榜加载失败：' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
